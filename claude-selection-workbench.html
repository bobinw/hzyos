<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Code 选品工作台</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --panel: #16213e;
            --card: #0f3460;
            --accent: #e94560;
            --green: #4ecca3;
            --text: #e0e0e0;
            --muted: #888;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg); color: var(--text); min-height: 100vh;
        }

        /* Layout */
        .app { display: flex; flex-direction: column; height: 100vh; }
        .topbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 16px; background: var(--panel);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            min-height: 48px;
        }
        .topbar h1 { font-size: 1.1rem; font-weight: 600; }
        .topbar .info-group { display: flex; align-items: center; gap: 16px; font-size: 0.85rem; }
        .main { display: flex; flex: 1; overflow: hidden; }
        .sidebar {
            width: 280px; background: var(--panel); border-right: 1px solid rgba(255,255,255,0.05);
            overflow-y: auto; padding: 12px;
        }
        .content { flex: 1; overflow-y: auto; padding: 16px; }
        .bottombar {
            display: flex; align-items: center; gap: 8px; padding: 8px 16px;
            background: var(--panel); border-top: 1px solid rgba(255,255,255,0.05);
            min-height: 48px;
        }

        /* Section titles */
        .section-title {
            font-size: 10px; text-transform: uppercase; color: var(--muted);
            letter-spacing: 0.5px; margin-bottom: 8px; margin-top: 16px;
        }
        .section-title:first-child { margin-top: 0; }

        /* Panel box */
        .panel-box {
            background: rgba(255,255,255,0.03); border-radius: 8px;
            padding: 12px; margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.06);
        }

        /* Buttons */
        button, .btn {
            padding: 6px 14px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1);
            background: var(--card); color: var(--text); cursor: pointer;
            font-size: 0.85rem; transition: all 0.15s; white-space: nowrap;
        }
        button:hover, .btn:hover { background: #1a4a80; }
        button:disabled, .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
        .btn-primary:hover { background: #d63850; }
        .btn-green { background: var(--green); border-color: var(--green); color: #000; }
        .btn-green:hover { background: #3db88a; }
        .btn-small { padding: 3px 8px; font-size: 0.75rem; }

        /* Tags */
        .tag {
            display: inline-block; padding: 2px 8px; border-radius: 4px;
            font-size: 0.75rem; background: rgba(255,255,255,0.08); color: var(--muted);
            cursor: pointer; transition: all 0.15s;
        }
        .tag:hover { background: rgba(255,255,255,0.15); }
        .tag.selected, .tag.active { background: var(--accent); color: #fff; }

        /* Chip group */
        .chip-group { display: flex; flex-wrap: wrap; gap: 6px; }

        /* Mode tabs */
        .mode-tab {
            padding: 8px 12px; font-size: 0.85rem; cursor: pointer;
            border-left: 3px solid transparent;
            transition: all 0.15s; color: var(--muted);
        }
        .mode-tab:hover { background: rgba(255,255,255,0.03); color: var(--text); }
        .mode-tab.active {
            border-left-color: var(--accent); color: var(--text);
            background: rgba(233,69,96,0.1);
        }

        /* Status dots */
        .status-dot {
            width: 8px; height: 8px; border-radius: 50%; display: inline-block;
            background: var(--muted);
        }
        .status-dot.ready { background: var(--green); }
        .status-dot.waiting { background: var(--accent); animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Utility */
        .hidden { display: none !important; }

        /* Cards row */
        .cards-row {
            display: flex; gap: 12px; overflow-x: auto; padding-bottom: 8px;
        }

        /* Proposal cards */
        .proposal-card {
            background: var(--card); border-radius: 10px; padding: 16px;
            min-width: 280px; cursor: pointer; transition: all 0.2s;
            border: 2px solid transparent;
        }
        .proposal-card:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.3); }
        .proposal-card.selected { border-color: var(--accent); }

        /* Detail table */
        .detail-table {
            width: 100%; border-collapse: collapse; font-size: 0.85rem;
        }
        .detail-table th { text-align: left; padding: 6px 8px; color: var(--muted); font-size: 0.75rem; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .detail-table td { padding: 6px 8px; border-bottom: 1px solid rgba(255,255,255,0.04); }

        /* Toast */
        .toast {
            position: fixed; top: 16px; right: 16px; z-index: 1000;
            padding: 10px 18px; border-radius: 8px; font-size: 0.85rem;
            background: var(--panel); border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            animation: fadeIn 0.2s ease-out;
            transition: opacity 0.3s;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-8px); } }
        .toast.success { border-color: var(--green); }
        .toast.error { border-color: var(--accent); }

        /* File path */
        .file-path { font-family: "Cascadia Code", "Fira Code", monospace; font-size: 0.8rem; color: var(--muted); }

        /* File System Access notice */
        .fsa-notice {
            font-size: 0.75rem; color: var(--muted); padding: 8px;
            border: 1px dashed rgba(255,255,255,0.1); border-radius: 6px;
            margin-top: 8px;
        }

        /* Textarea */
        textarea {
            width: 100%; background: rgba(255,255,255,0.03); color: var(--text);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
            padding: 10px; font-family: inherit; font-size: 0.9rem; resize: vertical;
        }
        textarea:focus { outline: none; border-color: var(--accent); }

        /* Placeholder area */
        .placeholder-text {
            text-align: center; color: var(--muted); padding: 60px 20px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- 顶部栏 -->
        <div class="topbar">
            <h1>Claude Code 选品工作台</h1>
            <div class="info-group">
                <span id="productCount">-- 条商品</span>
                <span><span class="status-dot waiting" id="bridgeDot"></span> <span id="bridgeStatus">连接中...</span></span>
            </div>
        </div>

        <!-- 主区域 -->
        <div class="main">
            <!-- 侧边栏 -->
            <div class="sidebar">
                <!-- 模式切换 -->
                <div class="section-title">工作模式</div>
                <div id="modeSwitcher">
                    <div class="mode-tab active" data-mode="full" onclick="switchMode('full')">完整选品</div>
                    <div class="mode-tab" data-mode="assist" onclick="switchMode('assist')">辅助增强</div>
                    <div class="mode-tab" data-mode="review" onclick="switchMode('review')">方案评审</div>
                </div>

                <!-- 预筛条件 -->
                <div class="section-title">预筛条件</div>
                <div id="preFilter">
                    <div class="panel-box">
                        <span style="color: var(--muted); font-size: 0.8rem;">暂无条件</span>
                    </div>
                </div>

                <!-- 文件桥接状态 -->
                <div class="section-title">文件桥接</div>
                <div id="bridgePanel">
                    <div class="panel-box">
                        <div style="margin-bottom: 8px;">
                            <span style="color: var(--muted); font-size: 0.75rem;">Prompt 文件</span><br>
                            <span class="file-path" id="promptFileLabel">selection-prompt.md</span>
                        </div>
                        <div>
                            <span style="color: var(--muted); font-size: 0.75rem;">Result 文件</span><br>
                            <span class="file-path" id="resultFileLabel">selection-result.json</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 主内容 -->
            <div class="content">
                <!-- 需求描述 -->
                <div class="section-title">需求描述</div>
                <textarea id="requirementInput" rows="4" placeholder="示例：帮我为某国企工会选配 200 元档位的端午福利方案，需要 8-12 款商品，覆盖粮油、日化、小家电品类，偏好知名品牌，总预算控制在 10 万元以内。"></textarea>

                <!-- 参数微调 -->
                <div class="section-title">参数微调</div>
                <div id="paramChips" class="chip-group">
                    <!-- 动态生成 -->
                </div>

                <!-- 结果展示 -->
                <div class="section-title" style="margin-top: 16px;">选品结果</div>
                <div id="resultsArea">
                    <div class="placeholder-text">输入需求后点击"生成 Prompt"开始选品流程</div>
                </div>
            </div>
        </div>

        <!-- 底部操作栏 -->
        <div class="bottombar">
            <button class="btn-primary" onclick="generatePrompt()">生成 Prompt</button>
            <button onclick="copyPrompt()">复制</button>
            <button class="btn-green" onclick="loadResult()">加载结果</button>
            <button onclick="pasteJson()">粘贴 JSON</button>
            <button onclick="exportSelection()">导出</button>
        </div>
    </div>

    <script>
        // ====== 全局状态 ======
        const DB_NAME = 'ProductLibraryDB';
        const DB_VERSION = 10;
        let db = null;
        let allProducts = [];
        let filteredProducts = [];
        let currentMode = 'full';
        let selectionResult = null;

        // 预筛状态
        let preFilter = {
            majorCategories: new Set(),   // 选中大类
            categories: new Set(),        // 选中品类
            brands: new Set(),            // 选中品牌
            budgetMin: null,
            budgetMax: null,
            marginMin: null,
            excludedBrands: new Set()
        };
        let promptFilePath = 'selection-prompt.md';
        let resultFilePath = 'selection-result.json';

        // ====== IndexedDB ======
        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onerror = () => reject(request.error);
                request.onupgradeneeded = () => {
                    // 此页面仅读取，store 由商品库/方案系统创建
                    // 如果独立打开且 DB 不存在，记录警告
                    console.warn('DB 升级触发，但此页面不创建 store。请先在商品库系统中初始化。');
                };
                request.onsuccess = () => {
                    db = request.result;
                    db.onversionchange = () => { db.close(); db = null; };
                    resolve(db);
                };
            });
        }

        function loadAllProducts() {
            return new Promise((resolve, reject) => {
                if (!db) { reject(new Error('数据库未初始化')); return; }
                const tx = db.transaction('products', 'readonly');
                const store = tx.objectStore('products');
                const request = store.getAll();
                request.onsuccess = () => resolve(request.result || []);
                request.onerror = () => reject(request.error);
            });
        }

        // ====== 辅助函数 ======
        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // ====== 动态字段提取 ======
        // 从产品数据中提取所有大类的唯一值
        function getMajorCategories() {
            const values = new Set();
            allProducts.forEach(p => {
                if (p.majorCategory) values.add(p.majorCategory);
            });
            return [...values].sort();
        }

        // 按已选大类，提取关联的品类唯一值
        function getCategoriesByMajor() {
            const map = {};
            allProducts.forEach(p => {
                if (p.majorCategory && p.category) {
                    if (!map[p.majorCategory]) map[p.majorCategory] = new Set();
                    map[p.majorCategory].add(p.category);
                }
            });
            const result = {};
            for (const [maj, cats] of Object.entries(map)) {
                result[maj] = [...cats].sort();
            }
            return result;
        }

        // 按大类分组提取品牌
        function getBrandsByMajor(majorCats) {
            const map = {};
            const targetMajors = majorCats.size > 0 ? majorCats : new Set(getMajorCategories());
            allProducts.forEach(p => {
                if (targetMajors.has(p.majorCategory) && p.brand) {
                    if (!map[p.majorCategory]) map[p.majorCategory] = new Set();
                    map[p.majorCategory].add(p.brand);
                }
            });
            const result = {};
            for (const [maj, brands] of Object.entries(map)) {
                result[maj] = [...brands].sort();
            }
            return result;
        }

        function toast(msg, type) {
            const el = document.createElement('div');
            el.className = 'toast ' + (type || '');
            el.textContent = msg;
            document.body.appendChild(el);
            setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 2500);
        }

        // ====== 预筛引擎 ======
        function buildPreFilter() {
            const container = document.getElementById('preFilter');
            const majorCats = getMajorCategories();
            const selMajors = preFilter.majorCategories;
            const displayMajors = selMajors.size > 0 ? selMajors : new Set(majorCats);

            let html = '';

            // --- 大类 ---
            html += '<div style="margin-bottom:8px;">';
            html += '<div style="font-size:10px;color:var(--muted);margin-bottom:4px;">大类';
            if (selMajors.size > 0) {
                html += ' <span style="color:var(--green);">' + selMajors.size + '/' + majorCats.length + ' 已选</span>';
            }
            html += '</div><div class="chip-group">';
            majorCats.forEach(maj => {
                const sel = selMajors.has(maj) ? ' selected' : '';
                html += '<span class="tag' + sel + '" data-filter="major" data-value="' + escapeHtml(maj) + '">' + escapeHtml(maj) + '</span>';
            });
            html += '</div></div>';

            // --- 品类 ---
            html += '<div style="margin-bottom:8px;">';
            html += '<div style="font-size:10px;color:var(--muted);margin-bottom:4px;">品类';
            if (preFilter.categories.size > 0) {
                html += ' <span style="color:var(--green);">' + preFilter.categories.size + ' 已选</span>';
            }
            html += '</div>';
            html += '<div style="max-height:160px;overflow-y:auto;">';

            displayMajors.forEach(maj => {
                html += '<div style="font-size:9px;color:var(--green);margin:4px 0 2px;">' + escapeHtml(maj) + ' →</div>';
                html += '<div class="chip-group">';
                const catsByMajor = getCategoriesByMajor();
                const cats = catsByMajor[maj] || [];
                cats.forEach(cat => {
                    const sel = preFilter.categories.has(cat) ? ' selected' : '';
                    html += '<span class="tag' + sel + '" data-filter="category" data-value="' + escapeHtml(cat) + '">' + escapeHtml(cat) + '</span>';
                });
                html += '</div>';
            });
            html += '</div></div>';

            // --- 品牌 ---
            html += '<div style="margin-bottom:8px;">';
            html += '<div style="font-size:10px;color:var(--muted);margin-bottom:4px;">品牌 <span style="color:var(--muted);">· 可选</span></div>';
            html += '<div style="max-height:140px;overflow-y:auto;">';
            displayMajors.forEach(maj => {
                html += '<div style="font-size:9px;color:var(--green);margin:4px 0 2px;">' + escapeHtml(maj) + ':</div>';
                html += '<input type="text" class="brand-search" data-major="' + escapeHtml(maj) + '"'
                    + ' placeholder="搜索品牌..." style="font-size:9px;padding:3px 6px;margin-bottom:3px;width:100%;"'
                    + ' oninput="filterBrands(this)">';
                html += '<div class="chip-group brand-chips" data-major="' + escapeHtml(maj) + '">';
                const brands = getBrandsByMajor(new Set([maj]))[maj] || [];
                brands.forEach(brand => {
                    const sel = preFilter.brands.has(brand) ? ' selected' : '';
                    html += '<span class="tag' + sel + '" data-filter="brand" data-value="' + escapeHtml(brand) + '">' + escapeHtml(brand) + '</span>';
                });
                html += '</div>';
            });
            html += '</div></div>';

            // --- 其他条件 ---
            html += '<div style="margin-bottom:6px;">';
            html += '<div style="font-size:10px;color:var(--muted);margin-bottom:4px;">其他条件</div>';
            html += '<input type="number" id="filterBudgetMin" placeholder="预算下限 (元/人)" style="margin-bottom:4px;font-size:10px;"'
                + ' value="' + (preFilter.budgetMin != null ? preFilter.budgetMin : '') + '" onchange="updateBudgetFilter()">';
            html += '<input type="number" id="filterBudgetMax" placeholder="预算上限 (元/人)" style="margin-bottom:4px;font-size:10px;"'
                + ' value="' + (preFilter.budgetMax != null ? preFilter.budgetMax : '') + '" onchange="updateBudgetFilter()">';
            html += '<input type="number" id="filterMarginMin" placeholder="毛利率下限 (%)" style="margin-bottom:4px;font-size:10px;"'
                + ' value="' + (preFilter.marginMin != null ? preFilter.marginMin : '') + '" onchange="updateMarginFilter()">';
            html += '<input type="text" id="filterExcludeBrands" placeholder="排除品牌（逗号分隔）" style="font-size:10px;" onchange="updateExcludeFilter()">';
            html += '</div>';

            // --- 筛选结果计数 ---
            html += '<div style="font-size:10px;color:var(--green);font-weight:600;" id="filteredCount"></div>';

            container.innerHTML = html;
            updateFilteredCount();

            // 绑定标签点击事件
            container.querySelectorAll('.tag[data-filter]').forEach(tag => {
                tag.addEventListener('click', () => toggleFilter(tag));
            });
        }

        function toggleFilter(el) {
            const type = el.dataset.filter;
            const value = el.dataset.value;

            if (type === 'major') {
                if (preFilter.majorCategories.has(value)) {
                    preFilter.majorCategories.delete(value);
                } else {
                    preFilter.majorCategories.add(value);
                }
                // 清除关联筛选
                preFilter.categories.clear();
                preFilter.brands.clear();
            } else if (type === 'category') {
                if (preFilter.categories.has(value)) {
                    preFilter.categories.delete(value);
                } else {
                    preFilter.categories.add(value);
                }
            } else if (type === 'brand') {
                if (preFilter.brands.has(value)) {
                    preFilter.brands.delete(value);
                } else {
                    preFilter.brands.add(value);
                }
            }
            buildPreFilter();
        }

        function applyFilters() {
            let result = [...allProducts];

            // 大类过滤
            if (preFilter.majorCategories.size > 0) {
                result = result.filter(p => preFilter.majorCategories.has(p.majorCategory));
            }
            // 品类过滤
            if (preFilter.categories.size > 0) {
                result = result.filter(p => preFilter.categories.has(p.category));
            }
            // 品牌白名单
            if (preFilter.brands.size > 0) {
                result = result.filter(p => preFilter.brands.has(p.brand));
            }
            // 预算范围（使用 purchasePrice 作为供货价参考）
            if (preFilter.budgetMin != null) {
                result = result.filter(p => p.purchasePrice && p.purchasePrice >= preFilter.budgetMin * 0.3);
            }
            if (preFilter.budgetMax != null) {
                result = result.filter(p => p.purchasePrice && p.purchasePrice <= preFilter.budgetMax * 0.8);
            }
            // 毛利率
            if (preFilter.marginMin != null) {
                result = result.filter(p => {
                    if (!p.purchasePrice || !p.retailPrice || p.retailPrice === 0) return true;
                    const margin = ((p.retailPrice - p.purchasePrice) / p.retailPrice) * 100;
                    return margin >= preFilter.marginMin;
                });
            }
            // 排除品牌
            if (preFilter.excludedBrands.size > 0) {
                result = result.filter(p => !preFilter.excludedBrands.has(p.brand));
            }

            return result;
        }

        function updateFilteredCount() {
            filteredProducts = applyFilters();
            const el = document.getElementById('filteredCount');
            if (el) {
                el.innerHTML = '● 筛选后: ' + filteredProducts.length.toLocaleString() + ' 条候选';
            }
        }

        function updateBudgetFilter() {
            preFilter.budgetMin = parseFloat(document.getElementById('filterBudgetMin').value) || null;
            preFilter.budgetMax = parseFloat(document.getElementById('filterBudgetMax').value) || null;
            updateFilteredCount();
        }
        function updateMarginFilter() {
            preFilter.marginMin = parseFloat(document.getElementById('filterMarginMin').value) || null;
            updateFilteredCount();
        }
        function updateExcludeFilter() {
            const val = document.getElementById('filterExcludeBrands').value;
            preFilter.excludedBrands = new Set(val.split(',').map(s => s.trim()).filter(Boolean));
            updateFilteredCount();
        }

        function filterBrands(input) {
            const major = input.dataset.major;
            const query = input.value.toLowerCase();
            const chips = input.parentElement.querySelectorAll('.brand-chips .tag');
            chips.forEach(chip => {
                const brand = chip.dataset.value || '';
                chip.style.display = brand.toLowerCase().includes(query) ? '' : 'none';
            });
        }

        // ====== 模式切换 ======
        function switchMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.mode === mode);
            });
        }

        // ====== 底部按钮占位 ======
        function generatePrompt() { toast('Prompt 生成功能将在后续任务中实现'); }
        function copyPrompt() { toast('复制功能将在后续任务中实现'); }
        function loadResult() { toast('加载结果功能将在后续任务中实现'); }
        function pasteJson() { toast('粘贴 JSON 功能将在后续任务中实现'); }
        function exportSelection() { toast('导出功能将在后续任务中实现'); }

        // ====== 应用入口 ======
        (async function init() {
            try {
                await initDB();
                allProducts = await loadAllProducts();
                filteredProducts = [...allProducts];
                buildPreFilter();
                document.getElementById('productCount').textContent =
                    '\u{1F4E6} ' + allProducts.length.toLocaleString() + ' 条商品';
                document.getElementById('bridgeStatus').textContent = 'DB 已连接';
                document.getElementById('bridgeDot').classList.remove('waiting');
                document.getElementById('bridgeDot').classList.add('ready');
            } catch (e) {
                document.getElementById('productCount').textContent = '❌ DB 连接失败';
                document.getElementById('bridgeStatus').textContent = '请在同源下打开（与商品库同一域名）';
                document.getElementById('bridgeDot').classList.remove('waiting');
            }
        })();
    </script>
</body>
</html>
