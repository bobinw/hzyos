<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Code 选品工作台</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --panel: #16213e;
            --card: #0f3460;
            --accent: #e94560;
            --green: #4ecca3;
            --text: #e0e0e0;
            --muted: #888;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg); color: var(--text); min-height: 100vh;
        }

        /* Layout */
        .app { display: flex; flex-direction: column; height: 100vh; }
        .topbar {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 16px; background: var(--panel);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            min-height: 48px;
        }
        .topbar h1 { font-size: 1.1rem; font-weight: 600; }
        .topbar .info-group { display: flex; align-items: center; gap: 16px; font-size: 0.85rem; }
        .main { display: flex; flex: 1; overflow: hidden; }
        .sidebar {
            width: 280px; background: var(--panel); border-right: 1px solid rgba(255,255,255,0.05);
            overflow-y: auto; padding: 12px;
        }
        .content { flex: 1; overflow-y: auto; padding: 16px; }
        .bottombar {
            display: flex; align-items: center; gap: 8px; padding: 8px 16px;
            background: var(--panel); border-top: 1px solid rgba(255,255,255,0.05);
            min-height: 48px;
        }

        /* Section titles */
        .section-title {
            font-size: 10px; text-transform: uppercase; color: var(--muted);
            letter-spacing: 0.5px; margin-bottom: 8px; margin-top: 16px;
        }
        .section-title:first-child { margin-top: 0; }

        /* Panel box */
        .panel-box {
            background: rgba(255,255,255,0.03); border-radius: 8px;
            padding: 12px; margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.06);
        }

        /* Buttons */
        button, .btn {
            padding: 6px 14px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1);
            background: var(--card); color: var(--text); cursor: pointer;
            font-size: 0.85rem; transition: all 0.15s; white-space: nowrap;
        }
        button:hover, .btn:hover { background: #1a4a80; }
        button:disabled, .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
        .btn-primary:hover { background: #d63850; }
        .btn-green { background: var(--green); border-color: var(--green); color: #000; }
        .btn-green:hover { background: #3db88a; }
        .btn-small { padding: 3px 8px; font-size: 0.75rem; }

        /* Tags */
        .tag {
            display: inline-block; padding: 2px 8px; border-radius: 4px;
            font-size: 0.75rem; background: rgba(255,255,255,0.08); color: var(--muted);
            cursor: pointer; transition: all 0.15s;
        }
        .tag:hover { background: rgba(255,255,255,0.15); }
        .tag.selected, .tag.active { background: var(--accent); color: #fff; }

        /* Chip group */
        .chip-group { display: flex; flex-wrap: wrap; gap: 6px; }

        /* Mode tabs */
        .mode-tab {
            padding: 8px 12px; font-size: 0.85rem; cursor: pointer;
            border-left: 3px solid transparent;
            transition: all 0.15s; color: var(--muted);
        }
        .mode-tab:hover { background: rgba(255,255,255,0.03); color: var(--text); }
        .mode-tab.active {
            border-left-color: var(--accent); color: var(--text);
            background: rgba(233,69,96,0.1);
        }

        /* Status dots */
        .status-dot {
            width: 8px; height: 8px; border-radius: 50%; display: inline-block;
            background: var(--muted);
        }
        .status-dot.ready { background: var(--green); }
        .status-dot.waiting { background: var(--accent); animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Utility */
        .hidden { display: none !important; }

        /* Cards row */
        .cards-row {
            display: flex; gap: 12px; overflow-x: auto; padding-bottom: 8px;
        }

        /* Proposal cards */
        .proposal-card {
            background: var(--card); border-radius: 10px; padding: 16px;
            min-width: 280px; cursor: pointer; transition: all 0.2s;
            border: 2px solid transparent;
        }
        .proposal-card:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.3); }
        .proposal-card.selected { border-color: var(--accent); }

        /* Detail table */
        .detail-table {
            width: 100%; border-collapse: collapse; font-size: 0.85rem;
        }
        .detail-table th { text-align: left; padding: 6px 8px; color: var(--muted); font-size: 0.75rem; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .detail-table td { padding: 6px 8px; border-bottom: 1px solid rgba(255,255,255,0.04); }

        /* Toast */
        .toast {
            position: fixed; top: 16px; right: 16px; z-index: 1000;
            padding: 10px 18px; border-radius: 8px; font-size: 0.85rem;
            background: var(--panel); border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            animation: fadeIn 0.2s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-8px); } }
        .toast.success { border-color: var(--green); }
        .toast.error { border-color: var(--accent); }

        /* File path */
        .file-path { font-family: "Cascadia Code", "Fira Code", monospace; font-size: 0.8rem; color: var(--muted); }

        /* File System Access notice */
        .fsa-notice {
            font-size: 0.75rem; color: var(--muted); padding: 8px;
            border: 1px dashed rgba(255,255,255,0.1); border-radius: 6px;
            margin-top: 8px;
        }

        /* Textarea */
        textarea {
            width: 100%; background: rgba(255,255,255,0.03); color: var(--text);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
            padding: 10px; font-family: inherit; font-size: 0.9rem; resize: vertical;
        }
        textarea:focus { outline: none; border-color: var(--accent); }

        /* Placeholder area */
        .placeholder-text {
            text-align: center; color: var(--muted); padding: 60px 20px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- 顶部栏 -->
        <div class="topbar">
            <h1>Claude Code 选品工作台</h1>
            <div class="info-group">
                <span id="productCount">-- 条商品</span>
                <span><span class="status-dot waiting" id="bridgeDot"></span> <span id="bridgeStatus">连接中...</span></span>
            </div>
        </div>

        <!-- 主区域 -->
        <div class="main">
            <!-- 侧边栏 -->
            <div class="sidebar">
                <!-- 模式切换 -->
                <div class="section-title">工作模式</div>
                <div id="modeSwitcher">
                    <div class="mode-tab active" data-mode="full" onclick="switchMode('full')">完整选品</div>
                    <div class="mode-tab" data-mode="assist" onclick="switchMode('assist')">辅助增强</div>
                    <div class="mode-tab" data-mode="review" onclick="switchMode('review')">方案评审</div>
                </div>

                <!-- 预筛条件 -->
                <div class="section-title">预筛条件</div>
                <div id="preFilter">
                    <div class="panel-box">
                        <span style="color: var(--muted); font-size: 0.8rem;">暂无条件</span>
                    </div>
                </div>

                <!-- 文件桥接状态 -->
                <div class="section-title">文件桥接</div>
                <div id="bridgePanel">
                    <div class="panel-box">
                        <div style="margin-bottom: 8px;">
                            <span style="color: var(--muted); font-size: 0.75rem;">Prompt 文件</span><br>
                            <span class="file-path" id="promptFileLabel">selection-prompt.md</span>
                        </div>
                        <div>
                            <span style="color: var(--muted); font-size: 0.75rem;">Result 文件</span><br>
                            <span class="file-path" id="resultFileLabel">selection-result.json</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 主内容 -->
            <div class="content">
                <!-- 需求描述 -->
                <div class="section-title">需求描述</div>
                <textarea id="requirementInput" rows="4" placeholder="示例：帮我为某国企工会选配 200 元档位的端午福利方案，需要 8-12 款商品，覆盖粮油、日化、小家电品类，偏好知名品牌，总预算控制在 10 万元以内。"></textarea>

                <!-- 参数微调 -->
                <div class="section-title">参数微调</div>
                <div id="paramChips" class="chip-group">
                    <!-- 动态生成 -->
                </div>

                <!-- 结果展示 -->
                <div class="section-title" style="margin-top: 16px;">选品结果</div>
                <div id="resultsArea">
                    <div class="placeholder-text">输入需求后点击"生成 Prompt"开始选品流程</div>
                </div>
            </div>
        </div>

        <!-- 底部操作栏 -->
        <div class="bottombar">
            <button class="btn-primary" onclick="generatePrompt()">生成 Prompt</button>
            <button onclick="copyPrompt()">复制</button>
            <button class="btn-green" onclick="loadResult()">加载结果</button>
            <button onclick="pasteJson()">粘贴 JSON</button>
            <button onclick="exportSelection()">导出</button>
        </div>
    </div>

    <script>
        // ====== 全局状态 ======
        const DB_NAME = 'ProductLibraryDB';
        const DB_VERSION = 10;
        let db = null;
        let allProducts = [];
        let filteredProducts = [];
        let currentMode = 'full';
        let selectionResult = null;
        let promptFilePath = 'selection-prompt.md';
        let resultFilePath = 'selection-result.json';

        // ====== IndexedDB ======
        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);
                request.onerror = () => reject(request.error);
                request.onsuccess = () => {
                    db = request.result;
                    db.onversionchange = () => { db.close(); db = null; };
                    resolve(db);
                };
            });
        }

        function loadAllProducts() {
            return new Promise((resolve, reject) => {
                const tx = db.transaction('products', 'readonly');
                const store = tx.objectStore('products');
                const request = store.getAll();
                request.onsuccess = () => resolve(request.result || []);
                request.onerror = () => reject(request.error);
            });
        }

        // ====== 辅助函数 ======
        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function toast(msg, type) {
            const el = document.createElement('div');
            el.className = 'toast ' + (type || '');
            el.textContent = msg;
            document.body.appendChild(el);
            setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 300); }, 2500);
        }

        // ====== 模式切换 ======
        function switchMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.mode === mode);
            });
        }

        // ====== 底部按钮占位 ======
        function generatePrompt() { toast('Prompt 生成功能将在后续任务中实现'); }
        function copyPrompt() { toast('复制功能将在后续任务中实现'); }
        function loadResult() { toast('加载结果功能将在后续任务中实现'); }
        function pasteJson() { toast('粘贴 JSON 功能将在后续任务中实现'); }
        function exportSelection() { toast('导出功能将在后续任务中实现'); }

        // ====== 应用入口 ======
        (async function init() {
            try {
                await initDB();
                allProducts = await loadAllProducts();
                filteredProducts = [...allProducts];
                document.getElementById('productCount').textContent =
                    '\u{1F4E6} ' + allProducts.length.toLocaleString() + ' 条商品';
                document.getElementById('bridgeStatus').textContent = 'DB 已连接';
                document.getElementById('bridgeDot').classList.remove('waiting');
                document.getElementById('bridgeDot').classList.add('ready');
            } catch (e) {
                document.getElementById('productCount').textContent = '❌ DB 连接失败';
                document.getElementById('bridgeStatus').textContent = '请在同源下打开（与商品库同一域名）';
                document.getElementById('bridgeDot').classList.remove('waiting');
            }
        })();
    </script>
</body>
</html>
