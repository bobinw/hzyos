<!DOCTYPE html>
<html lang="zh-CN">

<script>
// ========== IndexedDB 数据库（与商品库共享） ==========
const DB_NAME = 'ProductLibraryDB';
const DB_VERSION = 5;
let db = null;

// ========== 数据变量 ==========
let products = [];
let suppliers = [];
let templates = {};           // 字段映射模板（来自商品库）
let projects = [];
let proposals = [];
let pptTemplates = [];      // 方案PPT模板
let excelTemplates = [];   // 方案Excel模板
let customers = [];           // 客户列表
let nextProjectId = 1;
let nextProposalId = 1;
let nextTemplateId = 1;
let nextCustomerId = 1;

// 当前编辑状态
let currentProjectId = null;
let currentEditingTemplateId = null;
let currentEditingTemplateType = 'ppt'; // 'ppt' | 'excel'

// ========== 数据库操作 ==========
function initDB() {
    return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);
        request.onerror = () => { console.error('DB打开失败:', request.error); reject(request.error); };
        request.onsuccess = () => { db = request.result; console.log('方案系统DB连接成功'); resolve(db); };
        request.onupgradeneeded = (event) => {
            const database = event.target.result;
            if (!database.objectStoreNames.contains('products')) database.createObjectStore('products', { keyPath: 'id' });
            if (!database.objectStoreNames.contains('suppliers')) database.createObjectStore('suppliers', { keyPath: 'id' });
            if (!database.objectStoreNames.contains('templates')) database.createObjectStore('templates', { keyPath: 'id' });
            if (!database.objectStoreNames.contains('settings')) database.createObjectStore('settings', { keyPath: 'key' });
            if (!database.objectStoreNames.contains('projects')) database.createObjectStore('projects', { keyPath: 'id' });
            if (!database.objectStoreNames.contains('proposals')) database.createObjectStore('proposals', { keyPath: 'id' });
            if (!database.objectStoreNames.contains('pptTemplates')) database.createObjectStore('pptTemplates', { keyPath: 'id' });
            if (!database.objectStoreNames.contains('excelTemplates')) database.createObjectStore('excelTemplates', { keyPath: 'id' });
            if (!database.objectStoreNames.contains('customers')) database.createObjectStore('customers', { keyPath: 'id' });
            console.log('方案系统DB结构创建完成');
        };
    });
}

function saveToDB(storeName, data) {
    return new Promise((resolve, reject) => {
        if (!db) { reject('DB未初始化'); return; }
        const tx = db.transaction([storeName], 'readwrite');
        const store = tx.objectStore(storeName);
        if (Array.isArray(data)) {
            const cr = store.clear();
            cr.onsuccess = () => {
                const adds = data.map(item => new Promise((ra, rj) => {
                    const req = store.add(item);
                    req.onsuccess = () => ra(); req.onerror = () => rj(req.error);
                }));
                Promise.all(adds).then(() => resolve(adds.length)).catch(reject);
            };
            cr.onerror = () => reject(cr.error);
        } else {
            const req = store.put(data);
            req.onsuccess = () => resolve(data); req.onerror = () => reject(req.error);
        }
    });
}

function loadFromDB(storeName) {
    return new Promise((resolve, reject) => {
        if (!db) { reject('DB未初始化'); return; }
        const tx = db.transaction([storeName], 'readonly');
        const store = tx.objectStore(storeName);
        const req = store.getAll();
        req.onsuccess = () => resolve(req.result || []);
        req.onerror = () => reject(req.error);
    });
}

async function loadSetting(key) {
    return new Promise((resolve, reject) => {
        if (!db) { reject('DB未初始化'); return; }
        const tx = db.transaction(['settings'], 'readonly');
        const store = tx.objectStore('settings');
        const req = store.get(key);
        req.onsuccess = () => resolve(req.result ? req.result.value : null);
        req.onerror = () => reject(req.error);
    });
}

async function saveSetting(key, value) {
    return new Promise((resolve, reject) => {
        if (!db) { reject('DB未初始化'); return; }
        const tx = db.transaction(['settings'], 'readwrite');
        const store = tx.objectStore('settings');
        const req = store.put({ key, value });
        req.onsuccess = () => resolve(value); req.onerror = () => reject(req.error);
    });
}

async function saveAllData() {
    try {
        const tmplArray = Object.values(templates).map(t => ({ ...t, id: t.supplierId }));
        await Promise.all([
            saveToDB('projects', projects),
            saveToDB('proposals', proposals),
            saveToDB('pptTemplates', pptTemplates),
            saveToDB('excelTemplates', excelTemplates),
            saveToDB('customers', customers),
            saveSetting('nextProjectId', nextProjectId),
            saveSetting('nextProposalId', nextProposalId),
            saveSetting('nextTemplateId', nextTemplateId),
            saveSetting('nextCustomerId', nextCustomerId)
        ]);
        console.log('方案数据保存成功');
        return true;
    } catch (e) {
        console.error('保存失败:', e);
        return false;
    }
}

// ========== 辅助函数 ==========
function showPage(pageId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    const page = document.getElementById(pageId);
    if (page) page.classList.add('active');
    else { console.warn('Page not found:', pageId); return; }
    // 更新导航高亮
    document.querySelectorAll('nav a').forEach(a => a.classList.remove('bg-blue-50', 'text-blue-600'));
    const navMap = { 'page-projects': 'nav-projects', 'page-customers': 'nav-customers', 'page-templates': 'nav-templates', 'page-ai-settings': 'nav-ai-settings' };
    if (navMap[pageId]) {
        const nav = document.getElementById(navMap[pageId]);
        if (nav) nav.classList.add('bg-blue-50', 'text-blue-600');
    }
    // 自动渲染
    if (pageId === 'page-projects') renderProjectList();
    if (pageId === 'page-customers') renderCustomerList();
    if (pageId === 'page-templates') { switchTemplateTab(currentEditingTemplateType); }
    if (pageId === 'page-ai-settings') showAISettingsForm();
}

function closeModal(id) { document.getElementById(id).classList.remove('active'); }
function openModal(id) { document.getElementById(id).classList.add('active'); }

function formatDate(d) { if (!d) return ''; return new Date(d).toISOString().split('T')[0]; }
function formatMoney(n) { if (n === null || n === undefined || isNaN(n)) return '-'; return '¥' + Number(n).toFixed(2); }
function today() { return new Date().toISOString().split('T')[0]; }

// ========== 默认方案模板 ==========
const DEFAULT_PPT_TEMPLATE = {
    id: 'default',
    name: '默认方案模板',
    isDefault: true,
    source: 'system',
    slides: [
        { type: 'cover', title: '封面页', layout: 'full', fields: ['projectName', 'customerCompany', 'date'] },
        { type: 'content', title: '需求分析', layout: 'full', fields: ['requirementSummary'] },
        { type: 'content', title: '方案概览', layout: 'top-bottom', fields: ['proposalName', 'tagline', 'productTable', 'price', 'budgetUtilization', 'rationale'] },
        { type: 'product', title: '产品详情', layout: 'grid', fields: ['productImage', 'productName', 'productSpec', 'purchasePrice', 'retailPrice'] },
        { type: 'summary', title: '价格汇总', layout: 'full', fields: ['priceTable', 'totalPrice', 'perPersonPrice'] },
        { type: 'back', title: '封底', layout: 'full', fields: ['contactInfo'] }
    ],
    style: { primaryColor: '#1a56db', fontFamily: '微软雅黑', logoPosition: 'top-left', showPageNumber: true, watermark: '' },
    createdAt: '', updatedAt: ''
};

const DEFAULT_EXCEL_TEMPLATE = {
    id: 'default-excel',
    name: '默认Excel模板',
    isDefault: true,
    source: 'system',
    type: 'excel',
    sheets: [
        { name: '封面', fields: ['projectName', 'customerCompany', 'date'] },
        { name: '方案概览', fields: ['proposalName', 'tagline', 'theme', 'totalPerPerson', 'totalPrice', 'overallMargin', 'budgetUtilization'] },

        { name: '需求分析', fields: ['requirementSummary'] }
    ],
    style: { primaryColor: '1a56db', fontFamily: '微软雅黑', showHeader: true, freezePane: true },
    createdAt: '', updatedAt: ''

function getDefaultPptTemplates() {
    return [{ ...DEFAULT_PPT_TEMPLATE, createdAt: today(), updatedAt: today() }];
}

function getDefaultExcelTemplates() {
    return [{ ...DEFAULT_EXCEL_TEMPLATE, createdAt: today(), updatedAt: today() }];
}

// ========== 初始化 ==========
async function init() {
    await initDB();
    // 加载商品库数据（只读引用）
    try {
        products = await loadFromDB('products') || [];
        suppliers = await loadFromDB('suppliers') || [];
        const tmplData = await loadFromDB('templates') || [];
        tmplData.forEach(t => { templates[t.supplierId || t.id] = t; });
    } catch (e) { console.warn('加载商品库数据失败:', e); }
    // 加载方案系统数据
    projects = await loadFromDB('projects') || [];
    proposals = await loadFromDB('proposals') || [];
    pptTemplates = await loadFromDB('pptTemplates') || [];
    if (pptTemplates.length === 0) pptTemplates = getDefaultPptTemplates();
    excelTemplates = await loadFromDB('excelTemplates') || [];
    if (excelTemplates.length === 0) excelTemplates = getDefaultExcelTemplates();
    customers = await loadFromDB('customers') || [];
    nextProjectId = (await loadSetting('nextProjectId')) || 1;
    nextProposalId = (await loadSetting('nextProposalId')) || 1;
    nextTemplateId = (await loadSetting('nextTemplateId')) || 1;
    nextCustomerId = (await loadSetting('nextCustomerId')) || 1;
    // 迁移客户数据
    await migrateCustomers();
    renderProjectList();
}

// ========== 客户数据迁移 ==========
async function migrateCustomers() {
    const migrated = await loadSetting('customerMigrated');
    if (migrated) return;

    console.log('开始迁移客户数据...');
    const customerMap = new Map();

    projects.forEach(p => {
        if (!p.customerCompany) return;
        const key = p.customerCompany.toLowerCase().trim();
        if (!customerMap.has(key)) {
            customerMap.set(key, {
                id: nextCustomerId++,
                customerCompany: p.customerCompany,
                customerContact: p.customerContact || '',
                companyType: p.companyType || '',
                companySize: p.companySize || '',
                region: p.region || '',
                industry: p.industry || '',
                purchaseMode: p.purchaseMode || '',
                invoiceType: p.invoiceType || [],
                paymentTerms: p.paymentTerms || '',
                notes: '',
                createdAt: p.createdAt || new Date().toISOString(),
                updatedAt: new Date().toISOString()
            });
        }
        p.customerId = customerMap.get(key).id;
        // 移除项目中的客户字段
        delete p.customerCompany;
        delete p.customerContact;
        delete p.companyType;
        delete p.companySize;
        delete p.region;
        delete p.industry;
        delete p.purchaseMode;
        delete p.invoiceType;
        delete p.paymentTerms;
    });

    customers = Array.from(customerMap.values());
    if (customers.length > 0) {
        await saveAllData();
        await saveSetting('customerMigrated', true);
        console.log(`迁移完成：创建了 ${customers.length} 个客户记录`);
    }
}

// ========== 客户辅助函数 ==========
function getProjectCustomer(project) {
    if (!project.customerId) return null;
    return customers.find(c => c.id === project.customerId);
}

// ========== 项目列表 ==========
function getProjectStats() {
    const total = projects.length;
    const generated = projects.filter(p => ['generated', 'adjusted', 'confirmed'].includes(p.status)).length;
    const confirmed = projects.filter(p => p.status === 'confirmed').length;
    const inProgress = projects.filter(p => ['drafting', 'chatting', 'requirement_ready', 'generating'].includes(p.status)).length;
    return { total, generated, confirmed, inProgress };
}

// ========== 客户管理 ==========
function getCustomerStats() {
    const total = customers.length;
    const activeCount = new Set(projects.filter(p => p.customerId).map(p => p.customerId)).size;
    const totalProjects = projects.length;
    return { total, activeCount, totalProjects };
}

function renderCustomerList() {
    const stats = getCustomerStats();
    document.getElementById('customer-stats').innerHTML = `
        <div class="bg-white rounded-lg shadow p-4"><div class="text-2xl font-bold text-blue-600">${stats.total}</div><div class="text-sm text-gray-500">客户总数</div></div>
        <div class="bg-white rounded-lg shadow p-4"><div class="text-2xl font-bold text-green-600">${stats.activeCount}</div><div class="text-sm text-gray-500">有项目的客户</div></div>
        <div class="bg-white rounded-lg shadow p-4"><div class="text-2xl font-bold text-purple-600">${stats.totalProjects}</div><div class="text-sm text-gray-500">项目总数</div></div>
        <div class="bg-white rounded-lg shadow p-4"><div class="text-2xl font-bold text-orange-600">${customers.length > 0 ? Math.round(stats.totalProjects / stats.activeCount) : 0}</div><div class="text-sm text-gray-500">户均项目</div></div>

async function saveCustomer(fromProjectForm, editId = null) {
    const getVal = id => document.getElementById(id)?.value?.trim() || '';
    const invoiceTypes = [];
    if (document.getElementById('customer-invoice-special')?.checked) invoiceTypes.push('专票');
    if (document.getElementById('customer-invoice-normal')?.checked) invoiceTypes.push('普票');
    if (document.getElementById('customer-invoice-tax')?.checked) invoiceTypes.push('含税');

    const customerData = {
        customerCompany: getVal('customer-company'),
        customerContact: getVal('customer-contact'),
        companyType: getVal('customer-companyType'),
        companySize: getVal('customer-companySize'),
        region: getVal('customer-region'),
        industry: getVal('customer-industry'),
        purchaseMode: getVal('customer-purchaseMode'),
        paymentTerms: getVal('customer-paymentTerms'),
        invoiceType: invoiceTypes,
        notes: getVal('customer-notes'),
        updatedAt: new Date().toISOString()
    };

    if (!customerData.customerCompany) {
        alert('请输入客户公司名称');
        return;
    }

    if (editId) {
        const idx = customers.findIndex(c => c.id === editId);
        if (idx >= 0) {
            customers[idx] = { ...customers[idx], ...customerData };
        }
    } else {
        customerData.id = nextCustomerId++;
        customerData.createdAt = new Date().toISOString();
        customers.push(customerData);
    }

    await saveAllData();
    closeModal('modal-customer');

    if (fromProjectForm) {
        // 刷新项目表单的客户选择器
        showNewProjectModal();
        // 选中新创建的客户
        setTimeout(() => {
            const select = document.getElementById('np-customerId');
            if (select && editId === null) {
                select.value = nextCustomerId - 1; // 刚创建的客户ID
                fillCustomerPreview();
            }
        }, 100);
    } else {
        renderCustomerList();
    }
}

async function deleteCustomer(customerId) {
    const customerProjects = projects.filter(p => p.customerId === customerId);
    if (customerProjects.length > 0) {
        alert(`该客户有 ${customerProjects.length} 个关联项目，无法删除`);
        return;
    }
    if (!confirm('确定要删除这个客户吗？')) return;

    customers = customers.filter(c => c.id !== customerId);
    await saveAllData();
    renderCustomerList();
}

function fillCustomerPreview() {

    const preview = document.getElementById('customer-preview');

    const customer = customers.find(c => c.id === parseInt(customerId));

        document.getElementById('preview-companyType').textContent = customer.companyType || '-';

        document.getElementById('preview-region').textContent = customer.region || '-';

function toggleBidFields() {
    const show = document.getElementById('np-hasBidDoc')?.value === '是';
    const display = show ? 'block' : 'none';
    ['bid-row-deadline', 'bid-row-scoring', 'bid-row-qual'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.style.display = display;
    });
}

function collectProjectForm() {
    const getVal = id => document.getElementById(id)?.value?.trim() || '';
    const invoiceTypes = [];
    if (document.getElementById('np-invoice-special')?.checked) invoiceTypes.push('专票');
    if (document.getElementById('np-invoice-normal')?.checked) invoiceTypes.push('普票');
    if (document.getElementById('np-invoice-tax')?.checked) invoiceTypes.push('含税');
    const hasBid = getVal('np-hasBidDoc') === '是';

    return {
        id: nextProjectId,
        name: getVal('np-name'),
        customerId: parseInt(getVal('np-customerId')) || null,
        employeeTiers: getVal('np-employeeTiers'),
        deliveryMode: getVal('np-deliveryMode'),
        invoiceType: invoiceTypes,
        needCustomization: getVal('np-needCustomization'),
        needSample: getVal('np-needSample'),
        previousWelfare: getVal('np-previousWelfare'),
        employeeFeedback: getVal('np-employeeFeedback'),
        competitorRef: getVal('np-competitorRef'),
        decisionMaker: getVal('np-decisionMaker'),
        proposalUsage: getVal('np-proposalUsage'),
        taboos: getVal('np-taboos'),
        urgency: getVal('np-urgency') || '正常',
        peopleCount: parseInt(getVal('np-peopleCount')) || 0,
        budgetPerPerson: parseFloat(getVal('np-budgetPerPerson')) || 0,
        deadline: getVal('np-deadline'),
        fulfillmentDays: parseInt(getVal('np-fulfillmentDays')) || 14,
        targetMargin: parseFloat(getVal('np-targetMargin')) || 0,
        initialScene: getVal('np-initialScene'),
        initialTags: getVal('np-initialTags').split(/[,，]/).filter(Boolean),
        notes: getVal('np-notes'),
        hasBidDoc: getVal('np-hasBidDoc') === '是',
        bidDeadline: getVal('np-bidDeadline'),
        bidScoring: getVal('np-bidScoring'),
        bidQualifications: getVal('np-bidQualifications'),
        conversation: [],
        structuredRequirement: '',
        constraints: [],
        proposalCount: 6,
        status: 'drafting',
        templateId: getVal('np-proposalUsage') === '内部快速决策' ? 'default-excel' : 'default',
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString()
    };
}

async function saveProjectDraft() {
    const project = collectProjectForm();
    if (!project.name) { alert('请输入项目名称'); return; }
    projects.push(project);
    nextProjectId++;
    await saveAllData();
    closeModal('modal-new-project');
    renderProjectList();
}

async function startProjectChat() {
    const project = collectProjectForm();
    if (!project.name || !project.customerId || !project.peopleCount || !project.budgetPerPerson || !project.deadline) {
        alert('请填写所有必填字段（标*的）');
        return;
    }
    project.status = 'chatting';
    projects.push(project);
    currentProjectId = project.id;
    nextProjectId++;
    await saveAllData();
    closeModal('modal-new-project');
    startChatSession(project);
}

// ========== AI 对话 ==========
function startChatSession(project) {
    showPage('page-chat');
    document.getElementById('chat-project-name').textContent = project.name;
    document.getElementById('chat-messages').innerHTML = '';
    document.getElementById('chat-summary').innerHTML = '<span class="text-gray-400">对话开始后逐步提取...</span>';

    // 从客户数据获取信息
    const customer = getProjectCustomer(project);
    const companyType = customer?.companyType || '';
    const companySize = customer?.companySize || '';
    const region = customer?.region || '';
    const industry = customer?.industry || '';
    const customerCompany = customer?.customerCompany || '客户';

    // 构建初始上下文
    const contextParts = [];
    if (companyType && companySize && region) contextParts.push(`${companyType}，${companySize}，${region}`);
    if (industry) contextParts.push(`${industry}行业`);
    contextParts.push(`${project.peopleCount}人，人均预算${project.budgetPerPerson}元`);
    if (project.initialScene) contextParts.push(`${project.initialScene}场景`);
    if (project.urgency !== '正常') contextParts.push(`紧急程度：${project.urgency}`);
    if (project.initialTags.length > 0) contextParts.push(`标签：${project.initialTags.join('、')}`);

    const firstMessage = `你好！我是团购需求顾问。根据你提供的初步信息，我来帮你梳理一下：

你这是一个**${project.name}**项目，客户是${customerCompany}${companyType ? '（' + companyType + '）' : ''}${companySize ? '，规模' + companySize : ''}${region ? '，位于' + region : ''}。

${project.peopleCount}人，人均预算${formatMoney(project.budgetPerPerson)}，${project.deadline ? '预计' + project.deadline + '前交付' : ''}。${project.initialScene ? '属于' + project.initialScene + '场景。' : ''}

${project.urgency === '紧急' ? '这个项目时间很紧，我会优先考虑现货产品。' : ''}
${project.urgency === '加急' ? '时间比较紧，我会倾向于备货周期短的产品。' : ''}

我们先从用户画像开始：**这批福利的最终用户大概是什么年龄层？男女比例怎么样？**`;

    addChatMessage('ai', firstMessage);
    updateChatSummary(project);
}

function addChatMessage(role, content) {
    // 保存到项目对话记录
    const project = findProject(currentProjectId);
    if (project) {
        if (!project.conversation) project.conversation = [];
        project.conversation.push({ role, content, time: new Date().toISOString() });
        project.updatedAt = new Date().toISOString();
        saveAllData().catch(() => {}); // 异步保存，不阻塞
    }

    const div = document.createElement('div');
    div.className = `chat-bubble ${role === 'ai' ? 'chat-ai' : 'chat-user'}`;
    div.innerHTML = `<div class="text-xs ${role === 'ai' ? 'text-blue-500' : 'text-green-500'} mb-1">${role === 'ai' ? '🤖 AI顾问' : '👤 我'}</div><div class="text-sm">${content.replace(/\n/g, '<br>')}</div>`;
    document.getElementById('chat-messages').appendChild(div);
    div.scrollIntoView({ behavior: 'smooth' });
}

async function finishChat() {
    const project = findProject(currentProjectId);
    if (!project) return;

    // 从对话记录中提取用户回复
    const userReplies = (project.conversation || [])
        .filter(m => m.role === 'user')
        .map(m => m.content);
    const allText = userReplies.join('\n');

    project.structuredRequirement = generateStructuredRequirement(project, allText);
    project.status = 'requirement_ready';
    project.updatedAt = new Date().toISOString();

    // 更新项目
    const idx = projects.findIndex(p => p.id === project.id);
    if (idx >= 0) projects[idx] = project;
    await saveAllData();

    // 跳转到需求确认页
    showRequirementConfirm(project);
}

async function generateProposals(projectId) {
    const project = findProject(projectId);
    if (!project) return;
    if (products.length === 0) { alert('商品库为空，请先在商品库中导入商品数据'); return; }

    // 收集约束
    const constraintRows = document.querySelectorAll(`#constraint-rows-${projectId} .flex`);
    project.constraints = [];
    constraintRows.forEach(row => {
        const field = row.querySelector('select').value;
        const operator = row.querySelectorAll('select')[1].value;
        const value = row.querySelector('input').value.trim();
        if (field && value) project.constraints.push({ field, operator, value });
    });

    const count = parseInt(document.getElementById('gen-proposalCount')?.value) || 6;
    project.proposalCount = count;
    project.status = 'generating';
    project.updatedAt = new Date().toISOString();
    await saveAllData();

    // 显示加载
    document.getElementById(`proposal-grid-${projectId}`).innerHTML = `
        <div class="col-span-3 text-center py-8">
            <div class="animate-spin text-4xl mb-4">🤖</div>
            <div class="text-gray-500">AI 正在分析商品库并生成方案...</div>
            <div class="text-xs text-gray-400 mt-2">已筛选 ${products.length} 个商品，正在组合最优方案</div>
        </div>`;

    // 模拟 AI 生成
    setTimeout(async () => {
        await mockGenerateProposals(project, count);
        project.status = 'generated';
        project.updatedAt = new Date().toISOString();
        await saveAllData();
        showRequirementConfirm(project);
    }, 2000);
}

async function mockGenerateProposals(project, count) {
    // 价格逻辑：报价 = 采购价 / (1 - 毛利率)
    const budget = project.budgetPerPerson || 200;
    const targetMargin = (project.targetMargin || 20) / 100; // 默认20%毛利率
    const marginFactor = 1 - targetMargin; // 用于计算报价的系数

    // 预筛选商品：采购价上限 = 预算 × (1 - 毛利率)，这样报价才不超过预算
    const maxPurchasePrice = budget * marginFactor;
    const minPurchasePrice = budget * 0.1; // 单品采购价下限

    let candidates = [...products];
    candidates = candidates.filter(p => p.purchasePrice >= minPurchasePrice && p.purchasePrice <= maxPurchasePrice);

    if (candidates.length === 0) {
        // 放宽条件：采购价不超过预算×(1-最低毛利率10%)
        candidates = [...products].filter(p => p.purchasePrice <= budget * 0.9);
    }

    // 约束筛选
    project.constraints.forEach(c => {
        if (c.field === '品牌级别' && c.operator === '必须') {
            candidates = candidates.filter(p => p.brandLevel === c.value);
        }
        if (c.field === '一件代发' && c.operator === '必须') {
            candidates = candidates.filter(p => p.normalExpressPrice && p.normalExpressPrice > 0);
        }
        if (c.field === '库存类型' && c.operator === '必须') {
            candidates = candidates.filter(p => p.stockType === c.value);
        }
    });

    if (candidates.length < 3) candidates = [...products].slice(0, 20);

    // 删除旧方案
    proposals = proposals.filter(p => p.projectId !== project.id);

    const themes = ['品质生活', '实用主义', '国潮文化', '健康养生', '简约时尚', '混搭精选', '轻奢体验', '商务大气', '新潮有趣', '经典传承'];
    const taglines = [
        '品质之选，彰显企业关怀', '实用搭配，性价比首选', '国风雅韵，文化自信',
        '健康生活，关爱员工', '简约不凡，细节之美', '精选组合，面面俱到',
        '轻奢体验，尊享品质', '商务典范，气度不凡', '新潮好物，年轻活力'
    ];

    for (let i = 0; i < count; i++) {
        // 选择产品，确保总报价在预算范围内
        const shuffled = [...candidates].sort(() => Math.random() - 0.5);
        const selected = [];
        let currentTotal = 0;
        const maxQuoteTotal = budget * 1.05; // 允许稍微超5%

        for (const p of shuffled) {
            if (selected.length >= 4) break; // 最多4个产品
            // 报价 = 采购价 / (1 - 毛利率)，稍微浮动±5%
            const estimatedQuote = p.purchasePrice / marginFactor * (0.95 + Math.random() * 0.1);
            if (currentTotal + estimatedQuote <= maxQuoteTotal) {
                selected.push(p);
                currentTotal += estimatedQuote;
            }
        }

        // 如果一个产品都没选上，强制选一个最便宜的
        if (selected.length === 0 && shuffled.length > 0) {
            const sorted = [...shuffled].sort((a, b) => a.purchasePrice - b.purchasePrice);
            selected.push(sorted[0]);
        }

        const proposalProducts = selected.map(p => {
            const quantity = 1;
            // 报价 = 采购价 / (1 - 毛利率)，稍微浮动±5%以产生差异化方案
            const quotePrice = p.purchasePrice / marginFactor * (0.95 + Math.random() * 0.1);
            const actualMargin = ((quotePrice - p.purchasePrice) / quotePrice * 100).toFixed(1);
            // 获取供应商名称
            const supplierObj = suppliers.find(s => s.id === p.supplierId);
            const supplierName = supplierObj?.name || p.supplierName || '-';
            return {
                productId: p.id, sku: p.sku, name: p.name, supplierId: p.supplierId, supplier: supplierName,
                brand: p.brand, brandLevel: p.brandLevel || '',
                purchasePrice: p.purchasePrice, quotePrice: Math.round(quotePrice * 100) / 100,
                margin: actualMargin + '%', image: p.mainImage || '', quantity, subtotal: Math.round(quotePrice * 100) / 100
            };
        });

        const totalPerPerson = proposalProducts.reduce((s, p) => s + p.quotePrice, 0);
        const totalCost = proposalProducts.reduce((s, p) => s + p.purchasePrice, 0);
        const overallMargin = totalPerPerson > 0 ? ((totalPerPerson - totalCost) / totalPerPerson * 100).toFixed(1) : 0;
        const budgetUtil = budget > 0 ? (totalPerPerson / budget * 100).toFixed(0) : 0;
        const maxLeadTime = Math.max(...selected.map(p => {
            const lt = (p.leadTime || '0天').replace('天', '');
            return parseInt(lt) || 0;
        }));
        const canFulfill = !project.fulfillmentDays || maxLeadTime <= project.fulfillmentDays;

        proposals.push({
            id: nextProposalId++,
            projectId: project.id,
            index: i + 1,
            name: `方案${i + 1}：${themes[i % themes.length]}组合`,
            tagline: taglines[i % taglines.length],
            theme: themes[i % themes.length],
            products: proposalProducts,
            totalPerPerson: Math.round(totalPerPerson * 100) / 100,
            totalPrice: Math.round(totalPerPerson * project.peopleCount * 100) / 100,
            totalCost: Math.round(totalCost * 100) / 100,
            overallMargin: parseFloat(overallMargin),
            budgetUtilization: parseInt(budgetUtil),
            maxLeadTime,
            canFulfill,
            aiRationale: `基于${project.name}的需求，人均供货预算${budget}元，目标毛利率${(targetMargin * 100).toFixed(0)}%。本方案聚焦${themes[i % themes.length]}方向，选择了${proposalProducts.map(p => p.brand + p.name.replace(/礼盒|套装/g, '')).join(' + ')}的组合，供货总价${formatMoney(totalPerPerson)}/人，实际毛利率${overallMargin}%，预算利用率${budgetUtil}%。${canFulfill ? '在履约周期内可交付。' : '注意：部分产品备货周期较长。'}`,
            isManualEdited: false, manualChanges: '',
            createdAt: new Date().toISOString(), updatedAt: new Date().toISOString()
        });
    }
    await saveAllData();
}

        grid.innerHTML = '<div class="col-span-3 text-center text-gray-400 py-8">点击"生成方案"开始</div>';
        return;

// ========== 项目详情页入口 ==========
function openProject(projectId) {
    const project = findProject(projectId);
    if (!project) return;

    if (project.status === 'chatting') {
        currentProjectId = projectId;
        showPage('page-chat');
        document.getElementById('chat-project-name').textContent = project.name;
        document.getElementById('chat-status').textContent = '对话中';
        // 恢复对话历史
        document.getElementById('chat-messages').innerHTML = '';
        if (project.conversation && project.conversation.length > 0) {
            project.conversation.forEach(msg => addChatMessage(msg.role, msg.content));
        }
        updateChatSummary(project);
    } else if (['requirement_ready', 'generating', 'generated', 'adjusted', 'confirmed'].includes(project.status)) {
        showRequirementConfirm(project);
    } else {
        // draft - 继续编辑
        showNewProjectModal();
    }
}

async function saveTemplateConfig() {
    const list = currentEditingTemplateType === 'excel' ? excelTemplates : pptTemplates;
    const t = list.find(tp => tp.id === currentEditingTemplateId);
    if (!t) return;

    t.name = document.getElementById('tmpl-name')?.value || t.name;
    t.style.primaryColor = document.getElementById('tmpl-color')?.value || t.style.primaryColor;
    t.style.fontFamily = document.getElementById('tmpl-font')?.value || t.style.fontFamily;
    t.updatedAt = new Date().toISOString();

    if (currentEditingTemplateType === 'excel') {
        t.style.showHeader = document.getElementById('tmpl-showheader')?.checked !== false;
        t.style.freezePane = document.getElementById('tmpl-freeze')?.checked !== false;
        const sheetDivs = document.querySelectorAll('#tmpl-slides > div');
        t.sheets = [];
        sheetDivs.forEach(div => {
            const name = div.querySelector('.sheet-name')?.value || '';
            const fieldsStr = div.querySelector('.sheet-fields')?.value || '';
            t.sheets.push({ name, fields: fieldsStr.split(/[,，]/).map(f => f.trim()).filter(Boolean) });
        });
    } else {
        t.style.watermark = document.getElementById('tmpl-watermark')?.value || '';
        t.style.showPageNumber = document.getElementById('tmpl-pagenum')?.checked || false;
        const slideDivs = document.querySelectorAll('#tmpl-slides > div');
        t.slides = [];
        slideDivs.forEach(div => {
            const type = div.querySelector('.slide-type')?.value || 'content';
            const title = div.querySelector('.slide-title')?.value || '';
            t.slides.push({ type, title, layout: type === 'product' ? 'grid' : 'full', fields: [] });
        });
    }

    if (t.isDefault && t.source === 'system') {
        t.isDefault = false;
        t.source = 'custom';
        t.id = 'tpl_' + Date.now();
        t.name = t.name + '（自定义）';
    }

    await saveAllData();
    alert('模板已保存');
    renderTemplateList();
}

function importTemplate(type) {
    const isExcel = type === 'excel' || (type !== 'ppt' && currentEditingTemplateType === 'excel');
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = isExcel ? '.xlsx,.xls' : '.xlsx,.xls,.pptx';
    input.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        try {
            const buffer = await file.arrayBuffer();
            const workbook = XLSX.read(buffer, { type: 'array' });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(sheet);

            if (rows.length === 0) { alert('模板文件为空'); return; }

            if (isExcel) {
                // 导入Excel模板：每个Sheet对应一个配置行，或读取sheet名作为字段
                const newTpl = {
                    id: 'tpl_' + Date.now(),
                    name: file.name.replace(/\.(xlsx|xls)$/i, ''),
                    isDefault: false,
                    source: 'imported',
                    type: 'excel',
                    sheets: rows.map((r, i) => ({
                        name: r['Sheet名称'] || r['name'] || r['sheetName'] || `Sheet${i + 1}`,
                        fields: (r['字段'] || r['fields'] || '').split(/[,，]/).map(f => f.trim()).filter(Boolean)
                    })),
                    style: { primaryColor: '1a56db', fontFamily: '微软雅黑', showHeader: true, freezePane: true },
                    createdAt: today(), updatedAt: today()
                };
                excelTemplates.push(newTpl);
                currentEditingTemplateType = 'excel';
                switchTemplateTab('excel');
                await saveAllData();
                renderTemplateList();
                editTemplate(newTpl.id);
                alert(`已导入Excel模板"${newTpl.name}"，共 ${newTpl.sheets.length} 个Sheet`);
            } else {
                // 导入PPT模板
                const newTpl = {
                    id: 'tpl_' + Date.now(),
                    name: file.name.replace(/\.(xlsx|xls|pptx)$/i, ''),
                    isDefault: false,
                    source: 'imported',
                    slides: rows.map((r, i) => ({
                        type: r['页面类型'] || r['type'] || 'content',
                        title: r['页标题'] || r['title'] || `第${i + 1}页`,
                        layout: r['布局'] || r['layout'] || 'full',
                        fields: (r['字段'] || r['fields'] || '').split(/[,，]/).filter(Boolean)
                    })),
                    style: { primaryColor: '#1a56db', fontFamily: '微软雅黑', logoPosition: 'top-left', showPageNumber: true, watermark: '' },
                    createdAt: today(), updatedAt: today()
                };
                pptTemplates.push(newTpl);
                currentEditingTemplateType = 'ppt';
                switchTemplateTab('ppt');
                await saveAllData();
                renderTemplateList();
                editTemplate(newTpl.id);
                alert(`已导入PPT模板"${newTpl.name}"，共 ${newTpl.slides.length} 页`);
            }
        } catch (e) {
            console.error('导入模板失败:', e);
            alert('导入失败：' + e.message);
        }
    };
    input.click();
}

// ========== Excel 导出 ==========
function exportProposalExcel(proposalId) {
    const pp = proposals.find(p => p.id === proposalId);
    if (!pp) return;
    const project = findProject(pp.projectId);

    const rows = [
        ['方案名称', pp.name],
        ['主题', pp.theme],
        ['一句话卖点', pp.tagline],
        ['人均供货价', pp.totalPerPerson],
        ['总供货价', pp.totalPrice],
        ['总采购成本', pp.totalCost],
        ['方案毛利率', pp.overallMargin + '%'],
        ['预算利用率', pp.budgetUtilization + '%'],
        ['履约状态', pp.canFulfill ? '可交付' : '需' + pp.maxLeadTime + '天'],
        ['', ''],
        ['产品名称', '品牌', '品牌级别', '供应商', '集采成本', '供货价', '单品毛利率', '小计']
    ];

    pp.products.forEach(p => {
        rows.push([p.name, p.brand, p.brandLevel, p.supplier, p.purchasePrice, p.quotePrice, p.margin, p.subtotal]);
    });

    rows.push(['', '']);
    rows.push(['AI推荐理由', pp.aiRationale]);
    if (project) {
        const customer = getProjectCustomer(project);
        rows.push(['', '']);
        rows.push(['项目名称', project.name]);
        rows.push(['客户公司', customer?.customerCompany || '-']);
        rows.push(['企业性质', customer?.companyType || '-']);
        rows.push(['人数', project.peopleCount]);
        rows.push(['人均预算', project.budgetPerPerson]);
    }

    const ws = XLSX.utils.aoa_to_sheet(rows);
    ws['!cols'] = [{ wch: 20 }, { wch: 30 }, { wch: 15 }, { wch: 15 }, { wch: 12 }, { wch: 12 }, { wch: 12 }, { wch: 12 }];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, pp.name.substring(0, 31));
    XLSX.writeFile(wb, `${pp.name}.xlsx`);
}

// ========== PPT 导出 ==========
function exportProposalPPT(proposalId) {
    const pp = proposals.find(p => p.id === proposalId);
    if (!pp) return;
    const project = findProject(pp.projectId);

    if (typeof PptxGenJS === 'undefined') {
        alert('PPT 库加载中，请稍后再试。如果持续失败请刷新页面。');
        return;
    }

    const pres = new PptxGenJS();
    pres.defineLayout({ name: 'A4', width: '13.333', height: '7.5' });
    pres.layout = 'A4';

    // 封面
    const customer = project ? getProjectCustomer(project) : null;
    const slide1 = pres.addSlide();
    slide1.background = { color: '1a56db' };
    slide1.addText(pp.name, { x: 1, y: 2, w: 10, h: 1.5, fontSize: 32, color: 'FFFFFF', bold: true, align: 'center' });
    slide1.addText(pp.tagline, { x: 1, y: 3.5, w: 10, h: 0.8, fontSize: 16, color: 'BFDBFE', align: 'center' });
    if (customer) {
        slide1.addText(customer.customerCompany || '', { x: 1, y: 5, w: 10, h: 0.5, fontSize: 12, color: 'FFFFFF', align: 'center' });
    }
    slide1.addText(new Date().toISOString().split('T')[0], { x: 1, y: 5.8, w: 10, h: 0.5, fontSize: 10, color: '93C5FD', align: 'center' });

    // 需求分析
    if (project?.structuredRequirement) {
        const slide2 = pres.addSlide();
        slide2.addText('需求分析', { x: 1, y: 0.5, w: 10, h: 0.8, fontSize: 24, bold: true, color: '1a56db' });
        slide2.addText(project.structuredRequirement, { x: 1, y: 1.5, w: 11, h: 5.5, fontSize: 11, color: '333333', valign: 'top' });
    }

    // 方案概览
    const slide3 = pres.addSlide();
    slide3.addText('方案概览', { x: 1, y: 0.5, w: 10, h: 0.8, fontSize: 24, bold: true, color: '1a56db' });
    slide3.addText(pp.name, { x: 1, y: 1.4, w: 5, h: 0.5, fontSize: 16, bold: true });
    slide3.addText(`主题：${pp.theme}    |    人均：${formatMoney(pp.totalPerPerson)}    |    毛利率：${pp.overallMargin}%    |    预算利用率：${pp.budgetUtilization}%`, { x: 1, y: 2.0, w: 11, h: 0.4, fontSize: 11, color: '666666' });

    // 产品表格
    const tableHeader = [['产品', '品牌', '供应商', '集采成本', '供货价', '毛利率', '小计']];
    const tableRows = pp.products.map(p => [
        p.name, p.brand || '-', p.supplier || '-', formatMoney(p.purchasePrice), formatMoney(p.quotePrice), p.margin, formatMoney(p.subtotal)
    ]);
    slide3.addTable(tableHeader.concat(tableRows), {
        x: 1, y: 2.6, w: 11,
        fontSize: 10, border: { type: 'solid', color: 'CCCCCC' },
        colW: [2.8, 1.2, 1.5, 1.3, 1.3, 1, 1],
        rowH: [0.4],
        autoPage: false
    });

    // 推荐理由
    slide3.addText('推荐理由', { x: 1, y: 5.5, w: 3, h: 0.4, fontSize: 14, bold: true, color: '1a56db' });
    slide3.addText(pp.aiRationale, { x: 1, y: 5.9, w: 11, h: 1, fontSize: 10, color: '666666' });

    // 产品详情页
    pp.products.forEach((p, idx) => {
        if (idx < 6) { // 最多6个产品详情页
            const s = pres.addSlide();
            s.addText(`产品详情 ${idx + 1}`, { x: 1, y: 0.5, w: 10, h: 0.8, fontSize: 24, bold: true, color: '1a56db' });
            s.addText(p.name, { x: 1, y: 1.5, w: 10, h: 0.6, fontSize: 20, bold: true });
            const info = [
                ['品牌', p.brand], ['品牌级别', p.brandLevel], ['供应商', p.supplier],
                ['集采成本', formatMoney(p.purchasePrice)], ['客户报价', formatMoney(p.quotePrice)],
                ['单品毛利率', p.margin], ['数量', String(p.quantity)], ['小计', formatMoney(p.subtotal)]
            ];
            s.addTable(info, {
                x: 1, y: 2.3, w: 8,
                fontSize: 12, border: { type: 'solid', color: 'CCCCCC' },
                colW: [2.5, 5.5]
            });
        }
    });

    // 封底
    const lastSlide = pres.addSlide();
    lastSlide.background = { color: '1a56db' };
    lastSlide.addText('感谢阅览', { x: 1, y: 2.5, w: 10, h: 1, fontSize: 28, color: 'FFFFFF', bold: true, align: 'center' });
    lastSlide.addText(customer?.customerCompany || '', { x: 1, y: 4, w: 10, h: 0.6, fontSize: 14, color: 'BFDBFE', align: 'center' });
    lastSlide.addText('如需进一步沟通，请联系我们', { x: 1, y: 4.8, w: 10, h: 0.5, fontSize: 11, color: '93C5FD', align: 'center' });

    pres.writeFile({ fileName: `${pp.name}.pptx` });
}

// ========== AI 设置 ==========
let aiSettings = {
    apiType: 'deepseek', endpoint: 'https://api.deepseek.com/chat/completions', apiKey: '',
    model: 'deepseek-chat', maxTokens: 4096, temperature: 0.7,
    enableChat: true, enableProposal: true, enableBid: true
};

async function loadAISettings() {
    try {
        const saved = await loadSetting('aiSettings');
        if (saved) aiSettings = { ...aiSettings, ...saved };
    } catch (e) { /* use defaults */ }
}

function updateAISettingsForm() {
    const type = document.getElementById('ai-api-type')?.value;
    const endpointEl = document.getElementById('ai-endpoint');
    if (!endpointEl) return;
    const modelList = document.getElementById('ai-model-list');

    if (type === 'deepseek') {
        endpointEl.value = 'https://api.deepseek.com/chat/completions';
        if (modelList) modelList.innerHTML = `
            <option value="deepseek-chat">DeepSeek Chat (V3)</option>
            <option value="deepseek-reasoner">DeepSeek Reasoner (R1)</option>`;
    } else if (type === 'claude') {
        endpointEl.value = 'https://api.anthropic.com/v1/messages';
        if (modelList) modelList.innerHTML = `
            <option value="claude-sonnet-4-6">Claude Sonnet 4.6</option>
            <option value="claude-opus-4-7">Claude Opus 4.7</option>
            <option value="claude-haiku-4-5">Claude Haiku 4.5</option>
            <option value="deepseek-v4-pro">DeepSeek V4 Pro</option>
            <option value="deepseek-chat">DeepSeek Chat</option>`;
    } else if (type === 'openai') {
        endpointEl.value = 'https://api.openai.com/v1/chat/completions';
        if (modelList) modelList.innerHTML = `
            <option value="gpt-4o">GPT-4o</option>
            <option value="gpt-4o-mini">GPT-4o mini</option>
            <option value="gpt-4.1">GPT-4.1</option>`;
    } else {
        endpointEl.value = '';
        if (modelList) modelList.innerHTML = '<option value="">手动输入模型名</option>';
    }
}

function toggleApiKeyVisibility() {
    const input = document.getElementById('ai-api-key');
    if (input.type === 'password') { input.type = 'text'; document.getElementById('btn-toggle-key').textContent = '🙈'; }
    else { input.type = 'password'; document.getElementById('btn-toggle-key').textContent = '👁'; }
}

function showAISettingsForm() {
    document.getElementById('ai-api-type').value = aiSettings.apiType;
    document.getElementById('ai-endpoint').value = aiSettings.endpoint;
    document.getElementById('ai-api-key').value = aiSettings.apiKey;
    document.getElementById('ai-model').value = aiSettings.model;
    document.getElementById('ai-max-tokens').value = aiSettings.maxTokens;
    document.getElementById('ai-temperature').value = aiSettings.temperature;
    document.getElementById('ai-enable-chat').checked = aiSettings.enableChat;
    document.getElementById('ai-enable-proposal').checked = aiSettings.enableProposal;
    document.getElementById('ai-enable-bid').checked = aiSettings.enableBid;
}

async function saveAISettings() {
    aiSettings.apiType = document.getElementById('ai-api-type')?.value || aiSettings.apiType;
    aiSettings.endpoint = document.getElementById('ai-endpoint')?.value || aiSettings.endpoint;
    aiSettings.apiKey = document.getElementById('ai-api-key')?.value || aiSettings.apiKey;
    aiSettings.model = document.getElementById('ai-model')?.value || aiSettings.model;
    aiSettings.maxTokens = parseInt(document.getElementById('ai-max-tokens')?.value) || 4096;
    aiSettings.temperature = parseFloat(document.getElementById('ai-temperature')?.value) || 0.7;
    aiSettings.enableChat = document.getElementById('ai-enable-chat')?.checked || false;
    aiSettings.enableProposal = document.getElementById('ai-enable-proposal')?.checked || false;
    aiSettings.enableBid = document.getElementById('ai-enable-bid')?.checked || false;
    await saveSetting('aiSettings', aiSettings);
    alert('AI 设置已保存');
}

function resetAISettings() {
    aiSettings = { apiType: 'deepseek', endpoint: 'https://api.deepseek.com/chat/completions', apiKey: '', model: 'deepseek-chat', maxTokens: 4096, temperature: 0.7, enableChat: true, enableProposal: true, enableBid: true };
    showAISettingsForm();
}

async function testAIConnection() {
    const resultEl = document.getElementById('ai-test-result');
    const detailEl = document.getElementById('ai-test-detail');
    resultEl.textContent = '测试中...';
    resultEl.className = 'text-sm text-blue-600';
    detailEl.classList.add('hidden');

    // 先从表单读取最新值
    const apiKey = document.getElementById('ai-api-key')?.value?.trim() || aiSettings.apiKey;
    const endpoint = document.getElementById('ai-endpoint')?.value?.trim() || aiSettings.endpoint;
    const apiType = document.getElementById('ai-api-type')?.value || aiSettings.apiType;
    const model = document.getElementById('ai-model')?.value || aiSettings.model;

    try {
        if (!apiKey) {
            resultEl.textContent = '❌ 请先填写 API Key';
            resultEl.className = 'text-sm text-red-500';
            return;
        }

        const isOpenAIFormat = apiType === 'openai' || apiType === 'deepseek' || apiType === 'custom';
        const body = isOpenAIFormat ? {
            model: model,
            messages: [{ role: 'user', content: 'Hello' }],
            max_tokens: 10
        } : {
            model: model,
            max_tokens: 10,
            messages: [{ role: 'user', content: 'Hello' }]
        };

        const headers = isOpenAIFormat
            ? { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` }
            : { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01' };

        const resp = await fetch(endpoint, {
            method: 'POST', headers, body: JSON.stringify(body)
        });

        if (resp.ok) {
            resultEl.textContent = '✅ 连接成功';
            resultEl.className = 'text-sm text-green-600';
            detailEl.classList.remove('hidden');
            detailEl.textContent = JSON.stringify(await resp.json(), null, 2);
        } else {
            const errText = await resp.text();
            resultEl.textContent = `❌ 连接失败 (${resp.status})`;
            resultEl.className = 'text-sm text-red-500';
            detailEl.classList.remove('hidden');
            detailEl.textContent = errText.substring(0, 500);
        }
    } catch (e) {
        resultEl.textContent = '❌ 网络错误：' + e.message;
        resultEl.className = 'text-sm text-red-500';
    }
}

// ========== 启动 ==========
async function boot() {
    await init();              // 先初始化 DB
    await loadAISettings();    // 再加载 AI 设置
    showAISettingsForm();      // 如果当前在设置页，填充表单
}
boot();
</script>
