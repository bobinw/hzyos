<script>
// ========== IndexedDB 数据库（与商品库共享） ==========
const DB_NAME = 'ProductLibraryDB';
const DB_VERSION = 3;
let db = null;

// ========== 数据变量 ==========
let products = [];
let suppliers = [];
let templates = {};           // 字段映射模板（来自商品库）
let projects = [];
let proposals = [];
let proposalTemplates = [];  // 方案PPT模板
let nextProjectId = 1;
let nextProposalId = 1;
let nextTemplateId = 1;

// 当前编辑状态
let currentProjectId = null;
let currentEditingTemplateId = null;

// ========== 数据库操作 ==========
function initDB() {
    return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);
        request.onerror = () => { console.error('DB打开失败:', request.error); reject(request.error); };
        request.onsuccess = () => { db = request.result; console.log('方案系统DB连接成功'); resolve(db); };
        request.onupgradeneeded = (event) => {
            const database = event.target.result;
            if (!database.objectStoreNames.contains('products')) database.createObjectStore('products', { keyPath: 'id' });
            if (!database.objectStoreNames.contains('suppliers')) database.createObjectStore('suppliers', { keyPath: 'id' });
            if (!database.objectStoreNames.contains('templates')) database.createObjectStore('templates', { keyPath: 'id' });
            if (!database.objectStoreNames.contains('settings')) database.createObjectStore('settings', { keyPath: 'key' });
            if (!database.objectStoreNames.contains('projects')) database.createObjectStore('projects', { keyPath: 'id' });
            if (!database.objectStoreNames.contains('proposals')) database.createObjectStore('proposals', { keyPath: 'id' });
            if (!database.objectStoreNames.contains('pptTemplates')) database.createObjectStore('pptTemplates', { keyPath: 'id' });
            console.log('方案系统DB结构创建完成');
        };
    });
}

function saveToDB(storeName, data) {
    return new Promise((resolve, reject) => {
        if (!db) { reject('DB未初始化'); return; }
        const tx = db.transaction([storeName], 'readwrite');
        const store = tx.objectStore(storeName);
        if (Array.isArray(data)) {
            const cr = store.clear();
            cr.onsuccess = () => {
                const adds = data.map(item => new Promise((ra, rj) => {
                    const req = store.add(item);
                    req.onsuccess = () => ra(); req.onerror = () => rj(req.error);
                }));
                Promise.all(adds).then(() => resolve(adds.length)).catch(reject);
            };
            cr.onerror = () => reject(cr.error);
        } else {
            const req = store.put(data);
            req.onsuccess = () => resolve(data); req.onerror = () => reject(req.error);
        }
    });
}

function loadFromDB(storeName) {
    return new Promise((resolve, reject) => {
        if (!db) { reject('DB未初始化'); return; }
        const tx = db.transaction([storeName], 'readonly');
        const store = tx.objectStore(storeName);
        const req = store.getAll();
        req.onsuccess = () => resolve(req.result || []);
        req.onerror = () => reject(req.error);
    });
}

async function loadSetting(key) {
    return new Promise((resolve, reject) => {
        if (!db) { reject('DB未初始化'); return; }
        const tx = db.transaction(['settings'], 'readonly');
        const store = tx.objectStore('settings');
        const req = store.get(key);
        req.onsuccess = () => resolve(req.result ? req.result.value : null);
        req.onerror = () => reject(req.error);
    });
}

async function saveSetting(key, value) {
    return new Promise((resolve, reject) => {
        if (!db) { reject('DB未初始化'); return; }
        const tx = db.transaction(['settings'], 'readwrite');
        const store = tx.objectStore('settings');
        const req = store.put({ key, value });
        req.onsuccess = () => resolve(value); req.onerror = () => reject(req.error);
    });
}

async function saveAllData() {
    try {
        const tmplArray = Object.values(templates).map(t => ({ ...t, id: t.supplierId }));
        await Promise.all([
            saveToDB('projects', projects),
            saveToDB('proposals', proposals),
            saveToDB('pptTemplates', proposalTemplates),
            saveSetting('nextProjectId', nextProjectId),
            saveSetting('nextProposalId', nextProposalId),
            saveSetting('nextTemplateId', nextTemplateId)
        ]);
        console.log('方案数据保存成功');
        return true;
    } catch (e) {
        console.error('保存失败:', e);
        return false;
    }
}

// ========== 辅助函数 ==========
function showPage(pageId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    const page = document.getElementById(pageId);
    if (page) page.classList.add('active');
    else { console.warn('Page not found:', pageId); return; }
    // 更新导航高亮
    document.querySelectorAll('nav a').forEach(a => a.classList.remove('bg-blue-50', 'text-blue-600'));
    const navMap = { 'page-projects': 'nav-projects', 'page-templates': 'nav-templates', 'page-ai-settings': 'nav-ai-settings' };
    if (navMap[pageId]) {
        const nav = document.getElementById(navMap[pageId]);
        if (nav) nav.classList.add('bg-blue-50', 'text-blue-600');
    }
    // 自动渲染
    if (pageId === 'page-projects') renderProjectList();
    if (pageId === 'page-templates') renderTemplateList();
    if (pageId === 'page-ai-settings') showAISettingsForm();
}

function closeModal(id) { document.getElementById(id).classList.remove('active'); }
function openModal(id) { document.getElementById(id).classList.add('active'); }

function formatDate(d) { if (!d) return ''; return new Date(d).toISOString().split('T')[0]; }
function formatMoney(n) { if (n === null || n === undefined || isNaN(n)) return '-'; return '¥' + Number(n).toFixed(2); }
function today() { return new Date().toISOString().split('T')[0]; }

// ========== 默认方案模板 ==========
const DEFAULT_PPT_TEMPLATE = {
    id: 'default',
    name: '默认方案模板',
    isDefault: true,
    source: 'system',
    slides: [
        { type: 'cover', title: '封面页', layout: 'full', fields: ['projectName', 'customerCompany', 'date'] },
        { type: 'content', title: '需求分析', layout: 'full', fields: ['requirementSummary'] },
        { type: 'content', title: '方案概览', layout: 'top-bottom', fields: ['proposalName', 'tagline', 'productTable', 'price', 'budgetUtilization', 'rationale'] },
        { type: 'product', title: '产品详情', layout: 'grid', fields: ['productImage', 'productName', 'productSpec', 'purchasePrice', 'retailPrice'] },
        { type: 'summary', title: '价格汇总', layout: 'full', fields: ['priceTable', 'totalPrice', 'perPersonPrice'] },
        { type: 'back', title: '封底', layout: 'full', fields: ['contactInfo'] }
    ],
    style: { primaryColor: '#1a56db', fontFamily: '微软雅黑', logoPosition: 'top-left', showPageNumber: true, watermark: '' },
    createdAt: '', updatedAt: ''
};

// ========== 默认供应商模板（无实际作用，占位） ==========
function getDefaultProposalTemplates() {
    return [{ ...DEFAULT_PPT_TEMPLATE, createdAt: today(), updatedAt: today() }];
}

// ========== 初始化 ==========
async function init() {
    await initDB();
    // 加载商品库数据（只读引用）
    try {
        products = await loadFromDB('products') || [];
        suppliers = await loadFromDB('suppliers') || [];
        const tmplData = await loadFromDB('templates') || [];
        tmplData.forEach(t => { templates[t.supplierId || t.id] = t; });
    } catch (e) { console.warn('加载商品库数据失败:', e); }
    // 加载方案系统数据
    projects = await loadFromDB('projects') || [];
    proposals = await loadFromDB('proposals') || [];
    proposalTemplates = await loadFromDB('pptTemplates') || [];
    if (proposalTemplates.length === 0) proposalTemplates = getDefaultProposalTemplates();
    nextProjectId = (await loadSetting('nextProjectId')) || 1;
    nextProposalId = (await loadSetting('nextProposalId')) || 1;
    nextTemplateId = (await loadSetting('nextTemplateId')) || 1;
    renderProjectList();
}

// ========== 项目列表 ==========
function getProjectStats() {
    const total = projects.length;
    const generated = projects.filter(p => ['generated', 'adjusted', 'confirmed'].includes(p.status)).length;
    const confirmed = projects.filter(p => p.status === 'confirmed').length;
    const inProgress = projects.filter(p => ['drafting', 'chatting', 'requirement_ready', 'generating'].includes(p.status)).length;
    return { total, generated, confirmed, inProgress };
}

function renderProjectList() {
    const stats = getProjectStats();
    document.getElementById('project-stats').innerHTML = `
        <div class="bg-white rounded-lg shadow p-4"><div class="text-2xl font-bold text-blue-600">${stats.total}</div><div class="text-sm text-gray-500">项目总数</div></div>
        <div class="bg-white rounded-lg shadow p-4"><div class="text-2xl font-bold text-green-600">${stats.generated}</div><div class="text-sm text-gray-500">已生成方案</div></div>
        <div class="bg-white rounded-lg shadow p-4"><div class="text-2xl font-bold text-purple-600">${stats.confirmed}</div><div class="text-sm text-gray-500">已确认</div></div>
        <div class="bg-white rounded-lg shadow p-4"><div class="text-2xl font-bold text-orange-600">${stats.inProgress}</div><div class="text-sm text-gray-500">进行中</div></div>
    `;

    const statusLabels = { drafting: '草稿', chatting: '对话中', requirement_ready: '需求已确认', generating: '生成中', generated: '方案已生成', adjusted: '已调整', confirmed: '已确认' };
    const statusColors = { drafting: 'bg-gray-100 text-gray-600', chatting: 'bg-blue-100 text-blue-600', requirement_ready: 'bg-green-100 text-green-600', generating: 'bg-yellow-100 text-yellow-600', generated: 'bg-indigo-100 text-indigo-600', adjusted: 'bg-purple-100 text-purple-600', confirmed: 'bg-green-200 text-green-800' };

    if (projects.length === 0) {
        document.getElementById('projectList').innerHTML = '<div class="text-center text-gray-400 py-12">暂无项目，点击"新建项目"开始</div>';
        return;
    }

    document.getElementById('projectList').innerHTML = projects.sort((a, b) => b.id - a.id).map(p => {
        const proposalCount = proposals.filter(pp => pp.projectId === p.id).length;
        return `
        <div class="border rounded-lg p-4 hover:bg-gray-50 cursor-pointer" onclick="openProject(${p.id})">
            <div class="flex justify-between items-start">
                <div class="flex-1">
                    <div class="flex items-center gap-3 mb-2">

                    </div>
                    <div class="flex gap-4 text-sm text-gray-500">
                        <span>🏢 ${p.customerCompany || '-'}</span>
                        <span>👥 ${p.peopleCount || 0}人</span>
                        <span>💰 人均${formatMoney(p.budgetPerPerson)}</span>
                        <span>📅 交付: ${p.deadline || '-'}</span>
                        ${p.targetMargin ? `<span>📊 毛利率≥${p.targetMargin}%</span>` : ''}

                    <div class="text-xs text-gray-400">方案数</div>

    `}).join('');
}

    ['bid-row-deadline', 'bid-row-scoring', 'bid-row-qual'].forEach(id => {

        id: nextProjectId,
        name: getVal('np-name'),

async function saveProjectDraft() {
    const project = collectProjectForm();
    if (!project.name) { alert('请输入项目名称'); return; }
    projects.push(project);
    nextProjectId++;
    await saveAllData();
    closeModal('modal-new-project');
    renderProjectList();
}

async function startProjectChat() {
    const project = collectProjectForm();
    if (!project.name || !project.companyType || !project.companySize || !project.region || !project.peopleCount || !project.budgetPerPerson || !project.deadline) {
        alert('请填写所有必填字段（标*的）');
        return;
    }
    project.status = 'chatting';
    projects.push(project);
    currentProjectId = project.id;
    nextProjectId++;
    await saveAllData();
    closeModal('modal-new-project');
    startChatSession(project);
}

// ========== AI 对话 ==========
function startChatSession(project) {
    showPage('page-chat');
    document.getElementById('chat-project-name').textContent = project.name;
    document.getElementById('chat-messages').innerHTML = '';
    document.getElementById('chat-summary').innerHTML = '<span class="text-gray-400">对话开始后逐步提取...</span>';

    // 构建初始上下文
    const contextParts = [];
    contextParts.push(`${project.companyType}，${project.companySize}，${project.region}`);
    if (project.industry) contextParts.push(`${project.industry}行业`);
    contextParts.push(`${project.peopleCount}人，人均预算${project.budgetPerPerson}元`);
    if (project.initialScene) contextParts.push(`${project.initialScene}场景`);
    if (project.urgency !== '正常') contextParts.push(`紧急程度：${project.urgency}`);
    if (project.initialTags.length > 0) contextParts.push(`标签：${project.initialTags.join('、')}`);

    const firstMessage = `你好！我是团购需求顾问。根据你提供的初步信息，我来帮你梳理一下：

你这是一个**${project.name}**项目，客户是${project.companyType}企业，规模${project.companySize}，位于${project.region}。

${project.peopleCount}人，人均预算${formatMoney(project.budgetPerPerson)}，${project.deadline ? '预计' + project.deadline + '前交付' : ''}。${project.initialScene ? '属于' + project.initialScene + '场景。' : ''}

${project.urgency === '紧急' ? '这个项目时间很紧，我会优先考虑现货产品。' : ''}
${project.urgency === '加急' ? '时间比较紧，我会倾向于备货周期短的产品。' : ''}

我们先从用户画像开始：**这批福利的最终用户大概是什么年龄层？男女比例怎么样？**`;

    addChatMessage('ai', firstMessage);
    updateChatSummary(project);
}

function addChatMessage(role, content) {
    // 保存到项目对话记录
    const project = findProject(currentProjectId);
    if (project) {
        if (!project.conversation) project.conversation = [];
        project.conversation.push({ role, content, time: new Date().toISOString() });
        project.updatedAt = new Date().toISOString();
        saveAllData().catch(() => {}); // 异步保存，不阻塞
    }

    const div = document.createElement('div');
    div.className = `chat-bubble ${role === 'ai' ? 'chat-ai' : 'chat-user'}`;
    div.innerHTML = `<div class="text-xs ${role === 'ai' ? 'text-blue-500' : 'text-green-500'} mb-1">${role === 'ai' ? '🤖 AI顾问' : '👤 我'}</div><div class="text-sm">${content.replace(/\n/g, '<br>')}</div>`;
    document.getElementById('chat-messages').appendChild(div);
    div.scrollIntoView({ behavior: 'smooth' });
}

function sendChatMessage() {
    const input = document.getElementById('chat-input');
    const msg = input.value.trim();
    if (!msg) return;
    addChatMessage('user', msg);
    input.value = '';

    // 模拟 AI 回复
    setTimeout(() => {
        const aiReplies = [
            '明白了。那这批福利的**使用场景**是怎样的？是统一配送到公司发放，还是员工自己在家兑换？',
            '了解了。对于**品类偏好**，客户有没有明确的方向？比如食品礼盒、日用品、还是小家电？',
            '好的。那在**品牌认知**方面，客户是比较认全国大牌，还是地方特产也接受？',
            '清楚。对**包装**有什么期望吗？要精美的礼盒装，还是简约实用就行？',
            '关于**物流配送**，需要支持一件代发吗？还是统一集采配送到公司就可以？',
            '从客户角度来看，他们是希望"看起来值这个钱"（面子型），还是"实际成本划算"（里子型）？',
            '之前这个客户做过类似福利吗？效果怎么样？有没有什么教训要吸取的？',
            '好的，我基本了解情况了。需求已经比较清晰，**可以点击右上角的"生成需求文档"了**。还有需要补充的吗？'
        ];

        // 简单轮询模拟
        const chatMessages = document.querySelectorAll('#chat-messages .chat-user');
        const msgCount = chatMessages.length;
        const reply = aiReplies[Math.min(msgCount - 1, aiReplies.length - 1)];
        addChatMessage('ai', reply);

        // 更新摘要
        const project = findProject(currentProjectId);
        if (project) updateChatSummary(project);
    }, 800 + Math.random() * 600);
}

function findProject(id) {
    return projects.find(p => p.id === id);
}

function updateChatSummary(project) {
    const chatMessages = document.querySelectorAll('#chat-messages .chat-user');
    const userReplies = Array.from(chatMessages).map(el => el.textContent);

    // 简单关键词提取
    const ageKeywords = ['岁', '年龄', '中年', '青年', '老年', '年轻'];
    const genderKeywords = ['男', '女', '男女'];
    const styleKeywords = ['实用', '品质', '精致', '简约', '新潮', '文化', '国潮', '颜值'];
    const categoryKeywords = ['食品', '日用品', '家电', '小家电', '家纺', '个护', '文创', '卡券'];
    const packageKeywords = ['礼盒', '包装', '精装', '简装'];

    let summaryHTML = '';
    const allText = userReplies.join(' ');

    // 用户画像
    summaryHTML += '<div class="mb-3"><div class="font-medium text-gray-700 mb-1">👥 用户画像</div>';
    if (ageKeywords.some(k => allText.includes(k))) summaryHTML += '<div class="text-green-600">✓ 年龄段已提及</div>';
    else summaryHTML += '<div class="text-orange-500">⚠ 年龄待确认</div>';
    if (genderKeywords.some(k => allText.includes(k))) summaryHTML += '<div class="text-green-600">✓ 性别已提及</div>';
    else summaryHTML += '<div class="text-orange-500">⚠ 性别待确认</div>';
    summaryHTML += '</div>';

    // 风格
    summaryHTML += '<div class="mb-3"><div class="font-medium text-gray-700 mb-1">🏷 风格</div>';
    const matchedStyles = styleKeywords.filter(k => allText.includes(k));
    if (matchedStyles.length > 0) summaryHTML += `<div class="text-green-600">✓ ${matchedStyles.join('、')}</div>`;
    else summaryHTML += '<div class="text-gray-400">待确认</div>';
    summaryHTML += '</div>';

    // 品类
    summaryHTML += '<div class="mb-3"><div class="font-medium text-gray-700 mb-1">📦 品类</div>';
    const matchedCats = categoryKeywords.filter(k => allText.includes(k));
    if (matchedCats.length > 0) summaryHTML += `<div class="text-green-600">✓ ${matchedCats.join('、')}</div>`;
    else summaryHTML += '<div class="text-gray-400">待确认</div>';
    summaryHTML += '</div>';

    // 包装
    summaryHTML += '<div class="mb-3"><div class="font-medium text-gray-700 mb-1">🎁 包装</div>';
    const matchedPkg = packageKeywords.filter(k => allText.includes(k));
    if (matchedPkg.length > 0) summaryHTML += `<div class="text-green-600">✓ ${matchedPkg.join('、')}</div>`;
    else summaryHTML += '<div class="text-gray-400">待确认</div>';
    summaryHTML += '</div>';

    // 已回复轮数
    summaryHTML += `<div class="text-xs text-gray-400 pt-2 border-t">已对话 ${userReplies.length} 轮</div>`;

    document.getElementById('chat-summary').innerHTML = summaryHTML;
}

async function finishChat() {
    const project = findProject(currentProjectId);
    if (!project) return;

    // 从对话记录中提取用户回复
    const userReplies = (project.conversation || [])
        .filter(m => m.role === 'user')
        .map(m => m.content);
    const allText = userReplies.join('\n');

    project.structuredRequirement = generateStructuredRequirement(project, allText);
    project.status = 'requirement_ready';
    project.updatedAt = new Date().toISOString();

    // 更新项目
    const idx = projects.findIndex(p => p.id === project.id);
    if (idx >= 0) projects[idx] = project;
    await saveAllData();

    // 跳转到需求确认页
    showRequirementConfirm(project);
}

${project.name}，${project.peopleCount}人，人均预算${formatMoney(project.budgetPerPerson)}，${project.deadline ? '预计' + project.deadline + '前交付' : ''}。${project.purchaseMode ? '采购模式：' + project.purchaseMode + '。' : ''}

${companyDesc}
${project.decisionMaker ? '决策人：' + project.decisionMaker + '。' : ''}

${sceneText}场景${project.deliveryMode ? '，' + project.deliveryMode : ''}。
${project.urgency === '正常' ? '时间充裕，可按正常流程推进。' : project.urgency === '加急' ? '时间较紧，优先现货和短备货周期产品。' : '时间非常紧张，必须现货且快速配送。'}

${project.initialTags.length > 0 ? '基于标签偏好：' + project.initialTags.join('、') : '待从对话中提取'}

// ========== 方案生成 ==========
async function generateProposals(projectId) {
    const project = findProject(projectId);
    if (!project) return;
    if (products.length === 0) { alert('商品库为空，请先在商品库中导入商品数据'); return; }

    // 收集约束
    const constraintRows = document.querySelectorAll(`#constraint-rows-${projectId} .flex`);
    project.constraints = [];
    constraintRows.forEach(row => {
        const field = row.querySelector('select').value;
        const operator = row.querySelectorAll('select')[1].value;
        const value = row.querySelector('input').value.trim();
        if (field && value) project.constraints.push({ field, operator, value });
    });

    const count = parseInt(document.getElementById('gen-proposalCount')?.value) || 6;
    project.proposalCount = count;
    project.status = 'generating';
    project.updatedAt = new Date().toISOString();
    await saveAllData();

    // 显示加载
    document.getElementById(`proposal-grid-${projectId}`).innerHTML = `
        <div class="col-span-3 text-center py-8">
            <div class="animate-spin text-4xl mb-4">🤖</div>
            <div class="text-gray-500">AI 正在分析商品库并生成方案...</div>
            <div class="text-xs text-gray-400 mt-2">已筛选 ${products.length} 个商品，正在组合最优方案</div>
        </div>`;

    // 模拟 AI 生成
    setTimeout(async () => {
        await mockGenerateProposals(project, count);
        project.status = 'generated';
        project.updatedAt = new Date().toISOString();
        await saveAllData();
        showRequirementConfirm(project);
    }, 2000);
}

async function mockGenerateProposals(project, count) {
    // 预筛选商品
    let candidates = [...products];
    // 价格区间
    if (project.budgetPerPerson) {
        const lo = project.budgetPerPerson * 0.5;
        const hi = project.budgetPerPerson * 1.3;
        candidates = candidates.filter(p => p.purchasePrice >= lo && p.purchasePrice <= hi);
    }
    if (candidates.length === 0) candidates = [...products]; // fallback

    // 约束筛选
    project.constraints.forEach(c => {
        if (c.field === '品牌级别' && c.operator === '必须') {
            candidates = candidates.filter(p => p.brandLevel === c.value);
        }
        if (c.field === '一件代发' && c.operator === '必须') {
            candidates = candidates.filter(p => p.normalExpressPrice && p.normalExpressPrice > 0);
        }
        if (c.field === '库存类型' && c.operator === '必须') {
            candidates = candidates.filter(p => p.stockType === c.value);
        }
        if (c.field === '毛利率' && c.operator === '≥') {
            const minMargin = parseFloat(c.value) || 0;
            candidates = candidates.filter(p => {
                if (!p.retailPrice || !p.purchasePrice) return false;
                return ((p.retailPrice - p.purchasePrice) / p.retailPrice * 100) >= minMargin;
            });
        }
    });

    if (candidates.length < 3) candidates = [...products].slice(0, 20);

    // 删除旧方案
    proposals = proposals.filter(p => p.projectId !== project.id);

    const themes = ['品质生活', '实用主义', '国潮文化', '健康养生', '简约时尚', '混搭精选', '轻奢体验', '商务大气', '新潮有趣', '经典传承'];
    const taglines = [
        '品质之选，彰显企业关怀', '实用搭配，性价比首选', '国风雅韵，文化自信',
        '健康生活，关爱员工', '简约不凡，细节之美', '精选组合，面面俱到',
        '轻奢体验，尊享品质', '商务典范，气度不凡', '新潮好物，年轻活力'
    ];

    for (let i = 0; i < count; i++) {
        // 随机选 2-4 个产品
        const productCount = 2 + Math.floor(Math.random() * 3);
        const shuffled = [...candidates].sort(() => Math.random() - 0.5);
        const selected = shuffled.slice(0, productCount);

        const proposalProducts = selected.map(p => {
            const quantity = 1;
            const quotePrice = p.purchasePrice * (1 + (0.2 + Math.random() * 0.3)); // 加价 20-50%
            const margin = ((quotePrice - p.purchasePrice) / quotePrice * 100).toFixed(1);
            return {
                productId: p.id, sku: p.sku, name: p.name, supplier: p.supplierId,
                brand: p.brand, brandLevel: p.brandLevel || '',
                purchasePrice: p.purchasePrice, quotePrice: Math.round(quotePrice * 100) / 100,
                margin: margin + '%', image: p.mainImage || '', quantity, subtotal: Math.round(quotePrice * 100) / 100
            };
        });

        const totalPerPerson = proposalProducts.reduce((s, p) => s + p.quotePrice, 0);
        const totalCost = proposalProducts.reduce((s, p) => s + p.purchasePrice, 0);
        const overallMargin = totalPerPerson > 0 ? ((totalPerPerson - totalCost) / totalPerPerson * 100).toFixed(1) : 0;
        const budgetUtil = project.budgetPerPerson > 0 ? (totalPerPerson / project.budgetPerPerson * 100).toFixed(0) : 0;
        const maxLeadTime = Math.max(...selected.map(p => {
            const lt = (p.leadTime || '0天').replace('天', '');
            return parseInt(lt) || 0;
        }));
        const canFulfill = !project.fulfillmentDays || maxLeadTime <= project.fulfillmentDays;

        proposals.push({
            id: nextProposalId++,
            projectId: project.id,
            index: i + 1,
            name: `方案${i + 1}：${themes[i % themes.length]}组合`,
            tagline: taglines[i % taglines.length],
            theme: themes[i % themes.length],
            products: proposalProducts,
            totalPerPerson: Math.round(totalPerPerson * 100) / 100,
            totalPrice: Math.round(totalPerPerson * project.peopleCount * 100) / 100,
            totalCost: Math.round(totalCost * 100) / 100,
            overallMargin: parseFloat(overallMargin),
            budgetUtilization: parseInt(budgetUtil),
            maxLeadTime,
            canFulfill,
            aiRationale: `基于${project.name}的需求，${project.companyType}企业${project.companySize}，人均预算${project.budgetPerPerson}元。本方案聚焦${themes[i % themes.length]}方向，选择了${proposalProducts.map(p => p.brand + p.name.replace(/礼盒|套装/g, '')).join(' + ')}的组合，总价${formatMoney(totalPerPerson)}/人，预算利用率${budgetUtil}%。${canFulfill ? '在履约周期内可交付。' : '注意：部分产品备货周期较长。'}`,
            isManualEdited: false, manualChanges: '',
            createdAt: new Date().toISOString(), updatedAt: new Date().toISOString()
        });
    }
    await saveAllData();
}

function openProject(projectId) {
    const project = findProject(projectId);
    if (!project) return;

    if (project.status === 'chatting') {
        currentProjectId = projectId;
        showPage('page-chat');
        document.getElementById('chat-project-name').textContent = project.name;
        document.getElementById('chat-status').textContent = '对话中';
        // 恢复对话历史
        document.getElementById('chat-messages').innerHTML = '';
        if (project.conversation && project.conversation.length > 0) {
            project.conversation.forEach(msg => addChatMessage(msg.role, msg.content));
        }
        updateChatSummary(project);
    } else if (['requirement_ready', 'generating', 'generated', 'adjusted', 'confirmed'].includes(project.status)) {
        showRequirementConfirm(project);
    } else {
        // draft - 继续编辑
        showNewProjectModal();
    }
}

async function saveTemplateConfig() {
    const t = proposalTemplates.find(tp => tp.id === currentEditingTemplateId);
    if (!t) return;

    t.name = document.getElementById('tmpl-name')?.value || t.name;
    t.style.primaryColor = document.getElementById('tmpl-color')?.value || t.style.primaryColor;
    t.style.fontFamily = document.getElementById('tmpl-font')?.value || t.style.fontFamily;
    t.style.watermark = document.getElementById('tmpl-watermark')?.value || '';
    t.style.showPageNumber = document.getElementById('tmpl-pagenum')?.checked || false;
    t.updatedAt = new Date().toISOString();

    // 收集页面
    const slideDivs = document.querySelectorAll('#tmpl-slides > div');
    t.slides = [];
    slideDivs.forEach(div => {
        const type = div.querySelector('select').value;
        const title = div.querySelector('input').value;
        t.slides.push({ type, title, layout: type === 'product' ? 'grid' : 'full', fields: [] });
    });

    // 如果修改了默认模板，保存为自定义副本
    if (t.isDefault && t.source === 'system') {
        t.isDefault = false;
        t.source = 'custom';
        t.id = 'tpl_' + Date.now();
        t.name = t.name + '（自定义）';
    }

    await saveAllData();
    alert('模板已保存');
    renderTemplateList();
}

function importTemplateExcel() {
    // 创建文件上传弹窗
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.xlsx,.xls,.pptx';
    input.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        // 简单版本：读取 Excel 结构的模板配置
        // 完整版需要解析 PPT 文件结构，这里先用 Excel 配置模板
        try {
            const buffer = await file.arrayBuffer();
            const workbook = XLSX.read(buffer, { type: 'array' });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(sheet);

            if (rows.length === 0) { alert('模板文件为空'); return; }

            const newTpl = {
                id: 'tpl_' + Date.now(),
                name: file.name.replace(/\.(xlsx|xls)$/, ''),
                isDefault: false,
                source: 'imported',
                slides: rows.map((r, i) => ({
                    type: r['页面类型'] || r['type'] || 'content',
                    title: r['页标题'] || r['title'] || `第${i + 1}页`,
                    layout: r['布局'] || r['layout'] || 'full',
                    fields: (r['字段'] || r['fields'] || '').split(/[,，]/).filter(Boolean)
                })),
                style: { primaryColor: '#1a56db', fontFamily: '微软雅黑', logoPosition: 'top-left', showPageNumber: true, watermark: '' },
                createdAt: today(), updatedAt: today()
            };

            proposalTemplates.push(newTpl);
            await saveAllData();
            renderTemplateList();
            editTemplate(newTpl.id);
            alert(`已导入模板"${newTpl.name}"，共 ${newTpl.slides.length} 页`);
        } catch (e) {
            console.error('导入模板失败:', e);
            alert('导入失败：' + e.message);
        }
    };
    input.click();
}

function exportProposalExcel(proposalId) {
    const pp = proposals.find(p => p.id === proposalId);
    if (!pp) return;
    const project = findProject(pp.projectId);

    const rows = [
        ['方案名称', pp.name],
        ['主题', pp.theme],
        ['一句话卖点', pp.tagline],
        ['人均报价', pp.totalPerPerson],
        ['总报价', pp.totalPrice],
        ['总成本', pp.totalCost],
        ['方案毛利率', pp.overallMargin + '%'],
        ['预算利用率', pp.budgetUtilization + '%'],
        ['履约状态', pp.canFulfill ? '可交付' : '需' + pp.maxLeadTime + '天'],
        ['', ''],
        ['产品名称', '品牌', '品牌级别', '供应商', '集采成本', '客户报价', '单品毛利率', '小计']
    ];

    pp.products.forEach(p => {
        rows.push([p.name, p.brand, p.brandLevel, p.supplier, p.purchasePrice, p.quotePrice, p.margin, p.subtotal]);
    });

    rows.push(['', '']);
    rows.push(['AI推荐理由', pp.aiRationale]);
    if (project) {
        rows.push(['', '']);
        rows.push(['项目名称', project.name]);
        rows.push(['客户公司', project.customerCompany]);
        rows.push(['企业性质', project.companyType]);
        rows.push(['人数', project.peopleCount]);
        rows.push(['人均预算', project.budgetPerPerson]);
    }

    const ws = XLSX.utils.aoa_to_sheet(rows);
    ws['!cols'] = [{ wch: 20 }, { wch: 30 }, { wch: 15 }, { wch: 15 }, { wch: 12 }, { wch: 12 }, { wch: 12 }, { wch: 12 }];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, pp.name.substring(0, 31));
    XLSX.writeFile(wb, `${pp.name}.xlsx`);
}

// ========== PPT 导出 ==========
function exportProposalPPT(proposalId) {
    const pp = proposals.find(p => p.id === proposalId);
    if (!pp) return;
    const project = findProject(pp.projectId);

    if (typeof PptxGenJS === 'undefined') {
        alert('PPT 库加载中，请稍后再试。如果持续失败请刷新页面。');
        return;
    }

    const pres = new PptxGenJS();
    pres.defineLayout({ name: 'A4', width: '13.333', height: '7.5' });
    pres.layout = 'A4';

    // 封面
    const slide1 = pres.addSlide();
    slide1.background = { color: '1a56db' };
    slide1.addText(pp.name, { x: 1, y: 2, w: 10, h: 1.5, fontSize: 32, color: 'FFFFFF', bold: true, align: 'center' });
    slide1.addText(pp.tagline, { x: 1, y: 3.5, w: 10, h: 0.8, fontSize: 16, color: 'BFDBFE', align: 'center' });
    if (project) {
        slide1.addText(project.customerCompany || '', { x: 1, y: 5, w: 10, h: 0.5, fontSize: 12, color: 'FFFFFF', align: 'center' });
    }
    slide1.addText(new Date().toISOString().split('T')[0], { x: 1, y: 5.8, w: 10, h: 0.5, fontSize: 10, color: '93C5FD', align: 'center' });

    // 需求分析
    if (project?.structuredRequirement) {
        const slide2 = pres.addSlide();
        slide2.addText('需求分析', { x: 1, y: 0.5, w: 10, h: 0.8, fontSize: 24, bold: true, color: '1a56db' });
        slide2.addText(project.structuredRequirement, { x: 1, y: 1.5, w: 11, h: 5.5, fontSize: 11, color: '333333', valign: 'top' });
    }

    // 方案概览
    const slide3 = pres.addSlide();
    slide3.addText('方案概览', { x: 1, y: 0.5, w: 10, h: 0.8, fontSize: 24, bold: true, color: '1a56db' });
    slide3.addText(pp.name, { x: 1, y: 1.4, w: 5, h: 0.5, fontSize: 16, bold: true });
    slide3.addText(`主题：${pp.theme}    |    人均：${formatMoney(pp.totalPerPerson)}    |    毛利率：${pp.overallMargin}%    |    预算利用率：${pp.budgetUtilization}%`, { x: 1, y: 2.0, w: 11, h: 0.4, fontSize: 11, color: '666666' });

    // 产品表格
    const tableHeader = [['产品', '品牌', '规格/级别', '集采成本', '客户报价', '毛利率', '小计']];
    const tableRows = pp.products.map(p => [
        p.name, p.brand, p.brandLevel, formatMoney(p.purchasePrice), formatMoney(p.quotePrice), p.margin, formatMoney(p.subtotal)
    ]);
    slide3.addTable(tableHeader.concat(tableRows), {
        x: 1, y: 2.6, w: 11,
        fontSize: 10, border: { type: 'solid', color: 'CCCCCC' },
        colW: [3, 1.5, 1.5, 1.3, 1.3, 1, 1],
        rowH: [0.4],
        autoPage: false
    });

    // 推荐理由
    slide3.addText('推荐理由', { x: 1, y: 5.5, w: 3, h: 0.4, fontSize: 14, bold: true, color: '1a56db' });
    slide3.addText(pp.aiRationale, { x: 1, y: 5.9, w: 11, h: 1, fontSize: 10, color: '666666' });

    // 产品详情页
    pp.products.forEach((p, idx) => {
        if (idx < 6) { // 最多6个产品详情页
            const s = pres.addSlide();
            s.addText(`产品详情 ${idx + 1}`, { x: 1, y: 0.5, w: 10, h: 0.8, fontSize: 24, bold: true, color: '1a56db' });
            s.addText(p.name, { x: 1, y: 1.5, w: 10, h: 0.6, fontSize: 20, bold: true });
            const info = [
                ['品牌', p.brand], ['品牌级别', p.brandLevel], ['供应商', p.supplier],
                ['集采成本', formatMoney(p.purchasePrice)], ['客户报价', formatMoney(p.quotePrice)],
                ['单品毛利率', p.margin], ['数量', String(p.quantity)], ['小计', formatMoney(p.subtotal)]
            ];
            s.addTable(info, {
                x: 1, y: 2.3, w: 8,
                fontSize: 12, border: { type: 'solid', color: 'CCCCCC' },
                colW: [2.5, 5.5]
            });
        }
    });

    // 封底
    const lastSlide = pres.addSlide();
    lastSlide.background = { color: '1a56db' };
    lastSlide.addText('感谢阅览', { x: 1, y: 2.5, w: 10, h: 1, fontSize: 28, color: 'FFFFFF', bold: true, align: 'center' });
    lastSlide.addText(project?.customerCompany || '', { x: 1, y: 4, w: 10, h: 0.6, fontSize: 14, color: 'BFDBFE', align: 'center' });
    lastSlide.addText('如需进一步沟通，请联系我们', { x: 1, y: 4.8, w: 10, h: 0.5, fontSize: 11, color: '93C5FD', align: 'center' });

    pres.writeFile({ fileName: `${pp.name}.pptx` });
}

            max_tokens: 10
        } : {
            model: model,
            max_tokens: 10,
            messages: [{ role: 'user', content: 'Hello' }]
        };

        const headers = isOpenAIFormat
            ? { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` }
            : { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01' };

        const resp = await fetch(endpoint, {
            method: 'POST', headers, body: JSON.stringify(body)
        });

        if (resp.ok) {
            resultEl.textContent = '✅ 连接成功';
            resultEl.className = 'text-sm text-green-600';
            detailEl.classList.remove('hidden');
            detailEl.textContent = JSON.stringify(await resp.json(), null, 2);
        } else {
            const errText = await resp.text();
            resultEl.textContent = `❌ 连接失败 (${resp.status})`;
            resultEl.className = 'text-sm text-red-500';
            detailEl.classList.remove('hidden');
            detailEl.textContent = errText.substring(0, 500);
        }
    } catch (e) {
        resultEl.textContent = '❌ 网络错误：' + e.message;
        resultEl.className = 'text-sm text-red-500';
    }
}

// ========== 启动 ==========
async function boot() {
    await init();              // 先初始化 DB
    await loadAISettings();    // 再加载 AI 设置
    showAISettingsForm();      // 如果当前在设置页，填充表单
}
boot();
</script>
</body>
</html>
