document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

function getCatOptions(major) {
    const cats = [];
    for (const [cat, maj] of Object.entries(SUBCATEGORY_TO_MAJOR)) {
        if (maj === major) cats.push(cat);
    }
    cats.sort((a, b) => a.localeCompare(b, 'zh-CN'));
    return cats;
}

function hasFieldIssue(field, p) {
    const v = p[field];
    switch (field) {
        case 'brand': return !v || /^\d+\.?\d*$/.test(v);
        case 'majorCategory': return OBSOLETE_MAJORS[v];
        case 'category': return !v || STANDARD_MAJORS.includes(v) || OBSOLETE_MAJORS[v];
        case 'brandLevel': return !v;
        case 'brandStyle': return !v;
        case 'priceRange': return !v;
	        case 'region': return !v;
        default: return false;
    }
}

function renderProductTable(brand, products) {
    // 构建可见列列表（name 始终在最前，其余按 order 过滤 visible）
    const visibleFields = COLUMN_CONFIG.order.filter(f => COLUMN_CONFIG.visible.includes(f));
    if (!visibleFields.includes('name')) visibleFields.unshift('name');

    // 收集各列唯一值（用于筛选下拉）
    const colValues = {};
    for (const f of visibleFields) {
        const vals = new Set();
        products.forEach(p => { if (p[f]) vals.add(String(p[f]).trim()); });
        colValues[f] = [...vals].sort((a, b) => a.localeCompare(b, 'zh-CN'));
    }

    // 应用列筛选
    let displayIndices = products.map((_, i) => i);
    if (VIEW_MODE === 'supplier' && SUPPLIER_BRAND_FILTER) {
        displayIndices = displayIndices.filter(i => (products[i].brand || '').trim() === SUPPLIER_BRAND_FILTER);
    }
    for (const [field, val] of Object.entries(COLUMN_FILTERS)) {
        if (!val) continue;
        const v = val.toLowerCase();
        displayIndices = displayIndices.filter(i => {
            const pv = products[i][field];
            return pv !== undefined && pv !== null && String(pv).toLowerCase().includes(v);
        });
    }

    // 筛选行的 input/select 构建函数
    const buildFilterInput = (f) => {
        const curVal = COLUMN_FILTERS[f] || '';
        if (f === 'name' || f === 'category' || f === 'majorCategory' || f === 'brand' || f === 'brandLevel' || f === 'brandStyle' || f === 'priceRange' || f === 'sceneTag' || f === 'region') {
            const vals = colValues[f] || [];
            return `<input list="dl-${f}" data-filter="${f}" value="${escAttr(curVal)}" placeholder="筛选..." onchange="applyColumnFilter(this)" class="col-filter-sel"><datalist id="dl-${f}">${vals.map(v => `<option value="${escAttr(v)}">`).join('')}</datalist>`;
        }
        return `<input data-filter="${f}" value="${escAttr(curVal)}" placeholder="筛选..." onchange="applyColumnFilter(this)">`;
    };

    // 表头（两行：标签 + 筛选）
    const labelCols = ['<th class="col-cb"><input type="checkbox" id="cb-all" title="全选/全不选"></th>'];
    const filterCols = ['<th class="col-cb"></th>'];
    for (const f of visibleFields) {
        labelCols.push(`<th>${escHtml(fieldLabel(f))}</th>`);
        filterCols.push(`<th class="col-filter">${buildFilterInput(f)}</th>`);
    }
    labelCols.push('<th class="col-del"></th>');
    filterCols.push('<th class="col-del"></th>');
    const header = '<thead><tr>' + labelCols.join('') + '</tr><tr>' + filterCols.join('') + '</tr></thead>';

    const rows = displayIndices.map(i => {
        const p = products[i];
        let row = `<tr data-idx="${i}"><td class="col-cb"><input type="checkbox" ${_selectedIndices.has(i) ? 'checked' : ''} id="cb-${i}"></td>`;
        for (const f of visibleFields) {
            const raw = p[f];
            let display = '';
            if (raw === undefined || raw === null) display = '—';
            else if (typeof raw === 'boolean') display = raw ? '✅' : '❌';
            else if (typeof raw === 'number') display = raw.toLocaleString();
            else display = escHtml(String(raw));
            if (f === 'name') {
                row += `<td class="col-name" title="点击查看详情" onclick="showProductDetail(${i})">${display || '—'}</td>`;
            } else {
                const issue = hasFieldIssue(f, p);
                const title = issue ? (fieldLabel(f) + '需修正') : '';
                row += `<td class="editable${issue ? ' cell-issue' : ''}" data-field="${escAttr(f)}" data-idx="${i}" title="${title}">${display || '—'}</td>`;
            }
        }
        row += `<td class="col-del"><button class="del-btn" onclick="(async()=>await deleteProduct(${i}))()" title="删除此产品">🗑</button></td></tr>`;
        return row;
    }).join('');

    document.getElementById('product-table').innerHTML = header + '<tbody>' + rows + '</tbody>';

    // 全选/全不选
    const cbAll = document.getElementById('cb-all');
    if (cbAll) {
        cbAll.addEventListener('change', () => {
            const checked = cbAll.checked;
            document.querySelectorAll('#product-table tbody input[type=checkbox]').forEach(cb => {
                cb.checked = checked;
                const idx = parseInt(cb.id.replace('cb-', ''));
                if (checked) _selectedIndices.add(idx);
                else _selectedIndices.delete(idx);
            });
            if (!checked) _selectedIndices.clear();
            updateBatchBar();
        });
    }
    // 单个checkbox变化
    document.querySelectorAll('#product-table input[type=checkbox]').forEach(cb => {
        if (cb.id === 'cb-all') return;
        cb.addEventListener('change', () => {
            const idx = parseInt(cb.id.replace('cb-', ''));
            if (cb.checked) _selectedIndices.add(idx);
            else _selectedIndices.delete(idx);
            updateBatchBar();
        });
    });

    // 绑定编辑事件
    document.getElementById('product-table').querySelectorAll('.editable').forEach(cell => {
        cell.addEventListener('click', () => startEdit(cell));
    });
    updateBatchBar();
}

function startEdit(cell) {
    if (cell.classList.contains('editing')) return;
    const field = cell.dataset.field;
    const idx = parseInt(cell.dataset.idx);
    const products = BRAND_GROUPS[ACTIVE_BRAND];
    const p = products[idx];
    const curVal = p[field] !== undefined && p[field] !== null ? String(p[field]) : '';
    cell.classList.add('editing');
    cell.innerHTML = '';

    let input;
    // 已知字段用 select，未知字段用 text input
    if (field === 'majorCategory') {
        input = document.createElement('select');
        input.innerHTML = ['<option value="">—</option>', ...STANDARD_MAJORS.map(m => `<option value="${m}" ${m === curVal ? 'selected' : ''}>${m}</option>`)].join('');
    } else if (field === 'category') {
        input = document.createElement('select');
        const major = p.majorCategory || '';
        const cats = getCatOptions(major);
        input.innerHTML = ['<option value="">—</option>', ...cats.map(c => `<option value="${escAttr(c)}" ${c === curVal ? 'selected' : ''}>${escHtml(c)}</option>`)].join('');
        if (curVal && !cats.includes(curVal)) {
            input.innerHTML += `<option value="${escAttr(curVal)}" selected>${escHtml(curVal)} (当前)</option>`;
        }
    } else if (field === 'sceneTag') {
        input = document.createElement('select');
        const scenePresets = getSCENE_TAGS();
        input.innerHTML = scenePresets.map(s => `<option value="${s}" ${s === curVal ? 'selected' : ''}>${s || '—'}</option>`).join('');
        if (curVal && !scenePresets.includes(curVal)) {
            input.innerHTML += `<option value="${escAttr(curVal)}" selected>${escHtml(curVal)} (当前)</option>`;
        }
    } else if (field === 'brandLevel') {
        input = document.createElement('select');
        const blOpts = getBRAND_LEVELS();
        input.innerHTML = blOpts.map(o => `<option value="${o}" ${o === curVal ? 'selected' : ''}>${o || '—'}</option>`).join('');
        if (curVal && !blOpts.includes(curVal)) {
            input.innerHTML += `<option value="${escAttr(curVal)}" selected>${escHtml(curVal)} (当前)</option>`;
        }
    } else if (field === 'brandStyle') {
        input = document.createElement('select');
        const bsOpts = getBRAND_STYLES();
        input.innerHTML = bsOpts.map(o => `<option value="${o}" ${o === curVal ? 'selected' : ''}>${o || '—'}</option>`).join('');
        if (curVal && !bsOpts.includes(curVal)) {
            input.innerHTML += `<option value="${escAttr(curVal)}" selected>${escHtml(curVal)} (当前)</option>`;
        }
    } else if (field === 'region') { input = document.createElement('select'); input.innerHTML = REGIONS.map(o => `<option value="${o}" ${o === curVal ? 'selected' : ''}>${o || '—'}</option>`).join(''); if (curVal && !REGIONS.includes(curVal)) { input.innerHTML += `<option value="${escAttr(curVal)}" selected>${escHtml(curVal)} (当前)</option>`; } } else if (field === 'priceRange') {
        input = document.createElement('select');
        const prOpts = getPRICE_RANGES();
        input.innerHTML = prOpts.map(o => `<option value="${o}" ${o === curVal ? 'selected' : ''}>${o || '—'}</option>`).join('');
        if (curVal && !prOpts.includes(curVal)) {
            input.innerHTML += `<option value="${escAttr(curVal)}" selected>${escHtml(curVal)} (当前)</option>`;
        }
    } else if (field === 'productType') {
        input = document.createElement('select');
        const types = getPRODUCT_TYPES();
        const typeOpts = ['', ...types];
        input.innerHTML = typeOpts.map(t => `<option value="${t}" ${t === curVal ? 'selected' : ''}>${t || '—'}</option>`).join('');
        if (curVal && !typeOpts.includes(curVal)) {
            input.innerHTML += `<option value="${escAttr(curVal)}" selected>${escHtml(curVal)} (当前)</option>`;
        }
    } else if (field === 'supportsDropship' || field === 'sugarFree' || field === 'organic' || field === 'freightIncluded') {
        input = document.createElement('select');
        const boolOpts = ['', '是', '否'];
        const curNorm = curVal === 'true' || curVal === '是' ? '是' : curVal === 'false' || curVal === '否' ? '否' : curVal;
        input.innerHTML = boolOpts.map(o => `<option value="${o}" ${o === curNorm ? 'selected' : ''}>${o || '—'}</option>`).join('');
        if (curNorm && !boolOpts.includes(curNorm)) {
            input.innerHTML += `<option value="${escAttr(curNorm)}" selected>${escHtml(curNorm)} (当前)</option>`;
        }
    } else {
        input = document.createElement('input');
        input.type = 'text';
        input.value = curVal;
        input.placeholder = fieldLabel(field);
    }

    const commit = () => {
        let newVal = input.value;
        if (newVal !== curVal) {
            // 布尔字段规范化
            if (field === 'supportsDropship' || field === 'sugarFree' || field === 'organic' || field === 'freightIncluded') {
                newVal = newVal === '是' ? 'true' : newVal === '否' ? 'false' : newVal;
            }
            applyEdit(p, field, newVal);
        }
        cell.textContent = newVal || '—';
        cell.classList.remove('editing');
        const hasIssue = hasFieldIssue(field, p);
        if (!hasIssue) cell.classList.remove('cell-issue');
        if (hasIssue) cell.classList.add('cell-issue');
        if (newVal !== curVal) updateDetailIssues();
    };

    input.addEventListener('change', commit);
    input.addEventListener('blur', () => { if (cell.classList.contains('editing')) commit(); });
    cell.appendChild(input);
    input.focus();
    // 品类字段：附加"✎"按钮支持自定义输入
    if (field === 'category') {
        cell.style.display = 'flex';
        cell.style.alignItems = 'center';
        input.style.flex = '1';
        const addBtn = document.createElement('button');
        addBtn.textContent = '✎';
        addBtn.title = '输入新品类';
        addBtn.style.cssText = 'margin-left:4px;padding:4px 6px;border:1px solid var(--border);border-radius:3px;background:#fff;cursor:pointer;font-size:13px;flex-shrink:0;';
        addBtn.onmousedown = (e) => { e.preventDefault(); e.stopPropagation(); };
        addBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            const textInput = document.createElement('input');
            textInput.type = 'text';
            textInput.value = curVal;
            textInput.placeholder = '输入新品类名';
            textInput.style.cssText = 'width:100%;padding:4px 6px;border:2px solid var(--primary);border-radius:3px;font-size:13px;outline:none;';
            cell.innerHTML = '';
            cell.style.display = '';
            cell.appendChild(textInput);
            input = textInput;
            textInput.focus();
            textInput.addEventListener('change', commit);
            textInput.addEventListener('blur', () => { if (cell.classList.contains('editing')) commit(); });
        });
        cell.appendChild(addBtn);
    }
}

// ========== 编辑 ==========
function applyEdit(product, field, value) {
    product[field] = value;
    if (field === 'brand') {
        // 品牌变化 → 仅品牌模式下重新分组
        if (VIEW_MODE === 'brand') handleBrandChange(product, value);
    }
    markBrandDirty(product);
}

function handleBrandChange(product, newBrand) {
    const oldBrand = ACTIVE_BRAND;
    const normalizedNew = (newBrand || '').trim() || '__无品牌__';
    if (normalizedNew === oldBrand && product.brand === (ACTIVE_BRAND === '__无品牌__' ? '' : ACTIVE_BRAND)) return;
    product.brand = (normalizedNew === '__无品牌__' ? '' : normalizedNew);
    // 保存该产品的原始快照（跨组迁移）
    let prodOrig = null;
    if (BRAND_ORIGINALS[oldBrand]) {
        const oidx = BRAND_ORIGINALS[oldBrand].findIndex(o => o.id === product.id);
        if (oidx >= 0) {
            prodOrig = BRAND_ORIGINALS[oldBrand].splice(oidx, 1)[0];
        }
    }
    // 从旧组移除
    const oldGroup = BRAND_GROUPS[oldBrand];
    const idx = oldGroup.indexOf(product);
    if (idx >= 0) oldGroup.splice(idx, 1);
    DIRTY_BRANDS.add(oldBrand);  // 旧品牌有变更（产品移出）
    if (oldGroup.length === 0) {
        delete BRAND_GROUPS[oldBrand];
        delete BRAND_STATS[oldBrand];
        // 保留 BRAND_ORIGINALS 和 DIRTY_BRANDS 以便撤销/保存
    } else {
        BRAND_STATS[oldBrand] = computeBrandStats(oldBrand, oldGroup);
    }
    // 加入新组
    if (!BRAND_GROUPS[normalizedNew]) BRAND_GROUPS[normalizedNew] = [];
    BRAND_GROUPS[normalizedNew].push(product);
    BRAND_STATS[normalizedNew] = computeBrandStats(normalizedNew, BRAND_GROUPS[normalizedNew]);
    DIRTY_BRANDS.add(normalizedNew);
    // 迁移原始快照到新组
    if (!BRAND_ORIGINALS[normalizedNew]) BRAND_ORIGINALS[normalizedNew] = [];
    if (prodOrig) {
        BRAND_ORIGINALS[normalizedNew].push(prodOrig);
    } else {
        // 该产品首次被编辑 → 用修改前的状态创建快照（brand 改为 newBrand 之前的 oldBrand）
        const copy = {};
        for (const f of Object.keys(product)) { if (!f.startsWith('_')) copy[f] = (f === 'brand' ? oldBrand : product[f]); }
        copy.id = product.id;
        BRAND_ORIGINALS[normalizedNew].push(copy);
    }
    if (BRAND_ORIGINALS[normalizedNew].length === 0) delete BRAND_ORIGINALS[normalizedNew];
    // 如果当前品牌组已空，切到新组
    if (!BRAND_GROUPS[oldBrand]) {
        ACTIVE_BRAND = normalizedNew;
    }
    renderBrandList();
    renderProductTable(ACTIVE_BRAND, BRAND_GROUPS[ACTIVE_BRAND]);
}

function updateDetailIssues() {
    if (!ACTIVE_BRAND) return;
    const stats = BRAND_STATS[ACTIVE_BRAND];
    if (!stats) return;
    const isBrand = VIEW_MODE === 'brand';
    const issues = [];
    if (isBrand) {
        if (stats.missingBL > 0) issues.push(`${stats.missingBL}缺品牌级别`);
        if (stats.missingBS > 0) issues.push(`${stats.missingBS}缺品牌调性`);
        if (stats.missingPR > 0) issues.push(`${stats.missingPR}缺价格定位`);
    } else {
        if ((stats.missingBrand || 0) > 0) issues.push(`${stats.missingBrand}缺品牌`);
    }
    if (stats.missingCat > 0) issues.push(`${stats.missingCat}品类泛化`);
    if (stats.obsoleteMajor > 0) issues.push(`${stats.obsoleteMajor}大类需更新`);
    const el = document.getElementById('detail-issues');
    if (el) {
        el.innerHTML = issues.length > 0
            ? '<span style="color:var(--danger);">⚠ ' + issues.join(' · ') + '</span>'
            : '<span style="color:var(--success);">✓ 无问题</span>';
    }
}

async function deleteProduct(idx) {
    const products = BRAND_GROUPS[ACTIVE_BRAND];
    if (!products || idx < 0 || idx >= products.length) return;
    const p = products[idx];
    if (!confirm(`确定删除产品"${p.name}"？\n\n可以撤销，但需要在本${_glabel()}内操作。`)) return;
    // 快照此产品以便撤销
    if (!BRAND_DELETED[ACTIVE_BRAND]) BRAND_DELETED[ACTIVE_BRAND] = [];
    BRAND_DELETED[ACTIVE_BRAND].push(p);
    // 从分组和全量中移除
    products.splice(idx, 1);
    const allIdx = ALL_PRODUCTS.findIndex(x => x.id === p.id);
    if (allIdx >= 0) ALL_PRODUCTS.splice(allIdx, 1);
    markBrandDirtyByBrand(ACTIVE_BRAND);
    BRAND_STATS[ACTIVE_BRAND] = recomputeStats(ACTIVE_BRAND, products);
    renderProductTable(ACTIVE_BRAND, products);

async function deleteSelected() {

async function batchApply() {
    const brandVal = document.getElementById('batch-brand').value.trim();
    const majorVal = document.getElementById('batch-major').value;
    const catVal = document.getElementById('batch-cat').value;
    const sceneVal = document.getElementById('batch-scene').value;
    const levelVal = document.getElementById('batch-level').value;
    const styleVal = document.getElementById('batch-style').value;
    const priceVal = document.getElementById('batch-price').value; const regionVal = document.getElementById('batch-region').value;
    const productTypeVal = document.getElementById('batch-productType').value;
    const dropshipVal = document.getElementById('batch-supportsDropship').value;
    const deliveryVal = document.getElementById('batch-delivery').value.trim();
    const stockTypeVal = document.getElementById('batch-stockType').value;
    const stockStatusVal = document.getElementById('batch-stockStatus').value;
    const products = BRAND_GROUPS[ACTIVE_BRAND] || [];
    const selIndices = getSelectedIndices();
    if (selIndices.length === 0) { toast('请先勾选产品'); return; }
    let count = 0;
    // Apply field edits first (before brand migration shifts indices)
    for (const i of selIndices) {
        const p = products[i];
        if (!p) continue;
        if (majorVal) { applyEdit(p, 'majorCategory', majorVal); count++; }
        if (catVal) { applyEdit(p, 'category', catVal); count++; }
        if (sceneVal) { applyEdit(p, 'sceneTag', sceneVal); count++; }
        if (levelVal) { applyEdit(p, 'brandLevel', levelVal); count++; }
        if (styleVal) { applyEdit(p, 'brandStyle', styleVal); count++; }
        if (priceVal) { applyEdit(p, 'priceRange', priceVal); count++; } if (regionVal) { applyEdit(p, 'region', regionVal); count++; }
        if (productTypeVal) { applyEdit(p, 'productType', productTypeVal); count++; }
        if (dropshipVal) { applyEdit(p, 'supportsDropship', dropshipVal); count++; }
        if (deliveryVal) { applyEdit(p, 'deliveryFrom', deliveryVal); count++; }
        if (stockTypeVal) { applyEdit(p, 'stockType', stockTypeVal); count++; }
        if (stockStatusVal) { applyEdit(p, 'stockStatus', stockStatusVal); count++; }
    }
    // Brand migration last (mutates groups, shifts indices) — 仅品牌模式
    let newBrandName = null;
    if (brandVal && VIEW_MODE === 'brand') {
        newBrandName = (brandVal || '').trim() || '__无品牌__';
        const toMove = selIndices.map(i => products[i]).filter(Boolean);
        for (const p of toMove) {
            handleBrandChange(p, brandVal);
        }
    }
    // Refresh display
    _selectedIndices.clear();
    document.getElementById('cb-all').checked = false;
    document.getElementById('batch-count').textContent = '';
    document.getElementById('batch-bar').style.display = 'none';
    const curProds = BRAND_GROUPS[ACTIVE_BRAND];
    if (curProds) {
        renderProductTable(ACTIVE_BRAND, curProds);
    } else {
        document.getElementById('product-area').innerHTML = '<div style="padding:40px;text-align:center;color:var(--text2);">该' + _glabel() + '已无产品</div>';
        document.getElementById('brand-footer').innerHTML = '';
        document.getElementById('batch-bar').style.display = 'none';
    }
    renderBrandList();
    // Auto-save both affected brands when brand changed (仅品牌模式)
    if (brandVal && newBrandName) {
        const prevActive = ACTIVE_BRAND;
        // Save new brand group first
        if (BRAND_GROUPS[newBrandName]) {
            ACTIVE_BRAND = newBrandName;
            await saveBrand();
        }
        // Save old brand group if it still has products
        if (BRAND_GROUPS[prevActive]) {
            ACTIVE_BRAND = prevActive;
            await saveBrand();
        }
        toast('批量修改: ' + count + ' 处已更新 + 品牌迁移并已保存');
    } else {
        toast('批量修改: ' + count + ' 处已更新');
    }
}

                return copy;
            });

    // 即时重算统计，确保左侧品牌列表的红色标记反映当前数据
    if (BRAND_GROUPS[key]) {
        BRAND_STATS[key] = recomputeStats(key, BRAND_GROUPS[key]);

// ========== 保存/撤销 ==========
async function saveBrand() {
    if (!ACTIVE_BRAND) return;
    if (!DIRTY_BRANDS.has(ACTIVE_BRAND)) { toast('没有修改'); return; }
    const btn = document.getElementById('btn-save-brand');
    const origText = btn.textContent;
    btn.textContent = '保存中...';
    btn.disabled = true;
    try {
        const products = BRAND_GROUPS[ACTIVE_BRAND] || [];
        const deleted = BRAND_DELETED[ACTIVE_BRAND] || [];
        const tx = DB.transaction('products', 'readwrite');
        const store = tx.objectStore('products');
        for (const d of deleted) {
            store.delete(d.id);
        }
        for (const p of products) {
            store.put(p);
        }
        await new Promise((resolve, reject) => {
            tx.oncomplete = resolve;
            tx.onerror = () => reject(tx.error);
            tx.onabort = () => reject(new Error('事务被中止'));
        });
        delete BRAND_DELETED[ACTIVE_BRAND];
        // 验证：读回数据确认已写入
        const vtx = DB.transaction('products', 'readonly');
        const vstore = vtx.objectStore('products');
        const ids = products.map(p => p.id);
        let verified = 0;
        for (const id of ids) {
            const req = vstore.get(id);
            await new Promise(r => { req.onsuccess = r; req.onerror = r; });
            if (req.result) verified++;
        }
        DIRTY_BRANDS.delete(ACTIVE_BRAND);
        delete BRAND_ORIGINALS[ACTIVE_BRAND];
        BRAND_STATS[ACTIVE_BRAND] = recomputeStats(ACTIVE_BRAND, products);
        renderProductTable(ACTIVE_BRAND, products);
        renderBrandList();
        document.getElementById('btn-undo-brand').disabled = true;
        document.getElementById('btn-undo-all').disabled = DIRTY_BRANDS.size === 0;
        toast('已保存: ' + ACTIVE_BRAND + ' (' + verified + '/' + products.length + '品' + (deleted.length ? ', 删除' + deleted.length + '品' : '') + ')');
        document.getElementById('btn-undo-brand').textContent = '撤销此' + _glabel();
    } catch (e) {
        toast('保存失败: ' + e.message);
        alert('保存失败: ' + e.message + '\n\n请检查数据库连接，不要刷新页面。');
    }
    btn.textContent = origText;
    btn.disabled = false;
}

function undoBrand() {
    if (!ACTIVE_BRAND) return;
    const originals = BRAND_ORIGINALS[ACTIVE_BRAND];
    if (!originals && !(BRAND_DELETED[ACTIVE_BRAND] && BRAND_DELETED[ACTIVE_BRAND].length)) return;
    const products = BRAND_GROUPS[ACTIVE_BRAND] || [];
    // 恢复字段修改
    if (originals) {
        const map = {};
        for (const o of originals) map[o.id] = o;
        for (const p of products) {
            const orig = map[p.id];
            if (orig) { for (const f of Object.keys(orig)) { if (!f.startsWith("_") || f === "id") p[f] = orig[f]; } }
        }
        delete BRAND_ORIGINALS[ACTIVE_BRAND];
    }
    // 恢复已删除产品
    const deleted = BRAND_DELETED[ACTIVE_BRAND] || [];
    if (deleted.length) {
        for (const p of deleted) {
            products.push(p);
            ALL_PRODUCTS.push(p);
        }
        delete BRAND_DELETED[ACTIVE_BRAND];
    }
    DIRTY_BRANDS.delete(ACTIVE_BRAND);
    BRAND_STATS[ACTIVE_BRAND] = recomputeStats(ACTIVE_BRAND, products);
    document.getElementById('btn-undo-brand').disabled = true;
    document.getElementById('btn-undo-all').disabled = DIRTY_BRANDS.size === 0;
    renderBrandList();
    renderProductTable(ACTIVE_BRAND, products);
    toast('已撤销: ' + ACTIVE_BRAND);
}

function undoAll() {
    const count = DIRTY_BRANDS.size;
    if (count === 0) return;
    if (!confirm('撤销全部 ' + count + ' 个' + _glabel() + '的修改？')) return;
    for (const brand of DIRTY_BRANDS) {
        const originals = BRAND_ORIGINALS[brand];
        const products = BRAND_GROUPS[brand] || [];
        if (originals) {
            const map = {};
            for (const o of originals) map[o.id] = o;
            for (const p of products) {
                const orig = map[p.id];
                if (orig) { for (const f of Object.keys(orig)) { if (!f.startsWith("_")) p[f] = orig[f]; } }
            }
            delete BRAND_ORIGINALS[brand];
        }
        // 恢复已删除产品
        const deleted = BRAND_DELETED[brand] || [];
        if (deleted.length) {
            for (const p of deleted) products.push(p);
            if (!BRAND_GROUPS[brand]) BRAND_GROUPS[brand] = products;
            for (const p of deleted) ALL_PRODUCTS.push(p);
            delete BRAND_DELETED[brand];
        }
        BRAND_STATS[brand] = recomputeStats(brand, products);
    }
    DIRTY_BRANDS.clear();
    document.getElementById('btn-undo-all').disabled = true;
    if (ACTIVE_BRAND) {
        document.getElementById('btn-undo-brand').disabled = true;
        renderProductTable(ACTIVE_BRAND, BRAND_GROUPS[ACTIVE_BRAND]);
    }
    renderBrandList();
    toast('已全部撤销');
}

async function saveAllToDB() {
    const count = DIRTY_BRANDS.size;
    if (count === 0) { toast('没有需要保存的修改'); return; }
    if (!confirm('将保存 ' + count + ' 个' + _glabel() + '的修改到数据库。\n建议先下载备份。\n\n确定继续？')) return;
    const btn = document.getElementById('btn-save-all');
    const origText = btn.textContent;
    btn.textContent = '保存中...';
    btn.disabled = true;
    try {
        let totalProducts = 0;
        let totalDeleted = 0;
        const tx = DB.transaction('products', 'readwrite');
        const store = tx.objectStore('products');
        for (const brand of DIRTY_BRANDS) {
            const deleted = BRAND_DELETED[brand] || [];
            for (const d of deleted) {
                store.delete(d.id);
                totalDeleted++;
            }
        }
        for (const brand of DIRTY_BRANDS) {
            const prods = BRAND_GROUPS[brand];
            if (prods) {
                for (const p of prods) {
                    store.put(p);
                    totalProducts++;
                }
            }
        }
        await new Promise((resolve, reject) => {
            tx.oncomplete = resolve;
            tx.onerror = () => reject(tx.error);
            tx.onabort = () => reject(new Error('事务被中止'));
        });
        const savedBrands = DIRTY_BRANDS.size;
        for (const brand of DIRTY_BRANDS) {
            delete BRAND_ORIGINALS[brand];
            delete BRAND_DELETED[brand];
            BRAND_STATS[brand] = recomputeStats(brand, BRAND_GROUPS[brand]);
        }
        DIRTY_BRANDS.clear();
        document.getElementById('btn-undo-all').disabled = true;
        if (ACTIVE_BRAND) document.getElementById('btn-undo-brand').disabled = true;
        renderBrandList();
        toast('已保存 ' + savedBrands + ' 个' + _glabel() + ' / ' + totalProducts + ' 个产品' + (totalDeleted ? ' + 删除' + totalDeleted + '个' : ''));
    } catch (e) {
        toast('保存失败: ' + e.message);
        alert('保存失败: ' + e.message + '\n\n请检查数据库连接，不要刷新页面。');
    }
    btn.textContent = origText;
    btn.disabled = false;
}

function downloadBackup() {
    if (ALL_PRODUCTS.length === 0) return;
    const ts = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
    const data = JSON.stringify(ALL_PRODUCTS, null, 2);
    const blob = new Blob([data], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'product-library-backup-' + ts + '.json';
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
    log('备份已下载: ' + ALL_PRODUCTS.length + ' 条');
}

let aiSettings = { apiType: 'deepseek', endpoint: 'https://api.deepseek.com/chat/completions', apiKey: '', model: 'deepseek-chat', maxTokens: 2048, temperature: 0.3 };

async function loadAISettings() {
    try {
        const tx = DB.transaction('settings', 'readonly');
        const store = tx.objectStore('settings');
        const req = store.get('aiSettings');
        await new Promise((r, e) => { tx.oncomplete = r; tx.onerror = () => e(tx.error); });
        if (req.result && req.result.value) {
            aiSettings = { ...aiSettings, ...req.result.value };
        }

        // settings store may not exist — use defaults
        console.log('[数据修复] AI设置加载失败，使用默认配置', e.message);

}

async function callAI(prompt) {
    if (!aiSettings.apiKey) throw new Error('请先在主应用中配置 AI API Key（设置 → AI 设置）');
    const isOpenAI = aiSettings.apiType === 'openai' || aiSettings.apiType === 'deepseek' || aiSettings.apiType === 'custom';
    const body = isOpenAI
        ? { model: aiSettings.model, messages: [{ role: 'user', content: prompt }], max_tokens: aiSettings.maxTokens, temperature: aiSettings.temperature, response_format: { type: 'json_object' } }
        : { model: aiSettings.model, max_tokens: aiSettings.maxTokens, messages: [{ role: 'user', content: prompt + '\n\n请只返回 JSON 对象，不要其他内容。' }] };
    const headers = isOpenAI
        ? { 'Content-Type': 'application/json', 'Authorization': `Bearer ${aiSettings.apiKey}` }
        : { 'Content-Type': 'application/json', 'x-api-key': aiSettings.apiKey, 'anthropic-version': '2023-06-01' };
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 30000);
    try {
        const resp = await fetch(aiSettings.endpoint, { method: 'POST', headers, body: JSON.stringify(body), signal: controller.signal });
        clearTimeout(timer);
        if (!resp.ok) { const errText = await resp.text(); throw new Error(`HTTP ${resp.status}: ${errText.slice(0, 200)}`); }
        const data = await resp.json();
        return isOpenAI ? data.choices[0].message.content : data.content[0].text;
    } catch (e) {
        clearTimeout(timer);
        if (e.name === 'AbortError') throw new Error('AI 请求超时（30秒）');
        throw e;
    }
}

const AI_CAT_BATCH_SIZE = 20;
let _aiCatResults = []; // { idx, name, curMajor, curCat, aiMajor, aiCat, reason }

async function aiDetectCategory() {
	if (!ACTIVE_BRAND || VIEW_MODE !== 'brand') return;
	const products = BRAND_GROUPS[ACTIVE_BRAND] || [];
	const selIndices = getSelectedIndices();
	if (selIndices.length === 0) { toast('请先勾选产品'); return; }
	const btn = document.getElementById('btn-ai-detect-cat');
	const origText = btn.textContent;
	btn.textContent = 'AI检测中...';
	btn.disabled = true;

	const selected = selIndices.map(function(i) { return { idx: i, p: products[i] }; }).filter(function(x) { return x.p && x.p.name; });
	if (selected.length === 0) { toast('选中的产品没有有效名称'); btn.textContent = origText; btn.disabled = false; return; }

	_aiCatResults = [];
	// 分批调用 AI
	const batches = [];
	for (let i = 0; i < selected.length; i += AI_CAT_BATCH_SIZE) {
		batches.push(selected.slice(i, i + AI_CAT_BATCH_SIZE));
	}
	let batchNum = 0;
	for (const batch of batches) {
		batchNum++;
		btn.textContent = 'AI检测中...(' + batchNum + '/' + batches.length + ')';
		try {
			const prompt = buildCategoryPrompt(batch);
			const raw = await callAI(prompt);
			const parsed = parseCategoryResponse(raw, batch);
			for (const item of parsed) {
				const s = batch.find(function(b) { return b.idx === item.idx; });
				if (!s) continue;
				const curMajor = s.p.majorCategory || '';
				const curCat = s.p.category || '';
				const aiMajor = item.majorCategory || '';
				const aiCat = item.category || '';
				// 只保留有变化的
				if (aiMajor && (aiMajor !== curMajor || aiCat !== curCat)) {
					_aiCatResults.push({
						idx: s.idx, name: s.p.name,
						curMajor: curMajor, curCat: curCat,
						aiMajor: aiMajor, aiCat: aiCat,
						reason: item.reason || ''
					});
				}
			}
		} catch (e) {
			console.error('AI品类检测批次' + batchNum + '失败:', e);
		}
	}
	btn.textContent = origText;
	btn.disabled = false;
	if (_aiCatResults.length === 0) {
		toast('AI检测完成，所有产品的品类与当前一致，无需修改');
		return;
	}
	showCategoryConfirmModal();
}

function buildCategoryPrompt(batch) {
	// 按大类分组列出可选品类
	const catByMajor = {};
	for (const [cat, major] of Object.entries(SUBCATEGORY_TO_MAJOR)) {
		if (!catByMajor[major]) catByMajor[major] = [];
		catByMajor[major].push(cat);
	}
	let catList = '';
	for (const [major, cats] of Object.entries(catByMajor)) {
		catList += major + ': ' + cats.join('、') + '\n';
	}
	let prodList = '';
	for (const s of batch) {
		const innerPack = s.p.innerPack || '';
		const packInfo = innerPack ? '，内配：' + innerPack : '';
		prodList += (s.idx + 1) + '. 品名：' + s.p.name + packInfo + '，当前大类：' + (s.p.majorCategory || '未知') + '，当前品类：' + (s.p.category || '未知') + '\n';
	}
	return '你是一个商品分类专家。请根据以下产品名称，判断每个产品的大类和品类。\n\n' +
		'可选大类：' + STANDARD_MAJORS.join('、') + '\n' +
		'可选品类（按大类分组）：\n' + catList + '\n' +
		'产品列表：\n' + prodList + '\n' +
		'请以 JSON 数组格式返回，每个元素包含：\n' +
		'{"index": ' + (batch[0].idx + 1) + ', "majorCategory": "食品饮料", "category": "坚果", "reason": "简短理由"}\n' +
		'注意：index 必须与产品列表中的序号一致。只返回 JSON 数组，不要其他内容。';
}

function parseCategoryResponse(raw, batch) {
	const match = raw.match(/\[[\s\S]*\]/);
	if (!match) throw new Error('未找到 JSON 数组');
	const arr = JSON.parse(match[0]);
	if (!Array.isArray(arr)) throw new Error('返回不是数组');
	const startIdx = batch[0].idx;
	return arr.map(function(item) {
		return {
			idx: (item.index || item.idx) - 1, // prompt 中的序号从 batch[0].idx+1 开始
			majorCategory: item.majorCategory || '',
			category: item.category || '',
			reason: item.reason || ''
		};
	});
}

// ========== 品牌重新识别 ==========
let _KNOWN_BRANDS = null;
function getKnownBrands() {
    if (!_KNOWN_BRANDS) {
        _KNOWN_BRANDS = new Set();
        for (const b of Object.keys(BRAND_TONE)) _KNOWN_BRANDS.add(b);
        for (const b of Object.keys(BRAND_TO_MAJOR)) _KNOWN_BRANDS.add(b);
        // 按长度降序排列，优先匹配长的品牌名
        _KNOWN_BRANDS = [..._KNOWN_BRANDS].sort((a, b) => b.length - a.length || b.localeCompare(a, 'zh-CN'));
    }
    return _KNOWN_BRANDS;
}

function tryExtractBrand(name) {
    if (!name || name === '产品名称') return null;
    const raw = name.trim();
    // 1. 提取【品牌名】前缀
    const bracketMatch = raw.match(/^【(.+?)】/);
    if (bracketMatch) {
        const extracted = bracketMatch[1].trim();
        // 验证提取的不是非品牌标签
        if (extracted.length >= 2 && extracted.length <= 12 && !NON_BRANDS.has(extracted)) {
            const cleaned = cleanBrandName(extracted);
            if (cleaned) return cleaned;
        }
    }
    // 2. 品名以已知品牌名开头
    for (const known of getKnownBrands()) {
        if (raw.startsWith(known) && known.length >= 2) {
            // 后面接数字/括号/空格/规格等（非中文，或中文但≥3字品牌）
            const after = raw.slice(known.length);
            if (!after || /^[0-9a-zA-Z\s\(\)（）、，。．\.\-\+×xX\*\/·•【\d]/.test(after) || known.length >= 3) {
                return known;
            }
        }
    }
    // 3. 去除【】前缀后再试
    const t = raw.replace(/^【.+?】\s*/, '').trim();
    // 4. BRAND_NORMALIZE 变体匹配
    for (const [variant, standard] of Object.entries(BRAND_NORMALIZE)) {
        if (t.includes(variant)) return standard;
    }
    // 5. 纯品牌名（≤6个中文字符，无数字规格）→ 通过 cleanBrandName
    if (/^[一-鿿·•]{2,6}$/.test(t) && !/\d/.test(t)) {
        const cleaned = cleanBrandName(t);
        if (cleaned) return cleaned;
    }
    // 6. cleanBrandName 处理整个品名
    const cleaned = cleanBrandName(t);
    if (cleaned && cleaned.length <= 8) return cleaned;
    return null;
}

function reidentifyBrand() {
    if (!ACTIVE_BRAND) return;
    const products = BRAND_GROUPS[ACTIVE_BRAND] || [];
    _aiBrandResults = [];
    for (let i = 0; i < products.length; i++) {
        const cb = document.getElementById('cb-' + i);
        if (cb && !cb.checked) continue;
        const p = products[i];
        const extracted = tryExtractBrand(p.name);
        const curBrand = (p.brand || '').trim();
        if (extracted && extracted !== curBrand) {
            _aiBrandResults.push({ idx: i, name: p.name, curBrand, newBrand: extracted });
        }
    }
    if (_aiBrandResults.length === 0) {
        toast('没有可重新识别的品牌名');
        return;
    }
    showBrandReidentificationModal();
}

function applyBrandReidentificationChanges() {
    const products = BRAND_GROUPS[ACTIVE_BRAND] || [];
    // 收集所有选中的修改，按 idx 倒序排列（避免 splice 后索引错乱）

    }

    let changed = 0;
    for (const ch of changes) {

        if (!p) continue;
        p.brand = ch.finalBrand;

async function saveReidentificationChanges() {
    const dirtyBrands = [...DIRTY_BRANDS];
    if (dirtyBrands.length === 0) return;
    const tx = DB.transaction('products', 'readwrite');
    const store = tx.objectStore('products');
    for (const brand of dirtyBrands) {
        const deleted = BRAND_DELETED[brand] || [];
        for (const d of deleted) {
            store.delete(d.id);
        }
    }
    for (const brand of dirtyBrands) {
        const prods = BRAND_GROUPS[brand];
        if (prods) {
            for (const p of prods) {
                store.put(p);
            }
        }
    }
    await new Promise((resolve, reject) => {
        tx.oncomplete = resolve;
        tx.onerror = () => reject(tx.error);
        tx.onabort = () => reject(new Error('事务被中止'));
    });
    for (const brand of dirtyBrands) {
        delete BRAND_ORIGINALS[brand];
        delete BRAND_DELETED[brand];
        BRAND_STATS[brand] = recomputeStats(brand, BRAND_GROUPS[brand]);
    }
    DIRTY_BRANDS.clear();
    document.getElementById('btn-undo-all').disabled = true;
    if (ACTIVE_BRAND) document.getElementById('btn-undo-brand').disabled = true;
}

// ========== 工具函数 ==========
function escHtml(s) { if (!s) return ''; return String(s).replace(/&/g, '&amp;').replace(/</g, '<').replace(/>/g, '>').replace(/"/g, '&quot;'); }
function escAttr(s) { if (!s) return ''; return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '<').replace(/>/g, '>'); }
function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(el._timeout);
    el._timeout = setTimeout(() => el.classList.remove('show'), 2000);
}
function log(msg, cls) {
    console.log('[数据修复]', msg);
}

// ========== 键盘快捷键 ==========
document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') return;
    if (e.ctrlKey && e.key === 'ArrowLeft') { e.preventDefault(); navigateBrand(-1); }
    if (e.ctrlKey && e.key === 'ArrowRight') { e.preventDefault(); navigateBrand(1); }
    if (e.ctrlKey && e.key === 's') { e.preventDefault(); saveBrand(); }
    if (e.ctrlKey && e.key === 'z') { e.preventDefault(); undoBrand(); }
});

connectDB();
