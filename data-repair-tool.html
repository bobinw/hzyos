<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>商品库数据修复工具</title>
<style>
:root {
    --bg: #f3f4f6; --card: #fff; --text: #1a1a1a; --text2: #6b7280;
    --border: #e5e7eb; --primary: #2563eb; --primary-h: #1d4ed8;
    --danger: #ef4444; --warning: #f59e0b; --success: #22c55e;
    --brand-active: #eff6ff; --brand-hover: #f9fafb;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
#app { display: grid; grid-template-rows: 52px 1fr; height: 100vh; }

/* Top Bar */
#topbar { background: var(--card); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 16px; gap: 12px; z-index: 10; }
#topbar h1 { font-size: 16px; white-space: nowrap; }
#topbar .spacer { flex: 1; }
#topbar .status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text2); }
#topbar .dot { width: 7px; height: 7px; border-radius: 50%; background: #d1d5db; }
#topbar .dot.on { background: var(--success); }

#mode-tabs { display: flex; gap: 0; margin-left: 8px; }
.mode-tab { padding: 5px 14px; border: 1px solid var(--border); background: #f9fafb; font-size: 13px; cursor: pointer; color: var(--text2); transition: all 0.15s; }
.mode-tab:first-child { border-radius: 5px 0 0 5px; }
.mode-tab:last-child { border-radius: 0 5px 5px 0; }
.mode-tab.active { background: var(--primary); color: #fff; border-color: var(--primary); z-index: 1; }
.mode-tab:hover:not(.active) { background: #f3f4f6; }

/* Main */
#main { display: grid; grid-template-columns: 300px 1fr; overflow: hidden; }

/* Left Panel */
#left { background: var(--card); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
#left-header { padding: 10px 12px; border-bottom: 1px solid var(--border); }
#left-header input { width: 100%; padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; outline: none; }
#left-header input:focus { border-color: var(--primary); }
#left-filters { padding: 8px 12px; border-bottom: 1px solid var(--border); display: flex; flex-wrap: wrap; gap: 6px; }
.filter-chip { font-size: 11px; padding: 3px 8px; border-radius: 999px; border: 1px solid var(--border); cursor: pointer; white-space: nowrap; user-select: none; transition: all 0.15s; background: #fff; }
.filter-chip.active { background: var(--primary); color: #fff; border-color: var(--primary); }
.filter-chip:hover:not(.active) { background: var(--brand-hover); }
#left-stats { padding: 6px 12px; font-size: 11px; color: var(--text2); border-bottom: 1px solid var(--border); }
#brand-list { flex: 1; overflow-y: auto; }
.brand-entry { display: flex; align-items: center; padding: 8px 12px; cursor: pointer; border-bottom: 1px solid #f3f4f6; transition: background 0.1s; gap: 8px; }
.brand-entry:hover { background: var(--brand-hover); }
.brand-entry.active { background: var(--brand-active); border-left: 3px solid var(--primary); padding-left: 9px; }
.brand-entry .sev { font-size: 14px; flex-shrink: 0; width: 20px; text-align: center; }
.brand-entry .info { flex: 1; min-width: 0; }
.brand-entry .name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.brand-entry .meta { font-size: 11px; color: var(--text2); display: flex; gap: 6px; align-items: center; }
.brand-entry .count { font-size: 11px; color: var(--text2); flex-shrink: 0; }
.brand-entry .dirty-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--primary); flex-shrink: 0; display: none; }
.brand-entry.dirty .dirty-dot { display: block; }

/* Right Panel */
#right { display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }
#right-empty { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--text2); font-size: 14px; }
#right-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#brand-header { background: var(--card); padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
#brand-header .brand-name { font-size: 18px; font-weight: 600; }
#brand-header .nav-btn { padding: 4px 10px; border: 1px solid var(--border); border-radius: 4px; background: #fff; cursor: pointer; font-size: 13px; }
#brand-header .nav-btn:hover { background: var(--brand-hover); }
#brand-header .nav-btn:disabled { opacity: 0.3; cursor: default; }

#brand-fields { background: var(--card); padding: 10px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; flex-wrap: wrap; flex-shrink: 0; }
#brand-fields label { font-size: 12px; color: var(--text2); white-space: nowrap; }
#brand-fields select { padding: 4px 8px; border: 1px solid var(--border); border-radius: 4px; font-size: 13px; }
#brand-fields .btn-sm { font-size: 11px; padding: 3px 8px; }

#brand-search-btns { background: var(--card); padding: 6px 16px; border-bottom: 1px solid var(--border); display: flex; gap: 6px; flex-shrink: 0; }
#brand-search-btns .search-btn { font-size: 11px; padding: 3px 10px; border: 1px solid var(--border); border-radius: 999px; background: #fff; cursor: pointer; color: var(--primary); }
#brand-search-btns .search-btn:hover { background: var(--brand-active); }

#suggestion-bar { background: #fffbeb; padding: 8px 16px; border-bottom: 1px solid #fde68a; font-size: 12px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
#suggestion-bar.hidden { display: none; }

/* 供应商审计 */
#audit-summary { background: #fff; padding: 8px 16px; border-bottom: 1px solid var(--border); display: none; align-items: center; gap: 8px; font-size: 12px; flex-shrink: 0; }
#audit-summary .as-badge { display: inline-flex; align-items: center; gap: 3px; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 500; }
#audit-summary .as-badge.warn { background: #fef3c7; color: #92400e; }
#audit-summary .as-badge.err { background: #fee2e2; color: #991b1b; }
#audit-summary .as-badge.ok { background: #dcfce7; color: #166534; }
#supplier-audit { display: none; flex-shrink: 0; border-bottom: 1px solid var(--border); max-height: 45vh; overflow-y: auto; }
#supplier-audit .sa-section { padding: 10px 16px; border-bottom: 1px solid #f3f4f6; }
#supplier-audit .sa-section:last-child { border-bottom: none; }
#supplier-audit .sa-title { font-size: 12px; font-weight: 600; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
#supplier-audit .sa-title .count { font-size: 11px; color: var(--text2); font-weight: 400; }
#supplier-audit .sa-row { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 12px; flex-wrap: wrap; }
#supplier-audit .sa-row .sa-label { color: var(--text2); min-width: 70px; white-space: nowrap; }
#supplier-audit .sa-row .sa-detail { font-size: 11px; color: var(--text2); }
#supplier-audit .sa-row select { padding: 2px 6px; border: 1px solid var(--border); border-radius: 4px; font-size: 12px; }
#supplier-audit .sa-row .btn-sm { font-size: 11px; padding: 2px 8px; }
.sa-compact-bar { display: flex; align-items: center; gap: 8px; font-size: 12px; }
.sa-compact-bar .bar-wrap { flex: 1; max-width: 180px; height: 7px; background: #e5e7eb; border-radius: 3px; overflow: hidden; }
.sa-compact-bar .bar-wrap .fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
.sa-compact-bar .bar-wrap .fill.high { background: #22c55e; }
.sa-compact-bar .bar-wrap .fill.mid { background: #f59e0b; }
.sa-compact-bar .bar-wrap .fill.low { background: #ef4444; }

#product-area { flex: 1; overflow: auto; padding: 8px 16px; }
#product-table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 13px; background: var(--card); }
#product-table th { background: #f9fafb; padding: 8px 10px; text-align: left; font-weight: 600; font-size: 12px; border-bottom: 2px solid var(--border); position: sticky; top: 0; z-index: 1; }
#product-table td { padding: 6px 10px; border-bottom: 1px solid #f3f4f6; }
#product-table tr:hover td { background: #fafbff; }
#product-table .editable { cursor: pointer; border-radius: 3px; min-width: 60px; }
#product-table .editable:hover { background: #eef2ff; }
#product-table .editable.editing { padding: 0; }
#product-table .editable select, #product-table .editable input { width: 100%; padding: 4px 6px; border: 2px solid var(--primary); border-radius: 3px; font-size: 13px; outline: none; }
#product-table .col-name { max-width: 260px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
#product-table .cell-issue { color: var(--danger); font-weight: 500; }
#product-table .col-cb { width: 30px; text-align: center; }
#product-table .col-del { width: 30px; text-align: center; }
#product-table .col-filter { padding: 2px 4px; }
#product-table .col-filter input, #product-table .col-filter select { width: 100%; padding: 3px 5px; border: 1px solid var(--border); border-radius: 3px; font-size: 11px; background: #f9fafb; }
#product-table .col-filter input:focus, #product-table .col-filter select:focus { border-color: var(--primary); outline: none; background: #fff; }
.del-btn { background: none; border: none; cursor: pointer; font-size: 14px; padding: 2px 4px; border-radius: 4px; opacity: 0.4; transition: all 0.15s; }
.del-btn:hover { opacity: 1; background: #fee2e2; color: var(--danger); }
#btn-delete-sel { color: var(--danger); border-color: var(--danger); }
#btn-delete-sel:hover { background: #fee2e2; }

#brand-footer { background: var(--card); padding: 10px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; flex-shrink: 0; }

/* Buttons */
.btn { display: inline-flex; align-items: center; gap: 4px; padding: 6px 14px; border: none; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover:not(:disabled) { background: var(--primary-h); }
.btn-outline { background: #fff; color: var(--text); border: 1px solid var(--border); }
.btn-outline:hover:not(:disabled) { background: #f9fafb; }
.btn-danger { background: #fff; color: var(--danger); border: 1px solid var(--danger); }
.btn-danger:hover:not(:disabled) { background: #fef2f2; }

/* Modal */
#modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 1000; display: flex; align-items: center; justify-content: center; }
#modal-overlay.hidden { display: none; }
#modal-box { background: var(--card); border-radius: 10px; max-width: 700px; width: 90%; max-height: 80vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
#modal-box h3 { padding: 16px 20px; border-bottom: 1px solid var(--border); font-size: 16px; margin:0; }
#modal-box table { width: 100%; border-collapse: collapse; font-size: 13px; }
#modal-box td { padding: 6px 16px; border-bottom: 1px solid #f3f4f6; vertical-align: top; }
#modal-box td:first-child { width: 120px; color: var(--text2); font-weight: 500; white-space: nowrap; }
#modal-box td:last-child { word-break: break-all; }
#modal-close { position: absolute; top: 12px; right: 16px; background: none; border: none; font-size: 22px; cursor: pointer; color: var(--text2); }
.col-name { cursor: pointer; }
.col-name:hover { color: var(--primary); text-decoration: underline; }
.btn-sm { font-size: 11px; padding: 3px 8px; }
.toast { position: fixed; bottom: 20px; right: 20px; background: #1f2937; color: #fff; padding: 10px 16px; border-radius: 6px; font-size: 13px; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
.toast.show { opacity: 1; }

/* Column Config Panel */
#brand-header { position: relative; }
#col-config-btn { padding: 4px 10px; border: 1px solid var(--border); border-radius: 4px; background: #fff; cursor: pointer; font-size: 14px; line-height: 1; margin-left: auto; }
#col-config-btn:hover { background: var(--brand-hover); }
#col-config-panel { position: absolute; top: calc(100% + 2px); right: 8px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.12); z-index: 500; width: 280px; max-height: 420px; display: flex; flex-direction: column; }
#col-config-panel.hidden { display: none; }
#col-config-panel .cc-header { padding: 8px 12px; border-bottom: 1px solid var(--border); font-size: 12px; font-weight: 600; display: flex; justify-content: space-between; align-items: center; }
#col-config-panel .cc-list { flex: 1; overflow-y: auto; padding: 4px 0; }
#col-config-panel .cc-item { display: flex; align-items: center; gap: 8px; padding: 5px 12px; font-size: 13px; cursor: default; border-bottom: 1px solid #f9fafb; user-select: none; }
#col-config-panel .cc-item:hover { background: var(--brand-hover); }
#col-config-panel .cc-item.drag-over { border-top: 2px solid var(--primary); }
#col-config-panel .cc-item.core .cc-label { color: var(--text2); }
#col-config-panel .cc-item input[type=checkbox] { margin: 0; flex-shrink: 0; }
#col-config-panel .cc-label { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
#col-config-panel .cc-drag { color: #d1d5db; font-size: 12px; cursor: grab; flex-shrink: 0; padding: 0 2px; }
#col-config-panel .cc-drag:hover { color: var(--text2); }

/* Field CRUD */
.field-crud-form { display: flex; flex-direction: column; gap: 12px; }
.field-crud-form label { font-size: 13px; font-weight: 500; }
.field-crud-form input { padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; }
.field-crud-form input:focus { border-color: var(--primary); outline: none; }
#delete-field-list { max-height: 200px; overflow-y: auto; border: 1px solid var(--border); border-radius: 6px; }
#delete-field-list .df-item { padding: 8px 12px; cursor: pointer; border-bottom: 1px solid #f3f4f6; font-size: 13px; }
#delete-field-list .df-item:hover { background: #fee2e2; }
</style>
</head>
<body>
<div id="app">
<div id="topbar">
    <h1>商品库数据修复工具</h1>
    <div id="mode-tabs">
        <button id="tab-brand" class="mode-tab active" onclick="switchTab('brand')">品牌修改</button>
        <button id="tab-supplier" class="mode-tab" onclick="switchTab('supplier')">供应商修改</button>
    </div>
    <span class="spacer"></span>
    <span class="status" style="cursor:pointer;" onclick="connectDB()" title="点击重新连接"><span class="dot" id="db-dot"></span><span id="db-label">正在连接...</span></span>
    <button class="btn btn-outline btn-sm" id="btn-backup" onclick="downloadBackup()" disabled>下载备份</button>
    <button class="btn btn-outline btn-sm" id="btn-save-all" onclick="(async()=>await saveAllToDB())()" disabled>保存全部</button>
    <button class="btn btn-outline btn-sm" id="btn-undo-all" onclick="undoAll()" disabled>撤销全部</button>
    <span style="color:var(--border);margin:0 2px;">|</span>
<button class="btn btn-outline btn-sm" id="btn-category-mgmt" onclick="showCategoryManageModal()" title="管理大类与子品类">📦 品类</button>
    <button class="btn btn-outline btn-sm" id="btn-product-attr" onclick="showProductAttrModal()" title="编辑产品价格定位、场景、克价">📝 产品属性</button>
</div>
<div id="main">
    <div id="left">
        <div id="left-header"><input type="text" id="brand-search" placeholder="搜索品牌..." oninput="renderBrandList()"></div>
        <div id="left-filters" id="filter-chips"></div>
        <div id="left-stats"></div>
        <div id="brand-list"></div>
    </div>
    <div id="right">
        <div id="right-empty">选择左侧品牌开始编辑</div>
        <div id="right-content" style="display:none;">
            <div id="brand-header">
                <button class="nav-btn" id="btn-prev" onclick="navigateBrand(-1)">◀</button>
                <span class="brand-name" id="detail-brand-name"></span>
                <span style="font-size:13px;color:var(--text2);" id="detail-product-count"></span>
                <select id="supplier-brand-filter" style="display:none;margin-left:8px;padding:4px 8px;border:1px solid var(--border);border-radius:4px;font-size:13px;max-width:160px;" onchange="onSupplierBrandFilter()"><option value="">全部品牌</option></select>
                <span class="spacer"></span>
                <span id="detail-issues" style="font-size:12px;"></span>
                <button class="nav-btn" id="btn-next" onclick="navigateBrand(1)">▶</button>
                <button id="col-config-btn" onclick="toggleColumnConfig()" title="列配置">⚙</button>
                <div id="col-config-panel" class="hidden">
                    <div class="cc-header"><span>表格列配置</span><button class="btn-sm btn-outline" onclick="resetColumnConfig()">恢复默认</button></div>
                    <div class="cc-list" id="col-config-list"></div>
                </div>
            </div>
            <div id="brand-fields">
                <label>品牌级别:</label>
                <select id="field-brandLevel"><option value="">—</option></select>
                <button class="btn-sm btn-outline" onclick="applyBrandField('brandLevel','all')">全部</button>
                <button class="btn-sm btn-outline" onclick="applyBrandField('brandLevel','sel')">选中</button>
                <label style="margin-left:8px;">品牌调性:</label>
                <select id="field-brandStyle"><option value="">—</option></select>
                <button class="btn-sm btn-outline" onclick="applyBrandField('brandStyle','all')">全部</button>
                <button class="btn-sm btn-outline" onclick="applyBrandField('brandStyle','sel')">选中</button>
                <label style="margin-left:8px;">价格定位:</label>
                <select id="field-priceRange"><option value="">—</option></select>
                <button class="btn-sm btn-outline" onclick="applyBrandField('priceRange','all')">全部</button>
                <button class="btn-sm btn-outline" onclick="applyBrandField('priceRange','sel')">选中</button> <label style="margin-left:8px;">区域:</label> <select id="field-region"><option value="">—</option></select> <button class="btn-sm btn-outline" onclick="applyBrandField('region','all')">全部</button> <button class="btn-sm btn-outline" onclick="applyBrandField('region','sel')">选中</button>
            </div>
            <div id="brand-search-btns">
                <span style="font-size:11px;color:var(--text2);">AI查询品牌:</span>
                <button class="search-btn" onclick="aiBrandQuery()">了解品牌背景</button>
                <button class="search-btn" id="btn-ai-detect-cat" onclick="aiDetectCategory()">AI检测品类</button>
                <button class="btn-sm btn-outline" onclick="reidentifyBrand()" style="margin-left:auto;">重新识别品牌名</button>
            </div>
            <div id="suggestion-bar" class="hidden">
                <span style="font-size:12px;white-space:nowrap;font-weight:500;">AI建议:</span>
                <select id="sug-level" style="padding:2px 4px;font-size:12px;border:1px solid var(--border);border-radius:4px;min-width:90px;"><option value="">级别—</option></select>
                <select id="sug-style" style="padding:2px 4px;font-size:12px;border:1px solid var(--border);border-radius:4px;min-width:90px;"><option value="">调性—</option></select>
                <select id="sug-price" style="padding:2px 4px;font-size:12px;border:1px solid var(--border);border-radius:4px;min-width:90px;"><option value="">价格—</option></select>
                <select id="sug-region" style="padding:2px 4px;font-size:12px;border:1px solid var(--border);border-radius:4px;min-width:80px;"><option value="">区域—</option></select>
                <span id="suggestion-reason" style="font-size:11px;color:var(--text2);"></span>
                <a href="javascript:void(0)" id="suggestion-detail-link" onclick="showAIDetail()" style="font-size:11px;color:var(--primary);display:none;">查看详情 →</a>
                <button class="btn-sm btn-primary" id="btn-accept-suggestion" onclick="acceptSuggestions()" disabled>确认修改并保存</button>
            </div>
            <!-- 供应商审计摘要 -->
            <div id="audit-summary" style="display:none;">
                <span style="font-weight:500;">数据质量：</span>
                <span id="as-inconsistent"></span>
                <span id="as-missing"></span>
                <span id="as-healthy" class="as-badge ok" style="display:none;">✓ 数据健康</span>
            </div>
            <!-- 供应商审计面板 -->
            <div id="supplier-audit" style="display:none;">
                <div class="sa-section" id="sa-inconsistent-section">
                    <div class="sa-title">不一致字段 <span class="count" id="sa-inconsistent-count"></span></div>
                    <div id="sa-inconsistent-rows"></div>
                </div>
                <div class="sa-section" id="sa-missing-section">
                    <div class="sa-title">字段缺失率</div>
                    <div id="sa-missing-rows"></div>
                </div>
            </div>
            <div id="batch-bar" style="background:#fef3c7;padding:6px 16px;border-bottom:1px solid #fcd34d;display:none;align-items:center;gap:8px;flex-wrap:wrap;flex-shrink:0;">
                <span style="font-size:12px;font-weight:500;">批量修改选中:</span>
                <input id="batch-brand" placeholder="品牌名" style="padding:3px 6px;font-size:12px;border:1px solid var(--border);border-radius:4px;width:100px;">
                <select id="batch-major" style="padding:3px 6px;font-size:12px;border:1px solid var(--border);border-radius:4px;"><option value="">大类—</option></select>
                <select id="batch-cat" style="padding:3px 6px;font-size:12px;border:1px solid var(--border);border-radius:4px;"><option value="">品类—</option></select>
                <select id="batch-scene" style="padding:3px 6px;font-size:12px;border:1px solid var(--border);border-radius:4px;"><option value="">场景—</option></select>
                <select id="batch-level" style="padding:3px 6px;font-size:12px;border:1px solid var(--border);border-radius:4px;"><option value="">级别—</option></select>
                <select id="batch-style" style="padding:3px 6px;font-size:12px;border:1px solid var(--border);border-radius:4px;"><option value="">调性—</option></select>
                <select id="batch-price" style="padding:3px 6px;font-size:12px;border:1px solid var(--border);border-radius:4px;"><option value="">价格—</option></select> <select id="batch-region" style="padding:3px 6px;font-size:12px;border:1px solid var(--border);border-radius:4px;"><option value="">区域—</option></select>

// 运行时变量（从 IndexedDB 加载 categoryConfig 后更新）
let STANDARD_MAJORS = [...DEFAULT_MAJORS];
let SUBCATEGORY_TO_MAJOR = { ...DEFAULT_SUBCATEGORY_MAP };
let OBSOLETE_MAJORS = { '日化个护': true, '企业定制': true };
let _renamedMajors = {};
let _renamedSubcategories = {};

function applyCategoryConfigDT(config) {
    const cfg = config || {};
    let majors = [...DEFAULT_MAJORS];
    let subMap = { ...DEFAULT_SUBCATEGORY_MAP };
    // 1. 重命名
    if (cfg.renamedMajors) {
        majors = majors.map(m => cfg.renamedMajors[m] || m);
        const newMap = {};
        for (const [cat, major] of Object.entries(subMap)) {
            newMap[cfg.renamedSubcategories && cfg.renamedSubcategories[cat] || cat] = cfg.renamedMajors[major] || major;
        }
        subMap = newMap;
    }
    // 2. 删除
    if (cfg.deletedMajors) {
        majors = majors.filter(m => !cfg.deletedMajors.includes(m));
        const newMap = {};
        for (const [cat, major] of Object.entries(subMap)) {
            if (!cfg.deletedMajors.includes(major) && !(cfg.deletedSubcategories || []).includes(cat)) newMap[cat] = major;
        }
        subMap = newMap;
    }
    // 3. 新增
    if (cfg.customMajors) { for (const m of cfg.customMajors) { if (!majors.includes(m)) majors.push(m); } }
    if (cfg.customSubcategories) {
        for (const [cat, major] of Object.entries(cfg.customSubcategories)) {
            subMap[cat] = cfg.renamedMajors && cfg.renamedMajors[major] || major;
        }
    }
    STANDARD_MAJORS = majors;
    SUBCATEGORY_TO_MAJOR = subMap;
    _renamedMajors = cfg.renamedMajors || {};
    _renamedSubcategories = cfg.renamedSubcategories || {};
    // 更新 OBSOLETE_MAJORS：系统默认有但当前配置中没有的大类标记为废弃
    OBSOLETE_MAJORS = {};
    for (const dm of DEFAULT_MAJORS) {
        if (!majors.includes(dm)) OBSOLETE_MAJORS[dm] = true;
    }
}

async function loadCategoryConfigDT() {
    try {
        const db = await new Promise((res, rej) => {
            const req = indexedDB.open('ProductLibraryDB', 10);
            req.onsuccess = () => res(req.result);
            req.onerror = () => rej(req.error);
        });
        const cfg = await new Promise((res, rej) => {
            const tx = db.transaction(['settings'], 'readonly');
            const store = tx.objectStore('settings');
            const req = store.get('categoryConfig');
            req.onsuccess = () => res(req.result ? req.result.value : null);
            req.onerror = () => rej(req.error);
        });
        db.close();
        applyCategoryConfigDT(cfg);
    } catch (e) { console.warn('加载品类配置失败:', e); }
}
// 页面加载时立即加载品类配置
loadCategoryConfigDT();

// ===== 品类管理 Modal =====
let _repairSelectedMajor = null;

function getRepairCategoryConfig() {
    // 从运行时变量重建完整配置（包含重命名信息）
    return {
        renamedMajors: { ..._renamedMajors },
        renamedSubcategories: { ..._renamedSubcategories },
        customMajors: STANDARD_MAJORS.filter(m => !DEFAULT_MAJORS.includes(m) && !_renamedMajors[m]),
        deletedMajors: DEFAULT_MAJORS.filter(m => !STANDARD_MAJORS.includes(m)),
        customSubcategories: Object.entries(SUBCATEGORY_TO_MAJOR).filter(([cat, maj]) => !DEFAULT_SUBCATEGORY_MAP[cat] && !_renamedSubcategories[cat]).reduce((acc, [cat, maj]) => { acc[cat] = maj; return acc; }, {}),
        deletedSubcategories: Object.keys(DEFAULT_SUBCATEGORY_MAP).filter(cat => !SUBCATEGORY_TO_MAJOR[cat])
    };
}

async function saveRepairCategoryConfig(cfg) {
    try {
        const db = await new Promise((res, rej) => {
            const req = indexedDB.open('ProductLibraryDB', 10);
            req.onsuccess = () => res(req.result);
            req.onerror = () => rej(req.error);
        });
        await new Promise((res, rej) => {
            const tx = db.transaction(['settings'], 'readwrite');
            const store = tx.objectStore('settings');
            const req = store.put({ key: 'categoryConfig', value: cfg });
            req.onsuccess = () => res();
            req.onerror = () => rej(req.error);
        });
        db.close();
        applyCategoryConfigDT(cfg);
    } catch (e) { alert('保存失败：' + e.message); }
}

        '<div class="field-crud-form" style="display:flex;gap:12px;min-height:300px;">' +
        '<div style="width:35%;border:1px solid var(--border);border-radius:6px;padding:8px;background:#f9fafb;">' +

        '</div>';
    document.getElementById('modal-overlay').classList.remove('hidden');
    renderRepairMajorList();
}

function saveCategoryManageAndClose() {
    const cfg = getRepairCategoryConfig();
    saveRepairCategoryConfig(cfg).then(() => {
        renderBrandList();
        if (ACTIVE_BRAND && BRAND_GROUPS[ACTIVE_BRAND]) {
            renderProductTable(ACTIVE_BRAND, BRAND_GROUPS[ACTIVE_BRAND]);
        }
        closeModal();
    });
}

function renderRepairMajorList() {
    const el = document.getElementById('repair-major-list');
    if (!el) return;
    let html = '';
    for (const major of STANDARD_MAJORS) {
        const isDefault = DEFAULT_MAJORS.includes(major);
        const subs = Object.entries(SUBCATEGORY_TO_MAJOR).filter(([c, m]) => m === major);
        html += '<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 6px;margin:2px 0;border-radius:4px;cursor:pointer;' + (_repairSelectedMajor === major ? 'background:#dbeafe;font-weight:600;' : '') + '" onclick="selectRepairMajor(\'' + major.replace(/'/g, "\\'") + '\')">' +
            '<span>' + major + ' <span style="color:#999;font-size:11px;">(' + subs.length + ')</span></span>' +
            '<span>' +
            '<button class="btn btn-outline btn-sm" style="padding:0 4px;font-size:11px;" onclick="event.stopPropagation();editRepairMajor(\'' + major.replace(/'/g, "\\'") + '\')" title="编辑">✎</button>' +
            '<button class="btn btn-outline btn-sm" style="padding:0 4px;font-size:11px;color:' + (isDefault ? '#999' : '#e53e3e') + ';" onclick="event.stopPropagation();deleteRepairMajor(\'' + major.replace(/'/g, "\\'") + '\')" title="' + (isDefault ? '隐藏' : '删除') + '">✕</button>' +
            '</span></div>';
    }
    el.innerHTML = html || '<p style="color:#999;text-align:center;padding:20px 0;">暂无大类</p>';
    if (_repairSelectedMajor && !STANDARD_MAJORS.includes(_repairSelectedMajor)) _repairSelectedMajor = null;
    renderRepairSubList();
}

function renderRepairSubList() {
    const el = document.getElementById('repair-sub-list');
    const titleEl = document.getElementById('repair-sub-title');
    const btnEl = document.getElementById('repair-btn-add-sub');
    if (!el) return;
    if (!_repairSelectedMajor || !STANDARD_MAJORS.includes(_repairSelectedMajor)) {
        el.innerHTML = '<p style="color:#999;text-align:center;padding:40px 0;">← 点击左侧大类查看子品类</p>';
        titleEl.textContent = '子品类（请选择大类）';
        if (btnEl) btnEl.style.display = 'none';
        return;
    }
    const major = _repairSelectedMajor;
    const subs = Object.entries(SUBCATEGORY_TO_MAJOR).filter(([c, m]) => m === major).map(([c]) => c).sort((a, b) => a.localeCompare(b, 'zh-CN'));
    titleEl.textContent = '子品类: ' + major + ' (' + subs.length + ')';
    if (btnEl) btnEl.style.display = '';
    let html = '';
    for (const sub of subs) {
        const isDefault = DEFAULT_SUBCATEGORY_MAP[sub] !== undefined;
        html += '<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 6px;margin:2px 0;border-radius:4px;">' +
            '<span>' + sub + '</span>' +
            '<span>' +
            '<button class="btn btn-outline btn-sm" style="padding:0 4px;font-size:11px;" onclick="editRepairSubcategory(\'' + sub.replace(/'/g, "\\'") + '\')" title="编辑">✎</button>' +
            '<button class="btn btn-outline btn-sm" style="padding:0 4px;font-size:11px;color:' + (isDefault ? '#999' : '#e53e3e') + ';" onclick="deleteRepairSubcategory(\'' + sub.replace(/'/g, "\\'") + '\')" title="' + (isDefault ? '隐藏' : '删除') + '">✕</button>' +
            '</span></div>';
    }
    el.innerHTML = html || '<p style="color:#999;text-align:center;padding:20px 0;">暂无子品类</p>';
}

function selectRepairMajor(major) {
    _repairSelectedMajor = major;
    renderRepairMajorList();
}

function addRepairMajor() {
    const name = prompt('请输入大类名称：');
    if (!name || !name.trim()) return;
    const trimmed = name.trim();
    if (STANDARD_MAJORS.includes(trimmed)) { alert('该大类已存在'); return; }
    const cfg = getRepairCategoryConfig();
    cfg.customMajors.push(trimmed);
    cfg.deletedMajors = cfg.deletedMajors.filter(m => m !== trimmed);
    saveRepairCategoryConfig(cfg).then(() => { _repairSelectedMajor = trimmed; renderRepairMajorList(); });
}

function editRepairMajor(name) {
    const newName = prompt('请输入新名称：', name);
    if (!newName || !newName.trim() || newName.trim() === name) return;
    const trimmed = newName.trim();
    if (STANDARD_MAJORS.includes(trimmed)) { alert('该名称已存在'); return; }
    const cfg = getRepairCategoryConfig();
    if (DEFAULT_MAJORS.includes(name)) {
        if (!cfg.renamedMajors) cfg.renamedMajors = {};
        cfg.renamedMajors[name] = trimmed;
    } else {
        const idx = cfg.customMajors.indexOf(name);
        if (idx >= 0) cfg.customMajors[idx] = trimmed;
    }
    // 更新子品类映射中的大类名
    if (cfg.customSubcategories) {
        for (const [cat, major] of Object.entries(cfg.customSubcategories)) {
            if (major === name) cfg.customSubcategories[cat] = trimmed;
        }
    }
    saveRepairCategoryConfig(cfg).then(() => { if (_repairSelectedMajor === name) _repairSelectedMajor = trimmed; renderRepairMajorList(); });
}

function deleteRepairMajor(name) {
    const subs = Object.entries(SUBCATEGORY_TO_MAJOR).filter(([c, m]) => m === name).map(([c]) => c);
    const isDefault = DEFAULT_MAJORS.includes(name);
    const msg = isDefault
        ? '确定隐藏系统大类"' + name + '"？\n其下子品类也将不再显示：' + (subs.join('、') || '无') + '\n（已有数据不会丢失）'
        : '确定删除自定义大类"' + name + '"？\n其下子品类也将移除：' + (subs.join('、') || '无');
    if (!confirm(msg)) return;
    const cfg = getRepairCategoryConfig();
    if (isDefault) {
        if (!cfg.deletedMajors) cfg.deletedMajors = [];
        cfg.deletedMajors.push(name);
    } else {
        cfg.customMajors = cfg.customMajors.filter(m => m !== name);
    }
    for (const sub of subs) {
        if (cfg.customSubcategories && cfg.customSubcategories[sub]) delete cfg.customSubcategories[sub];
        if (!cfg.deletedSubcategories) cfg.deletedSubcategories = [];
        if (!cfg.deletedSubcategories.includes(sub)) cfg.deletedSubcategories.push(sub);
    }
    saveRepairCategoryConfig(cfg).then(() => { if (_repairSelectedMajor === name) _repairSelectedMajor = null; renderRepairMajorList(); });
}

function addRepairSubcategory() {
    if (!_repairSelectedMajor) return;
    const name = prompt('请输入子品类名称（所属大类：' + _repairSelectedMajor + '）：');
    if (!name || !name.trim()) return;
    const trimmed = name.trim();
    if (SUBCATEGORY_TO_MAJOR[trimmed]) { alert('该子品类已存在'); return; }
    const cfg = getRepairCategoryConfig();
    if (!cfg.customSubcategories) cfg.customSubcategories = {};
    cfg.customSubcategories[trimmed] = _repairSelectedMajor;
    cfg.deletedSubcategories = (cfg.deletedSubcategories || []).filter(s => s !== trimmed);
    saveRepairCategoryConfig(cfg).then(() => renderRepairMajorList());
}

function editRepairSubcategory(name) {
    const curMajor = SUBCATEGORY_TO_MAJOR[name];
    const newName = prompt('请输入新名称：', name);
    if (!newName || !newName.trim() || newName.trim() === name) return;
    const trimmed = newName.trim();
    const cfg = getRepairCategoryConfig();
    const isDefault = DEFAULT_SUBCATEGORY_MAP[name] !== undefined;
    if (isDefault) {
        if (!cfg.renamedSubcategories) cfg.renamedSubcategories = {};
        cfg.renamedSubcategories[name] = trimmed;
    } else {
        if (cfg.customSubcategories && cfg.customSubcategories[name]) {
            delete cfg.customSubcategories[name];
        }
        if (!cfg.customSubcategories) cfg.customSubcategories = {};
        cfg.customSubcategories[trimmed] = curMajor;
    }
    saveRepairCategoryConfig(cfg).then(() => renderRepairMajorList());
}

function deleteRepairSubcategory(name) {
    const isDefault = DEFAULT_SUBCATEGORY_MAP[name] !== undefined;
    const msg = isDefault
        ? '确定隐藏系统子品类"' + name + '"？\n（已有数据不会丢失）'
        : '确定删除自定义子品类"' + name + '"？';
    if (!confirm(msg)) return;
    const cfg = getRepairCategoryConfig();
    if (isDefault) {
        if (!cfg.deletedSubcategories) cfg.deletedSubcategories = [];
        cfg.deletedSubcategories.push(name);
    } else {
        if (cfg.customSubcategories && cfg.customSubcategories[name]) delete cfg.customSubcategories[name];
    }

let _attrSelectedId = null;
let _attrSearch = '';

function showProductAttrModal() {
    document.getElementById('modal-title').textContent = '📝 产品属性编辑';
    document.getElementById('modal-body').innerHTML =
        '<div style="display:flex;gap:12px;min-height:400px;">' +
        '<div style="width:45%;border:1px solid var(--border);border-radius:6px;padding:8px;display:flex;flex-direction:column;">' +
        '<input id="attr-search" placeholder="搜索产品名/品牌..." style="margin-bottom:6px;padding:6px 8px;border:1px solid var(--border);border-radius:4px;font-size:13px;" oninput="_attrSearch=this.value;renderProductAttrList()">' +
        '<div id="attr-product-list" style="flex:1;overflow-y:auto;max-height:380px;"></div></div>' +
        '<div style="width:55%;border:1px solid var(--border);border-radius:6px;padding:8px;" id="attr-edit-panel">' +
        '<p style="color:#999;text-align:center;padding:80px 0;">← 点击左侧产品编辑属性</p></div></div>';
    document.getElementById('modal-overlay').classList.remove('hidden');
    renderProductAttrList();
}

function renderProductAttrList() {
    const el = document.getElementById('attr-product-list');
    if (!el) return;
    const s = _attrSearch.toLowerCase();
    let html = '';
    const brands = Object.keys(BRAND_GROUPS).sort((a, b) => a.localeCompare(b, 'zh-CN'));
    for (const brand of brands) {
        const prods = BRAND_GROUPS[brand].filter(p => {
            if (!s) return true;
            return (p.name || '').toLowerCase().includes(s) || brand.toLowerCase().includes(s) ||
                   (p.spec || '').toLowerCase().includes(s) || (p.category || '').toLowerCase().includes(s);
        });
        if (!prods.length) continue;
        html += '<div style="font-weight:600;font-size:12px;color:var(--primary);padding:4px 0;margin-top:4px;">' + escHtml(brand) + ' (' + prods.length + ')</div>';
        for (const p of prods) {
            const sel = _attrSelectedId === p.id ? 'background:#dbeafe;font-weight:600;' : '';
            const prLabel = p.priceRange || '-';
            const upStr = p.unitPrice != null ? p.unitPrice + '元/100g' : '-';
            html += '<div style="display:flex;justify-content:space-between;align-items:center;padding:3px 6px;margin:1px 0;border-radius:4px;cursor:pointer;font-size:12px;' + sel + '" onclick="selectProductAttr(\'' + escAttr(p.id) + '\')">' +
                '<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + escHtml(p.name || '?') + '</span>' +
                '<span style="color:var(--text2);margin-left:6px;white-space:nowrap;">' + escHtml(p.spec || '') + '</span>' +
                '<span style="margin-left:6px;white-space:nowrap;color:' + (p.unitPrice != null ? 'var(--primary)' : '#999') + ';">' + upStr + '</span>' +
                '<span style="margin-left:6px;white-space:nowrap;font-size:11px;padding:1px 4px;border-radius:3px;background:' + priceRangeColor(prLabel) + ';color:#fff;">' + escHtml(prLabel) + '</span>' +
                '</div>';
        }
    }
    el.innerHTML = html || '<p style="color:#999;text-align:center;padding:20px;">无匹配产品</p>';
}

function priceRangeColor(pr) {
    switch (pr) { case '高端': return '#e53e3e'; case '中高端': return '#ed8936'; case '中端': return '#3182ce'; case '平价': return '#38a169'; default: return '#999'; }
}

function selectProductAttr(id) {
    _attrSelectedId = id;
    renderProductAttrList();
    const p = ALL_PRODUCTS.find(x => x.id === id);
    if (!p) return;
    // 同品类克价统计
    const sameCat = ALL_PRODUCTS.filter(x => x.category === p.category && x.unitPrice != null && x.id !== id);
    const catPrices = sameCat.map(x => x.unitPrice).sort((a, b) => a - b);
    let catStats = '';
    if (catPrices.length >= 3) {
        const p20 = catPrices[Math.floor(catPrices.length * 0.2)];
        const p40 = catPrices[Math.floor(catPrices.length * 0.4)];
        const p80 = catPrices[Math.floor(catPrices.length * 0.8)];
        const median = catPrices[Math.floor(catPrices.length * 0.5)];
        let suggest = '中端';
        if (p.unitPrice != null) {
            if (p.unitPrice >= p20) suggest = '高端';
            else if (p.unitPrice >= p40) suggest = '中高端';
            else if (p.unitPrice >= p80) suggest = '中端';
            else suggest = '平价';
        }
        catStats = '<div style="font-size:11px;color:var(--text2);margin-top:4px;padding:6px;background:#f9fafb;border-radius:4px;">' +
            '品类「' + escHtml(p.category || '?') + '」（' + (catPrices.length + 1) + '个可计价产品）<br>' +
            '克价范围: ' + catPrices[0] + ' ~ ' + catPrices[catPrices.length - 1] + ' 元/100g，中位数: ' + median + ' 元/100g<br>' +
            '当前克价: <b>' + (p.unitPrice != null ? p.unitPrice + ' 元/100g' : '未计算') + '</b> → 建议定位: <b style="color:' + priceRangeColor(suggest) + ';">' + suggest + '</b>' +
            '</div>';
    }
    const panel = document.getElementById('attr-edit-panel');
    panel.innerHTML =
        '<div style="font-weight:600;font-size:14px;margin-bottom:8px;">' + escHtml(p.name || '?') +
        ' <span style="color:var(--text2);font-size:12px;">' + escHtml(p.brand || '') + ' / ' + escHtml(p.category || '') + '</span></div>' +
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">' +
        '<div><label style="font-size:12px;color:var(--text2);">价格定位</label><select id="attr-priceRange" style="width:100%;padding:4px 6px;border:1px solid var(--border);border-radius:4px;">' +
        ['', '高端', '中高端', '中端', '平价'].map(v => '<option value="' + v + '"' + ((p.priceRange || '') === v ? ' selected' : '') + '>' + (v || '未设置') + '</option>').join('') +
        '</select></div>' +
        '<div><label style="font-size:12px;color:var(--text2);">适用场景</label><input id="attr-sceneTag" value="' + escAttr(p.sceneTag || '') + '" placeholder="端午,中秋,春节..." style="width:100%;padding:4px 6px;border:1px solid var(--border);border-radius:4px;"></div>' +
        '<div><label style="font-size:12px;color:var(--text2);">单品规格</label><input id="attr-spec" value="' + escAttr(p.spec || '') + '" style="width:100%;padding:4px 6px;border:1px solid var(--border);border-radius:4px;"></div>' +
        '<div><label style="font-size:12px;color:var(--text2);">零售价(元)</label><input id="attr-retailPrice" type="number" step="0.01" value="' + (p.retailPrice || '') + '" oninput="updateAttrUnitPrice()" style="width:100%;padding:4px 6px;border:1px solid var(--border);border-radius:4px;"></div>' +
        '<div><label style="font-size:12px;color:var(--text2);">单品克重(g)</label><input id="attr-unitWeight" type="number" step="1" value="' + (p.unitWeight || '') + '" style="width:100%;padding:4px 6px;border:1px solid var(--border);border-radius:4px;" oninput="updateAttrUnitPrice()"></div>' +
        '<div><label style="font-size:12px;color:var(--text2);">克价(元/100g)</label><input id="attr-unitPrice" readonly style="width:100%;padding:4px 6px;border:1px solid var(--border);border-radius:4px;background:#f3f4f6;" value="' + (p.unitPrice != null ? p.unitPrice : '') + '"></div>' +
        '</div>' + catStats +
        '<div style="margin-top:10px;display:flex;gap:8px;justify-content:flex-end;">' +
        '<button class="btn btn-outline btn-sm" onclick="closeModal()">关闭</button>' +
        '<button class="btn btn-primary btn-sm" onclick="saveProductAttr()">保存</button></div>';
}

function updateAttrUnitPrice() {
    const uw = parseFloat(document.getElementById('attr-unitWeight')?.value) || 0;
    const rp = parseFloat(document.getElementById('attr-retailPrice')?.value) || 0;
    const upEl = document.getElementById('attr-unitPrice');
    if (upEl && uw > 0 && rp > 0) {
        upEl.value = (Math.round(rp / (uw / 100) * 100) / 100);
    } else if (upEl) {
        upEl.value = '';
    }
}

function saveProductAttr() {
    if (!_attrSelectedId) return;
    const p = ALL_PRODUCTS.find(x => x.id === _attrSelectedId);
    if (!p) return;
    p.priceRange = document.getElementById('attr-priceRange')?.value || '';
    p.sceneTag = document.getElementById('attr-sceneTag')?.value || '';
    p.spec = document.getElementById('attr-spec')?.value || '';
    p.retailPrice = parseFloat(document.getElementById('attr-retailPrice')?.value) || 0;
    const uw = parseFloat(document.getElementById('attr-unitWeight')?.value) || null;
    p.unitWeight = uw;
    if (uw && p.retailPrice > 0) {
        p.unitPrice = Math.round(p.retailPrice / (uw / 100) * 100) / 100;
    } else {
        p.unitPrice = null;
    }
    // 标记品牌数据已变更
    if (p.brand && BRAND_GROUPS[p.brand]) {
        if (VIEW_MODE === 'brand') {
            DIRTY_BRANDS.add(p.brand);
            BRAND_STATS[p.brand] = recomputeStats(p.brand, BRAND_GROUPS[p.brand]);
            if (ACTIVE_BRAND === p.brand) {
                renderProductTable(ACTIVE_BRAND, BRAND_GROUPS[ACTIVE_BRAND]);
            }
        }
    }
    closeModal();
    renderBrandList();
    renderFilterChips();
    toast('已保存: ' + (p.name || '?'));
}

function cleanBrandName(raw) {
    if (!raw) return raw;
    let b = raw.replace(/[\n\r]+/g, '').replace(/\s+/g, ' ').trim();
    if (COMBINED_BRAND_SPLIT[b]) b = COMBINED_BRAND_SPLIT[b];
    for (let i = 0; i < 5; i++) { if (BRAND_NORMALIZE[b]) b = BRAND_NORMALIZE[b]; else break; }
    b = b.replace(/^【(.+?)】$/s, '$1').replace(/^【(.+?)】(.+)/s, '$1$2');
    b = b.replace(/^【(.+)$/s, '$1').trim();
    for (let i = 0; i < 5; i++) { if (BRAND_NORMALIZE[b]) b = BRAND_NORMALIZE[b]; else break; }
    if (NON_BRANDS.has(b)) return null;
    return b;
}

// ========== 克价计算 ==========
function parseWeightToGrams(str) {
    if (!str) return null;
    const s = String(str).replace(/\s+/g, '').toLowerCase();
    // 匹配含数字+单位的规格，取第一个匹配（即单品规格）
    // 支持: 1.2kg, 500g, 1斤, 2两, 200g×12盒 → 取单品

    // 先尝试 "数字×数字" 模式：如 200g×12盒 → 取单品200g
    const productMatch = s.match(/([\d.]+)\s*(kg|g|斤|两|公斤|千克|克)\s*×/);
    if (productMatch) {
        return convertToGrams(parseFloat(productMatch[1]), productMatch[2]);
    }
    // 再尝试普通模式：数字+单位
    const m = s.match(/([\d.]+)\s*(kg|g|斤|两|公斤|千克|克)/);
    if (m) {
        return convertToGrams(parseFloat(m[1]), m[2]);
    }
    // 纯数字（默认视为g），但需要有些上下文：如果是 500 可能是500g
    const pureNum = s.match(/^([\d.]+)$/);
    if (pureNum) {
        const v = parseFloat(pureNum[1]);
        if (v > 0 && v <= 50000) return v; // 合理范围，默认克
    }
    return null; // 无法解析（ml, 枚, 盒等无重量单位）
}
function convertToGrams(val, unit) {
    switch (unit) {
        case 'kg': case '公斤': case '千克': return Math.round(val * 1000);
        case '斤': return Math.round(val * 500);
        case '两': return Math.round(val * 50);
        default: return Math.round(val); // g, 克
    }
}
function computeUnitPrices() {
    let parsed = 0, skipped = 0;
    for (const p of ALL_PRODUCTS) {
        if (p.unitWeight === undefined || p.unitWeight === null) {
            const grams = parseWeightToGrams(p.spec);
            if (grams !== null) {
                p.unitWeight = grams;
                parsed++;
            } else {
                p.unitWeight = null;
                skipped++;
            }
        }
        if (p.unitWeight && p.retailPrice && p.retailPrice > 0) {
            p.unitPrice = Math.round(p.retailPrice / (p.unitWeight / 100) * 100) / 100;
        } else {
            p.unitPrice = null;
        }
    }
    return { parsed, skipped };
}

function getAllFieldKeys() {

function buildColConfigPanel() {

	for (const k of allKeys) {
		if (!COLUMN_CONFIG.order.includes(k)) COLUMN_CONFIG.order.push(k);

	const ordered = COLUMN_CONFIG.order.filter(k => allKeys.includes(k));
	for (const k of allKeys) {

	let html = '';
	for (const k of ordered) {

function colDragStart(e) {
	_colDragField = e.target.closest('.cc-item')?.dataset.field;
	e.dataTransfer.effectAllowed = 'move';
	e.dataTransfer.setData('text/plain', _colDragField);

}
function colDragOver(e) {
	e.preventDefault();
	e.dataTransfer.dropEffect = 'move';
	e.target.closest('.cc-item')?.classList.add('drag-over');
}
function colDragLeave(e) {
	e.target.closest('.cc-item')?.classList.remove('drag-over');

function colDrop(e) {
	e.preventDefault();
	e.target.closest('.cc-item')?.classList.remove('drag-over');
	const srcField = e.dataTransfer.getData('text/plain');
	const dstItem = e.target.closest('.cc-item');
	if (!dstItem || !srcField) return;
	const dstField = dstItem.dataset.field;
	if (srcField === dstField) return;
	if (CORE_COLS.includes(srcField)) return;
	const srcIdx = COLUMN_CONFIG.order.indexOf(srcField);
	const dstIdx = COLUMN_CONFIG.order.indexOf(dstField);
	if (srcIdx < 0 || dstIdx < 0) return;
	COLUMN_CONFIG.order.splice(srcIdx, 1);
	COLUMN_CONFIG.order.splice(dstIdx, 0, srcField);
	saveColumnConfig();
	buildColConfigPanel();
	if (ACTIVE_BRAND && BRAND_GROUPS[ACTIVE_BRAND]) renderProductTable(ACTIVE_BRAND, BRAND_GROUPS[ACTIVE_BRAND]);
}

async function connectDB() {
    document.getElementById('db-dot').className = 'dot';
    document.getElementById('db-label').textContent = '正在连接...';
    try {
        DB = await new Promise((resolve, reject) => {
            const req = indexedDB.open('ProductLibraryDB', 10);
            req.onupgradeneeded = (event) => {
                const database = event.target.result;
                const stores = ['products', 'suppliers', 'templates', 'settings', 'projects', 'proposals', 'pptTemplates', 'excelTemplates', 'customers', 'brandTones', 'productImages', 'agentConversations', 'agentMemories', 'agentRules', 'agentSkills'];
                for (const name of stores) {
                    if (!database.objectStoreNames.contains(name)) {
                        if (name === 'settings') database.createObjectStore(name, { keyPath: 'key' });
                        else if (name === 'brandTones') database.createObjectStore(name, { keyPath: 'brand' });
                        else if (name === 'productImages') database.createObjectStore(name, { keyPath: 'productId' });
                        else if (name === 'agentConversations') {
                            const s = database.createObjectStore(name, { keyPath: 'id', autoIncrement: true });
                            s.createIndex('projectId', 'projectId', { unique: false });
                            s.createIndex('createdAt', 'createdAt', { unique: false });
                        } else if (name === 'agentMemories') {
                            const s = database.createObjectStore(name, { keyPath: 'id', autoIncrement: true });
                            s.createIndex('type', 'type', { unique: false });
                            s.createIndex('tags', 'tags', { unique: false, multiEntry: true });
                        } else if (name === 'agentRules') {
                            const s = database.createObjectStore(name, { keyPath: 'id', autoIncrement: true });
                            s.createIndex('active', 'active', { unique: false });
                        } else if (name === 'agentSkills') {
                            database.createObjectStore(name, { keyPath: 'id', autoIncrement: true });
                        } else {
                            database.createObjectStore(name, { keyPath: 'id' });
                        }
                    }
                }
            };
            req.onsuccess = () => resolve(req.result);
            req.onerror = () => reject(req.error);
        });
        const tx = DB.transaction('products', 'readonly');
        const store = tx.objectStore('products');
        const count = store.count();
        const all = store.getAll();
        await new Promise((r, e) => { tx.oncomplete = r; tx.onerror = () => e(tx.error); });
        ALL_PRODUCTS = all.result || [];
        const upResult = computeUnitPrices();
        log('克价计算: ' + upResult.parsed + ' 产品可解析, ' + upResult.skipped + ' 跳过');
        document.getElementById('db-dot').className = 'dot on';
        document.getElementById('db-label').textContent = '已连接: ' + count.result + ' 产品';
        document.getElementById('btn-backup').disabled = false;
        document.getElementById('btn-save-all').disabled = false;
        document.getElementById('btn-undo-all').disabled = false;
        // 初始化 brand 下拉选项
        initFieldSelects();
        initBatchDropdowns();
        // 分组+统计
        groupByBrand();
        loadColumnConfig();
        renderBrandList();
        renderFilterChips();
        loadAISettings();
        log('连接成功: ' + ALL_PRODUCTS.length + ' 产品, ' + Object.keys(BRAND_GROUPS).length + ' 品牌');
    } catch (e) {
        document.getElementById('db-dot').className = 'dot';
        document.getElementById('db-label').textContent = '连接失败 — 点击重试';
        toast('数据库连接失败: ' + e.message);
    }
}

function groupByBrand() {
    BRAND_GROUPS = {};
    for (const p of ALL_PRODUCTS) {
        let brand = (p.brand || '').trim();
        if (!brand) brand = '__无品牌__';
        if (!BRAND_GROUPS[brand]) BRAND_GROUPS[brand] = [];
        BRAND_GROUPS[brand].push(p);
    }
    BRAND_STATS = {};
    for (const [brand, prods] of Object.entries(BRAND_GROUPS)) {
        BRAND_STATS[brand] = computeBrandStats(brand, prods);
    }
}

function computeBrandStats(brand, prods) {
    const count = prods.length;
    const majors = [...new Set(prods.map(p => p.majorCategory).filter(Boolean))];
    const missingBL = prods.filter(p => !p.brandLevel).length;
    const missingBS = prods.filter(p => !p.brandStyle).length;
    const missingPR = prods.filter(p => !p.priceRange).length;
    const missingCat = prods.filter(p => !p.category || STANDARD_MAJORS.includes(p.category)).length;
    const obsoleteMajor = prods.filter(p => OBSOLETE_MAJORS[p.majorCategory]).length;
    const totalIssues = missingBL + missingBS + missingPR + missingCat + obsoleteMajor;
    let severity = 'good';
    if (missingBL === count || missingBS === count) severity = 'critical';
    else if (totalIssues > 0) severity = 'warning';
    return { count, majors, missingBL, missingBS, missingPR, missingCat, obsoleteMajor, totalIssues, severity };
}
function recomputeStats(key, prods) {
    return VIEW_MODE === 'brand' ? computeBrandStats(key, prods) : computeSupplierStats(key, prods);
}

function groupBySupplier() {
    BRAND_GROUPS = {};
    for (const p of ALL_PRODUCTS) {
        let supplier = (p.supplierId || p.supplierName || '').trim();
        if (!supplier) supplier = '__无供应商__';
        if (!BRAND_GROUPS[supplier]) BRAND_GROUPS[supplier] = [];
        BRAND_GROUPS[supplier].push(p);
    }
    BRAND_STATS = {};
    for (const [sup, prods] of Object.entries(BRAND_GROUPS)) {
        BRAND_STATS[sup] = computeSupplierStats(sup, prods);
    }
}
// 应统一字段（同一供应商内值应一致）
const UNIFORM_FIELDS = ['deliveryFrom', 'defaultExpress', 'freightIncluded',
    'supportsDropship', 'stockType', 'stockStatus'];
// 关键缺失字段
const KEY_FIELDS = ['barcode', 'cartonBarcode', 'jdUrl', 'taobaoUrl', 'pddUrl',
    'images', 'dropshipPrice', 'dropshipFreight', 'jdSFPrice', 'jdSFFreight',
    'moq', 'priceExpiry'];

function computeSupplierStats(name, prods) {
    const count = prods.length;
    const majors = [...new Set(prods.map(p => p.majorCategory).filter(Boolean))];
    const missingCat = prods.filter(p => !p.category || STANDARD_MAJORS.includes(p.category)).length;
    const missingBrand = prods.filter(p => !p.brand || (p.brand || '').trim() === '').length;
    const obsoleteMajor = prods.filter(p => OBSOLETE_MAJORS[p.majorCategory]).length;
    const totalIssues = missingCat + missingBrand + obsoleteMajor;
    let severity = 'good';
    if (missingBrand === count && count > 0) severity = 'critical';
    else if (totalIssues > 0) severity = 'warning';

    // 应统一字段的不一致检测
    const inconsistencies = {};
    for (const f of UNIFORM_FIELDS) {
        const vals = new Map();
        for (const p of prods) {
            let v = (p[f] || '').toString().trim();
            if (v === 'true') v = '是';
            if (v === 'false') v = '否';
            if (!v) v = '(空)';
            vals.set(v, (vals.get(v) || 0) + 1);
        }
        if (vals.size > 1) {
            const sorted = [...vals.entries()].sort((a, b) => b[1] - a[1]);
            inconsistencies[f] = { values: sorted, total: count };
        }
    }

    // 字段缺失率
    const completeness = {};
    for (const f of KEY_FIELDS) {
        const filled = prods.filter(p => {
            const v = p[f];
            return v !== undefined && v !== null && String(v).trim() !== '' && v !== 'false' && v !== '否';
        }).length;
        completeness[f] = { filled, total: count, pct: count > 0 ? Math.round(filled / count * 100) : 0 };
    }

    // 产品类型分布
    const productTypes = {};
    for (const p of prods) {
        const pt = (p.productType || '').trim() || '未分类';
        productTypes[pt] = (productTypes[pt] || 0) + 1;
    }

    return {
        count, majors, missingBL: 0, missingBS: 0, missingPR: 0,
        missingCat, missingBrand, obsoleteMajor, totalIssues, severity,
        inconsistencies, completeness, productTypes
    };
}

        asMiss.innerHTML = '<span class="as-badge warn">' + missCount + ' 项缺失 &lt;70%</span>';
        asMiss.style.display = '';
    } else {
        asMiss.style.display = 'none';
    }
    asHealthy.style.display = (inconCount === 0 && missCount === 0) ? '' : 'none';

    const entries = Object.entries(BRAND_STATS).filter(([key, stats]) => {
        if (search && !key.toLowerCase().includes(search)) return false;
        if (ACTIVE_FILTERS.has('missingBL') && stats.missingBL === 0) return false;
        if (ACTIVE_FILTERS.has('missingBS') && stats.missingBS === 0) return false;
        if (ACTIVE_FILTERS.has('missingPR') && stats.missingPR === 0) return false;
        if (ACTIVE_FILTERS.has('missingCat') && stats.missingCat === 0) return false;
        if (ACTIVE_FILTERS.has('missingBrand') && (stats.missingBrand || 0) === 0) return false;
        if (ACTIVE_FILTERS.has('obsoleteMajor') && stats.obsoleteMajor === 0) return false;
        return true;
    });
    // 排序：严重优先 → 预警 → 正常
    const sevOrder = { critical: 0, warning: 1, good: 2 };
    entries.sort((a, b) => {
        if (sevOrder[a[1].severity] !== sevOrder[b[1].severity])
            return sevOrder[a[1].severity] - sevOrder[b[1].severity];
        return a[0].localeCompare(b[0], 'zh-CN');
    });
    FILTERED_BRANDS = entries.map(e => e[0]);

    const isBrand = VIEW_MODE === 'brand';
    const container = document.getElementById('brand-list');
    container.innerHTML = entries.map(([key, stats]) => {
        const sevIcon = stats.severity === 'critical' ? '❌' : stats.severity === 'warning' ? '⚠️' : '✅';
        const sevNum = stats.totalIssues > 0 ? stats.totalIssues : '';
        const activeClass = key === ACTIVE_BRAND ? ' active' : '';
        const dirtyClass = DIRTY_BRANDS.has(key) ? ' dirty' : '';
        const majors = stats.majors.slice(0, 3).join('/') || '无大类';
        // 供应商模式：计算平均完整度
        let healthHtml = '';
        if (!isBrand) {
            const oc = Object.values(stats.completeness || {});
            if (oc.length > 0) {
                const avgPct = Math.round(oc.reduce((s, c) => s + c.pct, 0) / oc.length);
                const hCls = avgPct >= 80 ? 'ok' : avgPct >= 50 ? 'warn' : 'err';
                healthHtml = ' <span class="as-badge ' + hCls + '" style="font-size:10px;">' + avgPct + '%</span>';
            }
        }
        return `<div class="brand-entry${activeClass}${dirtyClass}" onclick="selectBrand('${escAttr(key)}')" data-brand="${escAttr(key)}">
            <span class="sev">${sevIcon}</span>
            <div class="info">
                <div class="name">${escHtml(key)}</div>
                <div class="meta"><span>${majors}</span>${healthHtml}</div>
            </div>
            <span class="count">${stats.count}品${sevNum ? ' ' + sevNum : ''}</span>
            <span class="dirty-dot"></span>
        </div>`;
    }).join('');
    const label = isBrand ? '品牌' : '供应商';
    document.getElementById('left-stats').textContent = `显示 ${FILTERED_BRANDS.length} / ${Object.keys(BRAND_STATS).length} ${label}`;
}

// ========== 组详情（品牌/供应商通用） ==========
function selectBrand(brand) {
    ACTIVE_BRAND = brand;
    _selectedIndices.clear();
    const products = BRAND_GROUPS[brand] || [];
    const isBrand = VIEW_MODE === 'brand';
    document.getElementById('right-empty').style.display = 'none';
    document.getElementById('right-content').style.display = 'flex';
    document.getElementById('detail-brand-name').textContent = brand;
    document.getElementById('detail-product-count').textContent = products.length + ' 个产品';

    const stats = BRAND_STATS[brand];
    const issues = [];
    if (isBrand) {
        if (stats.missingBL > 0) issues.push(`${stats.missingBL}缺品牌级别`);
        if (stats.missingBS > 0) issues.push(`${stats.missingBS}缺品牌调性`);
        if (stats.missingPR > 0) issues.push(`${stats.missingPR}缺价格定位`);
    } else {
        if ((stats.missingBrand || 0) > 0) issues.push(`${stats.missingBrand}缺品牌`);
    }
    if (stats.missingCat > 0) issues.push(`${stats.missingCat}品类泛化`);
    if (stats.obsoleteMajor > 0) issues.push(`${stats.obsoleteMajor}大类需更新`);
    document.getElementById('detail-issues').innerHTML = issues.length > 0
        ? '<span style="color:var(--danger);">⚠ ' + issues.join(' · ') + '</span>'
        : '<span style="color:var(--success);">✓ 无问题</span>';

    // 品牌模式隐藏供应商审计面板
    if (isBrand) {
        document.getElementById('supplier-audit').style.display = 'none';
        document.getElementById('audit-summary').style.display = 'none';
    }
    // 品牌级下拉：仅品牌模式
    if (isBrand) {
        const mostCommon = (field) => {
            const vals = {};
            for (const p of products) { const v = p[field] || ''; vals[v] = (vals[v] || 0) + 1; }
            let best = '', bestN = 0;
            for (const [v, n] of Object.entries(vals)) { if (n > bestN) { bestN = n; best = v; } }
            return best;
        };
        document.getElementById('field-brandLevel').value = mostCommon('brandLevel');
        document.getElementById('field-brandStyle').value = mostCommon('brandStyle');
        document.getElementById('field-priceRange').value = mostCommon('priceRange'); document.getElementById('field-region').value = mostCommon('region');
    }

    // 建议条：仅品牌模式 + BRAND_TONE 数据
    const suggestBar = document.getElementById('suggestion-bar');
    if (isBrand) {
        const tone = BRAND_TONE[brand];
        if (tone) {
            populateSuggestionSelects();
            document.getElementById('sug-level').value = tone.bl || '';
            document.getElementById('sug-style').value = tone.bs || '';
            document.getElementById('sug-price').value = tone.pr || '';
            document.getElementById('sug-region').value = '';
            document.getElementById('suggestion-reason').textContent = '参考数据';
            document.getElementById('suggestion-detail-link').style.display = 'none';
            suggestBar.dataset.detail = '';
            document.getElementById('btn-accept-suggestion').disabled = false;
            suggestBar.classList.remove('hidden');
        } else {
            suggestBar.classList.add('hidden');
        }
    } else {
        suggestBar.classList.add('hidden');
    }

    // 供应商模式：填充品牌筛选下拉
    const brandFilter = document.getElementById('supplier-brand-filter');
    if (!isBrand) {
        const brands = [...new Set(products.map(p => (p.brand || '').trim()).filter(Boolean))].sort((a, b) => a.localeCompare(b, 'zh-CN'));
        brandFilter.innerHTML = '<option value="">全部品牌 (' + products.length + '品)</option>' + brands.map(b => {
            const cnt = products.filter(p => (p.brand || '').trim() === b).length;
            return `<option value="${escAttr(b)}">${escHtml(b)} (${cnt})</option>`;
        }).join('');
        // 如果当前筛选品牌不在新供应商中，重置
        if (SUPPLIER_BRAND_FILTER && !brands.includes(SUPPLIER_BRAND_FILTER)) {
            SUPPLIER_BRAND_FILTER = '';
        }
        brandFilter.value = SUPPLIER_BRAND_FILTER;
        // 更新产品数显示
        if (SUPPLIER_BRAND_FILTER) {
            const filtered = products.filter(p => (p.brand || '').trim() === SUPPLIER_BRAND_FILTER);
            document.getElementById('detail-product-count').textContent = filtered.length + ' / ' + products.length + ' 个产品';
        }
        // 供应商审计面板
        renderSupplierAudit(brand, BRAND_STATS[brand]);
        document.getElementById('supplier-audit').style.display = 'block';
        document.getElementById('audit-summary').style.display = 'flex';
    }

    // 导航按钮
    const idx = FILTERED_BRANDS.indexOf(brand);
    document.getElementById('btn-prev').disabled = idx <= 0;
    document.getElementById('btn-next').disabled = idx >= FILTERED_BRANDS.length - 1;

    // 撤销按钮
    document.getElementById('btn-undo-brand').disabled = !BRAND_ORIGINALS[brand];

    // 产品表
    renderProductTable(brand, products);
    renderBrandList(); // refresh active highlight
}

function navigateBrand(dir) {
    const idx = FILTERED_BRANDS.indexOf(ACTIVE_BRAND);
    const newIdx = idx + dir;
    if (newIdx >= 0 && newIdx < FILTERED_BRANDS.length) {
        selectBrand(FILTERED_BRANDS[newIdx]);
    }
}

function onSupplierBrandFilter() {
    SUPPLIER_BRAND_FILTER = document.getElementById('supplier-brand-filter').value;
    const products = BRAND_GROUPS[ACTIVE_BRAND] || [];
    if (SUPPLIER_BRAND_FILTER) {
        const filtered = products.filter(p => (p.brand || '').trim() === SUPPLIER_BRAND_FILTER);
        document.getElementById('detail-product-count').textContent = filtered.length + ' / ' + products.length + ' 个产品';
    } else {
        document.getElementById('detail-product-count').textContent = products.length + ' 个产品';
    }
    renderProductTable(ACTIVE_BRAND, products);
}

// ========== 产品表 ==========
// ========== 产品详情弹窗 ==========
function showProductDetail(idx) {
    const products = BRAND_GROUPS[ACTIVE_BRAND];
    if (!products || idx < 0 || idx >= products.length) return;
    const p = products[idx];
    document.getElementById('modal-title').textContent = p.name || '产品详情';
    // Show all fields sorted
    const keys = Object.keys(p).sort((a, b) => a.localeCompare(b, 'zh-CN'));
    let html = '<table>';
    for (const k of keys) {
        let val = p[k];
        if (val === undefined) val = '<span style="color:#d1d5db;">—</span>';
        else if (val === null) val = '<span style="color:#d1d5db;">null</span>';
        else if (val === '') val = '<span style="color:#d1d5db;">(空)</span>';
        else if (typeof val === 'boolean') val = val ? '✅' : '❌';
        else if (typeof val === 'number') val = val.toLocaleString();
        else val = escHtml(String(val));
        html += `<tr><td>${escHtml(k)}</td><td>${val}</td></tr>`;
    }
    html += '</table>';
    document.getElementById('modal-body').innerHTML = html;
    document.getElementById('modal-overlay').classList.remove('hidden');
}
function closeModal() {
    document.getElementById('modal-overlay').classList.add('hidden');
}
function showAIDetail() {

    const detail = bar.dataset.detail || '';
    const brand = ACTIVE_BRAND || '';
    const levelVal = document.getElementById('sug-level').value;

    document.getElementById('modal-body').innerHTML = `<div style="line-height:1.8;font-size:14px;">${escHtml(detail).replace(/\n/g, '<br>')}</div>
        <div style="margin-top:16px;font-size:12px;color:var(--text2);">
            <b>级别:</b> ${escHtml(levelVal)} &nbsp;|&nbsp;
            <b>调性:</b> ${escHtml(styleVal)} &nbsp;|&nbsp;
            <b>价格:</b> ${escHtml(priceVal)}
